<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>AI Car Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #7c5cff;
  --accent-soft: rgba(124,92,255,0.12);
  --accent-ink: #4a32c4;
  --bg: #fafaf7;
  --ink: #1f1d1b;
  --border: rgba(31,29,27,0.14);
  --border-strong: rgba(31,29,27,0.55);
  --muted: rgba(31,29,27,0.45);
  --chip-bg: #f0eee8;
}

html, body { height: 100%; font-family: "Geist","Inter",system-ui,sans-serif; color: var(--ink); background: var(--bg); }

/* ── layout ── */
.app { display: flex; flex-direction: column; height: 100vh; }

.topbar {
  height: 52px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 22px; gap: 14px; flex-shrink: 0;
}
.topbar-logo {
  width: 24px; height: 24px; border: 1.25px solid var(--border-strong);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--accent);
}
.topbar-title { font-weight: 600; font-size: 13px; }
.topbar-sub { font-family: "JetBrains Mono",monospace; font-size: 10.5px; color: var(--muted); }
.topbar-spacer { flex: 1; }
.btn-reset-all {
  appearance: none; border: 1px solid rgba(31,29,27,0.3); background: transparent;
  color: rgba(31,29,27,0.65); font: 500 11px/1 "Geist",sans-serif; padding: 6px 11px;
  border-radius: 999px; cursor: pointer;
}
.btn-reset-all:hover { color: var(--ink); border-color: rgba(31,29,27,0.6); }
.topbar-nav { font-family: "JetBrains Mono",monospace; font-size: 10.5px; color: var(--muted); }

.main { flex: 1; display: flex; min-height: 0; }

/* ── chat ── */
.chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.stream {
  flex: 1; overflow-y: auto; padding: 24px 32px;
  display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth;
}
.stream::-webkit-scrollbar { width: 8px; }
.stream::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

.msg { display: flex; gap: 10px; align-items: flex-start; max-width: 760px; }
.msg.user { flex-direction: row-reverse; align-self: flex-end; }

.av {
  width: 26px; height: 26px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: "JetBrains Mono",monospace; font-size: 10px; font-weight: 600;
  border: 1.25px solid var(--border-strong);
}
.av.ai { border-radius: 7px; background: var(--accent-soft); color: var(--accent-ink); }
.av.user { border-radius: 50%; background: var(--chip-bg); color: rgba(31,29,27,0.6); }

.bub {
  padding: 12px 14px; border: 1.25px solid var(--border-strong);
  border-radius: 14px 14px 14px 4px; background: var(--bg);
  font-size: 13.5px; line-height: 1.55; max-width: 560px;
}
.msg.user .bub { border-radius: 14px 14px 4px 14px; background: var(--chip-bg); }
.bub b { font-weight: 600; }

.bub-tokens { display: inline-flex; flex-wrap: wrap; gap: 5px; align-items: center; margin-right: 6px; }
.bub-token {
  padding: 2px 8px; border-radius: 5px;
  background: var(--accent-soft); color: var(--accent-ink);
  border: 1px solid var(--accent); font-size: 11.5px; font-weight: 500;
}

/* typing dots */
.typing { display: inline-flex; gap: 3px; padding: 4px 0; }
.typing span {
  width: 6px; height: 6px; border-radius: 50%; background: rgba(31,29,27,0.35);
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: .4; }
  40% { transform: translateY(-4px); opacity: 1; }
}

/* quick chips — rendered inside stream, below AI bubble */
.quick-chips { margin-left: 36px; display: flex; flex-wrap: wrap; gap: 6px; padding-bottom: 4px; }

/* car recommendation cards */
.recs { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.rec {
  width: 200px; border: 1.25px solid var(--border-strong); border-radius: 10px;
  background: var(--bg); padding: 10px; display: flex; flex-direction: column; gap: 8px;
}
.rec-ph {
  background: repeating-linear-gradient(135deg,rgba(31,29,27,.05) 0 6px,rgba(0,0,0,0) 6px 12px), var(--bg);
  border: 1.25px dashed rgba(31,29,27,0.18); border-radius: 8px; height: 78px;
  display: flex; align-items: center; justify-content: center;
  font-family: "JetBrains Mono",monospace; font-size: 10.5px; color: var(--muted);
}
.rec-name { font-size: 12.5px; font-weight: 600; }
.rec-badge {
  font-family: "JetBrains Mono",monospace; font-size: 9.5px;
  padding: 2px 5px; border-radius: 4px; background: var(--accent-soft); color: var(--accent-ink);
}
.rec-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.rec-tag {
  font-family: "JetBrains Mono",monospace; font-size: 9.5px;
  padding: 2px 6px; background: var(--chip-bg); color: rgba(31,29,27,0.7); border-radius: 4px;
}
.rec-actions { display: flex; gap: 6px; margin-top: 2px; }
.rec-actions span {
  flex: 1; text-align: center; padding: 5px 0; font-size: 11px;
  cursor: pointer; border-radius: 6px;
}
.rec-det { border: 1px solid var(--border-strong); color: rgba(31,29,27,0.85); }
.rec-det:hover { background: var(--chip-bg); }
.rec-cmp { background: var(--ink); color: var(--bg); }
.rec-cmp:hover { background: #333; }

/* ── composer ── */
.composer {
  border-top: 1px solid var(--border); padding: 14px 32px 18px;
  flex-shrink: 0; background: var(--bg);
}
.cbox {
  border: 1.5px solid var(--border-strong); border-radius: 14px; padding: 10px 12px;
  min-height: 62px; display: flex; flex-direction: column; gap: 8px; background: #fff;
  transition: border-color .15s, box-shadow .15s;
}
.cbox:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.tokens-row { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.token {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 4px 3px 9px; border-radius: 6px;
  background: var(--accent-soft); color: var(--accent-ink);
  border: 1px solid var(--accent); font-size: 11.5px; font-weight: 500;
}
.token button {
  appearance: none; border: 0; background: transparent; color: inherit;
  cursor: pointer; opacity: .55; font-size: 11px; padding: 0 4px; line-height: 1;
}
.token button:hover { opacity: 1; }

.input-field {
  flex: 1; min-width: 140px; appearance: none; border: 0; outline: 0; background: transparent;
  font: inherit; font-size: 13.5px; color: var(--ink); padding: 2px 0;
}
.input-field::placeholder { color: rgba(31,29,27,0.4); }

.cfoot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.cfoot-meta { font-family: "JetBrains Mono",monospace; font-size: 10.5px; color: var(--muted); }

.btn-send {
  appearance: none; border: 1.5px solid var(--accent-ink); background: var(--accent); color: #fff;
  padding: 8px 16px; border-radius: 999px; font: 600 12px/1 "Geist",sans-serif; cursor: pointer;
  box-shadow: 2px 2px 0 var(--accent-ink); transition: transform .08s, box-shadow .08s;
}
.btn-send:hover:not(:disabled) { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--accent-ink); }
.btn-send:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

/* chip (shared between quick + filter) */
.chip {
  padding: 5px 10px; border: 1px solid var(--border-strong); border-radius: 999px;
  font: 500 11.5px/1 "Geist",sans-serif; color: rgba(31,29,27,0.85); background: var(--bg);
  cursor: pointer; user-select: none; transition: all .12s;
}
.chip:hover { background: var(--chip-bg); }
.chip.on { background: var(--accent-soft); color: var(--accent-ink); border-color: var(--accent); }

/* ── sidebar ── */
.side {
  width: 320px; border-left: 1px solid var(--border); background: var(--bg);
  display: flex; flex-direction: column; flex-shrink: 0;
  min-width: 200px; max-width: 520px;
}

/* drag handle between chat and sidebar */
.resize-handle {
  width: 5px; flex-shrink: 0; cursor: col-resize;
  background: transparent; position: relative;
  transition: background .15s;
}
.resize-handle::after {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 1px; height: 40px;
  background: var(--border-strong); border-radius: 1px; opacity: 0.35;
  transition: opacity .15s, height .15s;
}
.resize-handle:hover::after,
.resize-handle.dragging::after { opacity: 0.8; height: 60px; }
.resize-handle:hover,
.resize-handle.dragging { background: var(--accent-soft); }
.side-head {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.side-head b { font-size: 13px; font-weight: 600; }
.side-reset { font-family: "JetBrains Mono",monospace; font-size: 10px; color: var(--muted); cursor: pointer; }
.side-reset:hover { color: var(--ink); }

.side-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; }
.filter-group { display: flex; flex-direction: column; gap: 8px; }
.filter-label {
  font-family: "JetBrains Mono",monospace; font-size: 10px;
  color: var(--muted); letter-spacing: .08em; text-transform: uppercase;
}
.chips-row { display: flex; flex-wrap: wrap; gap: 6px; }

.budget-display {
  width: 100%; height: 30px; border: 1px solid rgba(31,29,27,0.18); border-radius: 6px;
  display: flex; align-items: center; padding: 0 10px;
  font-size: 11px; color: var(--muted); font-family: "JetBrains Mono",monospace;
}
.budget-hint { font-size: 10.5px; color: rgba(31,29,27,0.45); font-family: "JetBrains Mono",monospace; }

/* ── responsive ── */
@media (max-width: 900px) {
  .side { width: 240px; }
  .stream { padding: 16px 20px; }
  .composer { padding: 12px 20px 16px; }
}
@media (max-width: 640px) {
  .main { flex-direction: column; position: relative; }
  .stream { padding: 14px 16px; gap: 12px; }
  .composer { padding: 10px 16px 14px; }
  .bub { font-size: 13px; max-width: calc(100vw - 80px); }
  .recs { flex-direction: column; }
  .rec { width: 100%; }
  .side {
    position: fixed; bottom: 0; left: 0; right: 0;
    width: 100%; height: 72vh;
    border-left: none; border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    transform: translateY(100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    z-index: 100;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.10);
  }
  .side.open { transform: translateY(0); }
  .side-head { position: relative; }
  .side-head::before {
    content: ''; display: block; position: absolute;
    top: 8px; left: 50%; transform: translateX(-50%);
    width: 36px; height: 4px;
    background: var(--border-strong); border-radius: 2px; opacity: .35;
  }
  .btn-filter { display: flex !important; }
  .topbar { padding: 0 16px; gap: 10px; }
  .topbar-title { font-size: 12px; }
}
.drawer-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.25); z-index: 99;
}
.drawer-backdrop.open { display: block; }
.btn-filter {
  display: none;
  appearance: none; border: 1px solid rgba(31,29,27,0.3); background: transparent;
  color: rgba(31,29,27,0.65); font: 500 11px/1 "Geist",sans-serif; padding: 6px 11px;
  border-radius: 999px; cursor: pointer; align-items: center;
}
.btn-filter:hover { color: var(--ink); border-color: rgba(31,29,27,0.6); }

/* error toast */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #ef4444; color: #fff; font-size: 12px; padding: 8px 16px;
  border-radius: 8px; z-index: 999; opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">

  <!-- top bar -->
  <div class="topbar">
    <b class="topbar-title" style="font-size:14px;">Möller Bil · Find a car</b>
    <div class="topbar-spacer"></div>
    <button class="btn-reset-all" onclick="resetAll()">Reset chat</button>
    <button class="btn-filter" onclick="toggleDrawer()">Filters ↑</button>
  </div>

  <!-- main -->
  <div class="main">

    <!-- chat area -->
    <div class="chat">
      <div class="stream" id="stream"></div>

      <!-- composer -->
      <div class="composer">
        <div class="cbox">
          <div class="tokens-row" id="tokensRow">
            <input class="input-field" id="inputField" placeholder="Tell the assistant what you need…"
              onkeydown="handleKey(event)" oninput="updateSend()">
          </div>
          <div class="cfoot">
            <span class="cfoot-meta"><span id="tokenCount">0</span> filters added</span>
            <button class="btn-send" id="btnSend" disabled onclick="sendMessage()">Send →</button>
          </div>
        </div>
      </div>
    </div>

    <!-- drag handle -->
    <div class="resize-handle" id="resizeHandle" title="Drag to resize"></div>

    <!-- right sidebar -->
    <aside class="side" id="side">
      <div class="side-head">
        <b>Refine search</b>
        <span class="side-reset" onclick="resetFilters()">reset</span>
      </div>
      <div class="side-body" id="sideBody"></div>
    </aside>

  </div>
</div>

<div class="toast" id="toast"></div>
<div class="drawer-backdrop" id="drawerBackdrop" onclick="toggleDrawer()"></div>

<script>
// ── config ──────────────────────────────────────────────────────────────
const DEEPSEEK_API_KEY = 'sk-014c7c0d0b8a48d19db2ace18c9b0cce';
const DEEPSEEK_URL = 'https://api.deepseek.com/chat/completions';

const SYSTEM_PROMPT = `You are an expert car advisor. Your job is to help users find the perfect car through natural, friendly conversation.

Guidelines:
- Ask focused questions one at a time: usage, seats needed, fuel preference, budget, any must-have features
- Keep responses concise and conversational (2-4 sentences max unless recommending)
- When you have enough info (usage + budget at minimum), provide 2-3 specific car recommendations
- Format recommendations like this when you have them:
  RECOMMENDATIONS:
  Model: [Brand Model Year]
  Type: [e.g. Hybrid SUV]
  Seats: [number]
  Price: [e.g. $35k]
  Why: [1 sentence]
  ---
  (repeat for each)
- Speak in the same language as the user (Chinese or English)
- Be warm and professional, not salesy`;

// ── state ────────────────────────────────────────────────────────────────
let messages = [];   // { role, content } for API
let uiMessages = []; // rendered messages
let activeTokens = [];
let activeChips = {};
let isStreaming = false;

// ── filter taxonomy ──────────────────────────────────────────────────────
const FILTERS = [
  { key: 'usage',  title: 'Usage',           options: ['Commuting','City driving','Mountain trips','Family use','Road trips','Leisure'] },
  { key: 'seats',  title: 'Number of seats', options: ['2','4','5','6','7+'] },
  { key: 'fuel',   title: 'Fuel type',       options: ['Electric','Hybrid','Petrol','Diesel'] },
  { key: 'size',   title: 'Vehicle size',    options: ['City','Compact','Mid-size','Family','SUV','Van'] },
];

function tokenLabel(key, opt) {
  return key === 'seats' ? `${opt} seats` : opt;
}

// ── init ─────────────────────────────────────────────────────────────────
function init() {
  buildSidebar();
  const greeting = "Hi — I'm your car-finding assistant. I'll ask a few quick questions and recommend models that fit. To start, **how do you plan to use the car most often?**";
  appendAIMessage(greeting, ['Daily commute', 'Family trips', 'City driving', 'Weekend adventure']);
  messages.push({ role: 'assistant', content: greeting.replace(/\*\*/g, '') });
}

// ── sidebar ───────────────────────────────────────────────────────────────
function buildSidebar() {
  const body = document.getElementById('sideBody');
  body.innerHTML = '';

  FILTERS.forEach(group => {
    const div = document.createElement('div');
    div.className = 'filter-group';
    div.innerHTML = `<div class="filter-label">${group.title}</div><div class="chips-row" id="grp-${group.key}"></div>`;
    body.appendChild(div);

    const row = div.querySelector(`#grp-${group.key}`);
    group.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = opt;
      const key = `${group.key}:${opt}`;
      if (activeChips[key]) btn.classList.add('on');
      btn.onclick = () => toggleChip(group.key, opt, btn, key);
      row.appendChild(btn);
    });
  });

  // budget
  const budgetGroup = document.createElement('div');
  budgetGroup.className = 'filter-group';
  budgetGroup.innerHTML = `
    <div class="filter-label">Budget</div>
    <div class="budget-display">$15k ─────●────── $80k</div>
  `;
  body.appendChild(budgetGroup);
}

function toggleChip(groupKey, opt, btn, key) {
  const label = tokenLabel(groupKey, opt);
  if (activeChips[key]) {
    delete activeChips[key];
    btn.classList.remove('on');
    removeToken(label);
  } else {
    activeChips[key] = true;
    btn.classList.add('on');
    addToken(label);
  }
}

function resetFilters() {
  activeChips = {};
  activeTokens = [];
  renderTokens();
  buildSidebar();
}

// ── tokens ────────────────────────────────────────────────────────────────
function addToken(label) {
  if (!activeTokens.includes(label)) {
    activeTokens.push(label);
    renderTokens();
    updateSend();
  }
}

function removeToken(label) {
  activeTokens = activeTokens.filter(t => t !== label);
  // deselect chip
  Object.keys(activeChips).forEach(key => {
    const [groupKey, opt] = key.split(':');
    if (tokenLabel(groupKey, opt) === label) delete activeChips[key];
  });
  renderTokens();
  buildSidebar();
  updateSend();
}

function renderTokens() {
  const row = document.getElementById('tokensRow');
  const input = document.getElementById('inputField');
  // remove existing token elements
  row.querySelectorAll('.token').forEach(el => el.remove());
  activeTokens.forEach(label => {
    const span = document.createElement('span');
    span.className = 'token';
    span.innerHTML = `${label}<button onclick="removeToken('${label}')">×</button>`;
    row.insertBefore(span, input);
  });
  document.getElementById('tokenCount').textContent = activeTokens.length;
}

// ── chat UI helpers ───────────────────────────────────────────────────────
function appendAIMessage(text, suggestions = []) {
  const stream = document.getElementById('stream');

  // remove any previous chips row so only latest one shows
  stream.querySelectorAll('.quick-chips').forEach(el => el.remove());

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg ai';
  msgDiv.innerHTML = `
    <div class="av ai">AI</div>
    <div class="bub">${formatText(text)}</div>
  `;
  stream.appendChild(msgDiv);

  // chips go directly after the bubble, inside the stream
  if (suggestions.length > 0) {
    const chipsDiv = document.createElement('div');
    chipsDiv.className = 'quick-chips';
    suggestions.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = label;
      btn.onclick = () => {
        document.getElementById('inputField').value = label;
        updateSend();
        sendMessage();
      };
      chipsDiv.appendChild(btn);
    });
    stream.appendChild(chipsDiv);
  }

  stream.scrollTop = stream.scrollHeight;
  return msgDiv;
}

function appendUserMessage(text, tokens) {
  const stream = document.getElementById('stream');

  // hide chips when user sends a message
  stream.querySelectorAll('.quick-chips').forEach(el => el.remove());

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg user';
  let tokenHtml = '';
  if (tokens.length > 0) {
    tokenHtml = `<span class="bub-tokens">${tokens.map(t => `<span class="bub-token">${t}</span>`).join('')}</span>`;
  }
  msgDiv.innerHTML = `
    <div class="av user">U</div>
    <div class="bub">${tokenHtml}${text ? escapeHtml(text) : ''}</div>
  `;
  stream.appendChild(msgDiv);
  stream.scrollTop = stream.scrollHeight;
}

function appendTypingIndicator() {
  const stream = document.getElementById('stream');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg ai';
  msgDiv.id = 'typingMsg';
  msgDiv.innerHTML = `
    <div class="av ai">AI</div>
    <div class="bub"><span class="typing"><span></span><span></span><span></span></span></div>
  `;
  stream.appendChild(msgDiv);
  stream.scrollTop = stream.scrollHeight;
  return msgDiv;
}

function removeTypingIndicator() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}


// ── recommendation card parser ────────────────────────────────────────────
function parseRecs(text) {
  if (!text.includes('RECOMMENDATIONS:')) return null;
  const parts = text.split('---').map(s => s.trim()).filter(Boolean);
  return parts.map(part => {
    const get = (key) => {
      const match = part.match(new RegExp(`${key}:\\s*(.+)`));
      return match ? match[1].trim() : '';
    };
    return {
      model: get('Model'),
      type:  get('Type'),
      seats: get('Seats'),
      price: get('Price'),
      why:   get('Why'),
    };
  }).filter(r => r.model);
}

function renderRecs(recs, container) {
  const recsDiv = document.createElement('div');
  recsDiv.className = 'recs';
  recs.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'rec';
    card.innerHTML = `
      <div class="rec-ph">[ car shot ]</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span class="rec-name">${escapeHtml(r.model)}</span>
        ${i === 0 ? '<span class="rec-badge">best match</span>' : ''}
      </div>
      <div class="rec-tags">
        ${r.type ? `<span class="rec-tag">${escapeHtml(r.type)}</span>` : ''}
        ${r.seats ? `<span class="rec-tag">${escapeHtml(r.seats)} seats</span>` : ''}
        ${r.price ? `<span class="rec-tag">${escapeHtml(r.price)}</span>` : ''}
      </div>
      ${r.why ? `<div style="font-size:11px;color:var(--muted);line-height:1.4">${escapeHtml(r.why)}</div>` : ''}
      <div class="rec-actions">
        <span class="rec-det">Details</span>
        <span class="rec-cmp">Compare</span>
      </div>
    `;
    recsDiv.appendChild(card);
  });
  container.querySelector('.bub').appendChild(recsDiv);
}

// ── send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  const tokens = [...activeTokens];
  if (!text && tokens.length === 0) return;

  // build combined content
  const combined = tokens.length > 0
    ? (tokens.join(', ') + (text ? '. ' + text : ''))
    : text;

  // render user bubble
  appendUserMessage(text, tokens);

  // clear input + tokens
  input.value = '';
  activeTokens = [];
  activeChips = {};
  renderTokens();
  buildSidebar();
  updateSend();

  // push to history
  messages.push({ role: 'user', content: combined });

  // show typing
  isStreaming = true;
  document.getElementById('btnSend').disabled = true;
  appendTypingIndicator();

  try {
    const resp = await fetch(DEEPSEEK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`,
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        max_tokens: 800,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...messages,
        ],
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const aiText = data.choices?.[0]?.message?.content || '';
    messages.push({ role: 'assistant', content: aiText });

    removeTypingIndicator();

    // check if it has recommendations
    const recs = parseRecs(aiText);
    if (recs && recs.length > 0) {
      const intro = aiText.split('RECOMMENDATIONS:')[0].trim();
      const msgEl = appendAIMessage(intro || 'Here are my top picks for you:', ['Compare these', 'Tell me more', 'Different budget', 'What about EVs?']);
      renderRecs(recs, msgEl);
    } else {
      // extract quick suggestions from AI text heuristically
      appendAIMessage(aiText, getSuggestions(aiText));
    }

  } catch (err) {
    removeTypingIndicator();
    showToast('Error: ' + err.message);
    appendAIMessage('Sorry, something went wrong. Please try again.', []);
    messages.pop(); // remove failed user message
  } finally {
    isStreaming = false;
    updateSend();
  }
}

function getSuggestions(text) {
  // return contextual quick replies based on AI question
  if (/seat|passenger|people/i.test(text)) return ['Just me','2 people','4–5 people','7+ people'];
  if (/budget|price|spend|cost/i.test(text)) return ['Under $25k','$25–40k','$40–60k','$60k+'];
  if (/fuel|electric|hybrid|petrol/i.test(text)) return ['Electric','Hybrid','Petrol','Diesel'];
  if (/feature|must|important/i.test(text)) return ['Safety first','Cargo space','Tech/infotainment','Low running cost'];
  if (/size|type|suv|sedan/i.test(text)) return ['Compact','SUV','Sedan','Minivan'];
  return [];
}

// ── utils ─────────────────────────────────────────────────────────────────
function formatText(text) {
  return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function updateSend() {
  const input = document.getElementById('inputField');
  const btn = document.getElementById('btnSend');
  const hasContent = input.value.trim().length > 0 || activeTokens.length > 0;
  btn.disabled = !hasContent || isStreaming;
}

function resetAll() {
  messages = [];
  uiMessages = [];
  activeTokens = [];
  activeChips = {};
  document.getElementById('stream').innerHTML = '';
  document.getElementById('inputField').value = '';
  renderTokens();
  buildSidebar();
  updateSend();
  init();
}

function toggleDrawer() {
  const side = document.querySelector('.side');
  const backdrop = document.getElementById('drawerBackdrop');
  const btn = document.querySelector('.btn-filter');
  const isOpen = side.classList.toggle('open');
  backdrop.classList.toggle('open', isOpen);
  if (btn) btn.textContent = isOpen ? 'Filters ↓' : 'Filters ↑';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ── sidebar resize ────────────────────────────────────────────────────────
(function() {
  const handle = document.getElementById('resizeHandle');
  const side   = document.getElementById('side');
  if (!handle || !side) return;

  let startX, startW;

  handle.addEventListener('mousedown', e => {
    startX = e.clientX;
    startW = side.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    function onMove(e) {
      const delta = startX - e.clientX; // dragging left = wider sidebar
      const newW = Math.min(520, Math.max(200, startW + delta));
      side.style.width = newW + 'px';
    }
    function onUp() {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
})();

// ── start ─────────────────────────────────────────────────────────────────
init();
</script>
