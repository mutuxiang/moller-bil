<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>AI Car Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #7c5cff;
  --accent-soft: rgba(124,92,255,0.12);
  --accent-ink: #4a32c4;
  --bg: #fafaf7;
  --ink: #1f1d1b;
  --border: rgba(31,29,27,0.14);
  --border-strong: rgba(31,29,27,0.55);
  --muted: rgba(31,29,27,0.45);
  --chip-bg: #f0eee8;
}

html, body { height: 100%; font-family: "Geist","Inter",system-ui,sans-serif; color: var(--ink); background: var(--bg); }

/* ── layout ── */
.app { display: flex; flex-direction: column; height: 100vh; }

.topbar {
  height: 52px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 22px; gap: 14px; flex-shrink: 0;
}
.topbar-logo {
  width: 24px; height: 24px; border: 1.25px solid var(--border-strong);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--accent);
}
.topbar-title { font-weight: 600; font-size: 13px; }
.topbar-sub { font-family: "Inter",sans-serif; font-size: 10.5px; color: var(--muted); }
.topbar-spacer { flex: 1; }
.btn-reset-all {
  appearance: none; border: 1px solid rgba(31,29,27,0.3); background: transparent;
  color: rgba(31,29,27,0.65); font: 500 11px/1 "Geist",sans-serif; padding: 6px 11px;
  border-radius: 999px; cursor: pointer;
}
.btn-reset-all:hover { color: var(--ink); border-color: rgba(31,29,27,0.6); }
.topbar-nav { font-family: "Inter",sans-serif; font-size: 10.5px; color: var(--muted); }

.main { flex: 1; display: flex; min-height: 0; }

/* left & right empty spacer columns */
.col-spacer {
  width: 120px; flex-shrink: 0; background: var(--bg);
  border-right: 1px solid var(--border);
}
.col-spacer.right {
  border-right: none; border-left: 1px solid var(--border);
}

/* centre content wrapper */
.col-center {
  flex: 1; display: flex; min-width: 0; min-height: 0;
}

/* ── chat ── */
.chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.stream {
  flex: 1; overflow-y: auto; padding: 24px 32px;
  display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth;
}
.stream::-webkit-scrollbar { width: 8px; }
.stream::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

/* ── info banner above stream ── */
.info-banner {
  margin: 16px 32px 0;
  border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 16px; background: #fff;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.info-banner-text { flex: 1; }
.info-banner-text b { font-size: 12.5px; font-weight: 600; display: block; margin-bottom: 2px; }
.info-banner-text span { font-size: 11.5px; color: var(--muted); line-height: 1.4; }
.info-banner-link {
  appearance: none; border: 1px solid var(--border-strong); background: transparent;
  color: var(--ink); font: 500 11.5px/1 "Geist",sans-serif; padding: 7px 14px;
  border-radius: 999px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  transition: background .12s;
}
.info-banner-link:hover { background: var(--chip-bg); }

.msg { display: flex; gap: 10px; align-items: flex-start; max-width: 760px; }
.msg.user { flex-direction: row-reverse; align-self: flex-end; }

.av {
  width: 26px; height: 26px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: "Inter",sans-serif; font-size: 10px; font-weight: 600;
  border: 1.25px solid var(--border-strong);
}
.av.ai { border-radius: 7px; background: var(--accent-soft); color: var(--accent-ink); }
.av.user { border-radius: 50%; background: var(--chip-bg); color: rgba(31,29,27,0.6); }

.bub {
  padding: 12px 14px; border: 1.25px solid var(--border-strong);
  border-radius: 14px 14px 14px 4px; background: var(--bg);
  font-size: 13.5px; line-height: 1.55; max-width: 560px;
}
.msg.user .bub { border-radius: 14px 14px 4px 14px; background: var(--chip-bg); }
.bub b { font-weight: 600; }

.bub-tokens { display: inline-flex; flex-wrap: wrap; gap: 5px; align-items: center; margin-right: 6px; }
.bub-token {
  padding: 2px 8px; border-radius: 5px;
  background: var(--accent-soft); color: var(--accent-ink);
  border: 1px solid var(--accent); font-size: 11.5px; font-weight: 500;
}

/* typing dots */
.typing { display: inline-flex; gap: 3px; padding: 4px 0; }
.typing span {
  width: 6px; height: 6px; border-radius: 50%; background: rgba(31,29,27,0.35);
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: .4; }
  40% { transform: translateY(-4px); opacity: 1; }
}

/* quick chips — rendered inside stream, below AI bubble */
.quick-chips { margin-left: 36px; display: flex; flex-wrap: wrap; gap: 6px; padding-bottom: 4px; }

/* car recommendation cards */
.recs { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.rec {
  width: 200px; border: 1.25px solid var(--border-strong); border-radius: 10px;
  background: var(--bg); padding: 10px; display: flex; flex-direction: column; gap: 8px;
}
.rec-ph {
  background: repeating-linear-gradient(135deg,rgba(31,29,27,.05) 0 6px,rgba(0,0,0,0) 6px 12px), var(--bg);
  border: 1.25px dashed rgba(31,29,27,0.18); border-radius: 8px; height: 78px;
  display: flex; align-items: center; justify-content: center;
  font-family: "Inter",sans-serif; font-size: 10.5px; color: var(--muted);
}
.rec-name { font-size: 12.5px; font-weight: 600; }
.rec-badge {
  font-family: "Inter",sans-serif; font-size: 9.5px;
  padding: 2px 5px; border-radius: 4px; background: var(--accent-soft); color: var(--accent-ink);
}
.rec-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.rec-tag {
  font-family: "Inter",sans-serif; font-size: 9.5px;
  padding: 2px 6px; background: var(--chip-bg); color: rgba(31,29,27,0.7); border-radius: 4px;
}
.rec-actions { display: flex; gap: 6px; margin-top: 2px; }
.rec-actions span {
  flex: 1; text-align: center; padding: 5px 0; font-size: 11px;
  cursor: pointer; border-radius: 6px;
}
.rec-det { border: 1px solid var(--border-strong); color: rgba(31,29,27,0.85); }
.rec-det:hover { background: var(--chip-bg); }
.rec-cmp { background: var(--ink); color: var(--bg); }
.rec-cmp:hover { background: #333; }

/* ── composer ── */
.composer {
  border-top: 1px solid var(--border); padding: 14px 32px 20px;
  flex-shrink: 0; background: var(--bg);
}
.cbox {
  border: 1.5px solid var(--border-strong); border-radius: 14px; padding: 10px 12px;
  min-height: 62px; display: flex; flex-direction: column; gap: 8px; background: #fff;
  transition: border-color .15s, box-shadow .15s;
}
.cbox:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.tokens-row { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.token {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 4px 3px 9px; border-radius: 6px;
  background: var(--accent-soft); color: var(--accent-ink);
  border: 1px solid var(--accent); font-size: 11.5px; font-weight: 500;
}
.token button {
  appearance: none; border: 0; background: transparent; color: inherit;
  cursor: pointer; opacity: .55; font-size: 11px; padding: 0 4px; line-height: 1;
}
.token button:hover { opacity: 1; }

.input-field {
  flex: 1; min-width: 140px; appearance: none; border: 0; outline: 0; background: transparent;
  font: inherit; font-size: 13.5px; color: var(--ink); padding: 2px 0;
}
.input-field::placeholder { color: rgba(31,29,27,0.4); }

.cfoot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.cfoot-meta { font-family: "Inter",sans-serif; font-size: 10.5px; color: var(--muted); }

.btn-send {
  appearance: none; border: 1.5px solid var(--accent-ink); background: var(--accent); color: #fff;
  padding: 8px 16px; border-radius: 999px; font: 600 12px/1 "Geist",sans-serif; cursor: pointer;
  box-shadow: 2px 2px 0 var(--accent-ink); transition: transform .08s, box-shadow .08s;
}
.btn-send:hover:not(:disabled) { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--accent-ink); }
.btn-send:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

/* chip (shared between quick + filter) */
.chip {
  padding: 5px 10px; border: 1px solid var(--border-strong); border-radius: 999px;
  font: 500 11.5px/1 "Geist",sans-serif; color: rgba(31,29,27,0.85); background: var(--bg);
  cursor: pointer; user-select: none; transition: all .12s;
}
.chip:hover { background: var(--chip-bg); }
.chip.on { background: var(--accent-soft); color: var(--accent-ink); border-color: var(--accent); }

/* ── sidebar ── */
.side {
  width: 570px; border-left: 1px solid var(--border); background: var(--bg);
  display: flex; flex-direction: column; flex-shrink: 0;
  min-width: 320px; max-width: 760px;
}
.side-head {
  padding: 14px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.side-head b { font-size: 13px; font-weight: 600; }
.side-head-actions { display: flex; align-items: center; gap: 8px; }
.side-reset { font-family: "Inter",sans-serif; font-size: 10px; color: var(--muted); cursor: pointer; background: none; border: none; }
.side-reset:hover { color: var(--ink); }
.btn-apply {
  appearance: none; background: transparent; color: var(--muted);
  border: 1px solid rgba(31,29,27,0.2); border-radius: 999px;
  font: 500 11px/1 "Geist",sans-serif; padding: 6px 13px; cursor: default;
  transition: all .2s;
}
.btn-apply.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent-ink);
  box-shadow: 2px 2px 0 var(--accent-ink);
  cursor: pointer;
}
.btn-apply.active:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--accent-ink); }
.side-body { padding: 16px 40px 16px 24px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }

/* budget slider module */
.budget-module { display: flex; flex-direction: column; gap: 10px; }
.budget-vals { display: flex; justify-content: space-between; font-family: "Inter",sans-serif; font-size: 10.5px; color: var(--muted); }
.budget-input {
  width: 100%; appearance: none; height: 4px; border-radius: 2px;
  background: linear-gradient(to right, var(--accent) 0%, var(--accent) 50%, rgba(31,29,27,0.15) 50%);
  outline: none; cursor: pointer;
}
.budget-input::-webkit-slider-thumb {
  appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: #fff; border: 2px solid var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,0.18); cursor: pointer;
}
.budget-bottom-row {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.budget-selected {
  font-family: "Inter",sans-serif; font-size: 12px; font-weight: 500;
  color: var(--ink);
}
.btn-budget-send {
  appearance: none; background: var(--ink); color: #fff;
  border: 1.5px solid var(--ink); border-radius: 8px;
  font: 600 11.5px/1 "Geist",sans-serif; padding: 8px 14px; cursor: pointer;
  white-space: nowrap; transition: background .12s; flex-shrink: 0;
}
.btn-budget-send:hover { background: #333; }

/* drag handle between chat and sidebar */
.resize-handle {
  width: 5px; flex-shrink: 0; cursor: col-resize;
  background: transparent; position: relative;
  transition: background .15s;
}
.resize-handle::after {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 1px; height: 40px;
  background: var(--border-strong); border-radius: 1px; opacity: 0.35;
  transition: opacity .15s, height .15s;
}
.resize-handle:hover::after,
.resize-handle.dragging::after { opacity: 0.8; height: 60px; }
.resize-handle:hover,
.resize-handle.dragging { background: var(--accent-soft); }

.filter-group { display: flex; flex-direction: column; gap: 8px; }
.filter-label {
  font-family: "Inter",sans-serif; font-size: 10px;
  color: var(--muted); letter-spacing: .08em; text-transform: uppercase;
}
.chips-row { display: flex; flex-wrap: wrap; gap: 6px; }

/* ── responsive ── */
@media (max-width: 900px) {
  .side { width: 240px; }
  .stream { padding: 16px 20px; }
  .composer { padding: 12px 20px 16px; }
}
@media (max-width: 640px) {
  .main { flex-direction: column; position: relative; }
  .stream { padding: 14px 16px; gap: 12px; }
  .composer { padding: 10px 16px 14px; }
  .bub { font-size: 13px; max-width: calc(100vw - 80px); }
  .recs { flex-direction: column; }
  .rec { width: 100%; }
  .side {
    position: fixed; bottom: 0; left: 0; right: 0;
    width: 100%; height: 72vh;
    border-left: none; border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    transform: translateY(100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    z-index: 100;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.10);
  }
  .side.open { transform: translateY(0); }
  .side-head { position: relative; }
  .side-head::before {
    content: ''; display: block; position: absolute;
    top: 8px; left: 50%; transform: translateX(-50%);
    width: 36px; height: 4px;
    background: var(--border-strong); border-radius: 2px; opacity: .35;
  }
  .btn-filter { display: flex !important; }
  .topbar { padding: 0 16px; gap: 10px; }
  .topbar-title { font-size: 12px; }
}
.drawer-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.25); z-index: 99;
}
.drawer-backdrop.open { display: block; }
.btn-filter {
  display: none;
  appearance: none; border: 1px solid rgba(31,29,27,0.3); background: transparent;
  color: rgba(31,29,27,0.65); font: 500 11px/1 "Geist",sans-serif; padding: 6px 11px;
  border-radius: 999px; cursor: pointer; align-items: center;
}
.btn-filter:hover { color: var(--ink); border-color: rgba(31,29,27,0.6); }

/* error toast */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #ef4444; color: #fff; font-size: 12px; padding: 8px 16px;
  border-radius: 8px; z-index: 999; opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">

  <!-- top bar -->
  <div class="topbar">
    <b class="topbar-title" style="font-size:14px;">Möller Bil · Find a car</b>
    <div class="topbar-spacer"></div>
    <button class="btn-reset-all" onclick="resetAll()">Reset chat</button>
    <button class="btn-filter" onclick="toggleDrawer()">Filters ↑</button>
  </div>

  <!-- main: [spacer] [chat + sidebar] [spacer] -->
  <div class="main">
    <div class="col-spacer left"></div>
    <div class="col-center">

    <!-- chat area -->
    <div class="chat">

      <!-- info banner -->
      <div class="info-banner">
        <div class="info-banner-text">
          <b>More than just finding a car</b>
          <span>Möller Bil offers insurance, service plans, financing, trade-ins and more.</span>
        </div>
        <a class="info-banner-link" href="#" target="_blank">Learn more →</a>
      </div>

      <div class="stream" id="stream"></div>

      <!-- composer -->
      <div class="composer">
        <div class="cbox">
          <div class="tokens-row" id="tokensRow">
            <input class="input-field" id="inputField" placeholder="Tell the assistant what you need…"
              onkeydown="handleKey(event)" oninput="updateSend()">
          </div>
          <div class="cfoot">
            <button class="btn-send" id="btnSend" disabled onclick="sendMessage()">Send →</button>
          </div>
        </div>
      </div>
    </div>

    <!-- drag handle -->
    <div class="resize-handle" id="resizeHandle" title="Drag to resize"></div>

    <!-- right sidebar -->
    <aside class="side" id="side">
      <div class="side-head">
        <b>Refine search</b>
        <div class="side-head-actions">
          <button class="side-reset" onclick="resetFilters()">reset</button>
          <button class="btn-apply" id="btnApply" onclick="applyFilters()">Apply →</button>
        </div>
      </div>
      <div class="side-body" id="sideBody"></div>
    </aside>

    </div><!-- /col-center -->
    <div class="col-spacer right"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="drawer-backdrop" id="drawerBackdrop" onclick="toggleDrawer()"></div>

<script>
// ── config ──────────────────────────────────────────────────────────────
const DEEPSEEK_API_KEY = 'sk-014c7c0d0b8a48d19db2ace18c9b0cce';
const DEEPSEEK_URL = 'https://api.deepseek.com/chat/completions';

const SYSTEM_PROMPT = `You are a friendly car advisor at Möller Bil. Help users find the right car through natural conversation.

Rules:
- Ask ONE question at a time, keep replies short (2-3 sentences max unless recommending)
- Start by asking something open and easy — like what's prompting them to look for a car, or what their current situation is. Do NOT ask about car usage scenarios first.
- Gather info gradually: situation/motivation → passengers → budget → fuel type → must-haves
- Validate briefly before moving on ("Got it.", "That helps.", etc.)
- Always respond in English

IMPORTANT: End every reply (except recommendations) with a JSON block of 3-4 short suggested replies the user could tap, directly relevant to your question. Format:
SUGGESTIONS:["option 1","option 2","option 3","option 4"]

When recommending, use this format (no SUGGESTIONS block needed):
RECOMMENDATIONS:
Model: [Brand Model Year]
Type: [e.g. Hybrid SUV]
Seats: [number]
Price: [e.g. $35k]
Why: [1 sentence tied to their situation]
---
(max 3 cars)`;

// ── state ────────────────────────────────────────────────────────────────
let messages = [];   // { role, content } for API
let uiMessages = []; // rendered messages
let activeTokens = [];
let activeChips = {};
let isStreaming = false;

// ── filter taxonomy ──────────────────────────────────────────────────────
const FILTERS = [
  { key: 'usage',  title: 'Usage',           options: ['Commuting','City driving','Mountain trips','Family use','Road trips','Leisure'] },
  { key: 'seats',  title: 'Number of seats', options: ['2','4','5','6','7+'] },
  { key: 'fuel',   title: 'Fuel type',       options: ['Electric','Hybrid','Petrol','Diesel'] },
  { key: 'size',   title: 'Vehicle size',    options: ['City','Compact','Mid-size','Family','SUV','Van'] },
];

function tokenLabel(key, opt) {
  return key === 'seats' ? `${opt} seats` : opt;
}

// ── init ─────────────────────────────────────────────────────────────────
function init() {
  buildSidebar();
  showOnboarding();
}

// ── sidebar ───────────────────────────────────────────────────────────────
function buildSidebar() {
  const body = document.getElementById('sideBody');
  body.innerHTML = '';

  FILTERS.forEach(group => {
    const div = document.createElement('div');
    div.className = 'filter-group';
    div.innerHTML = `<div class="filter-label">${group.title}</div><div class="chips-row" id="grp-${group.key}"></div>`;
    body.appendChild(div);

    const row = div.querySelector(`#grp-${group.key}`);
    group.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = opt;
      const key = `${group.key}:${opt}`;
      if (activeChips[key]) btn.classList.add('on');
      btn.onclick = () => toggleChip(group.key, opt, btn, key);
      row.appendChild(btn);
    });
  });

  // brand selector
  const brandGroup = document.createElement('div');
  brandGroup.className = 'filter-group';
  brandGroup.innerHTML = `<div class="filter-label">Brand</div><div class="chips-row" id="grp-brand"></div>`;
  body.appendChild(brandGroup);

  const BRANDS = ['Audi','BMW','Mercedes','Volkswagen','Toyota','Volvo','Peugeot','Renault','Ford','Kia','Hyundai','Tesla'];
  const brandRow = brandGroup.querySelector('#grp-brand');
  BRANDS.forEach(brand => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = brand;
    const key = `brand:${brand}`;
    if (activeChips[key]) btn.classList.add('on');
    btn.onclick = () => toggleChip('brand', brand, btn, key);
    brandRow.appendChild(btn);
  });

  // budget slider
  const budgetGroup = document.createElement('div');
  budgetGroup.className = 'filter-group';
  budgetGroup.innerHTML = `
    <div class="filter-label">Budget</div>
    <div class="budget-module">
      <div class="budget-vals"><span>50 000 kr</span><span>1 500 000 kr</span></div>
      <input class="budget-input" id="budgetSlider" type="range"
        min="50000" max="1500000" step="25000" value="400000"
        oninput="updateBudgetDisplay(this.value)">
      <div class="budget-bottom-row">
        <span class="budget-selected" id="budgetSelected">Up to 400 000 kr</span>
      </div>
    </div>
  `;
  body.appendChild(budgetGroup);
  updateBudgetSliderTrack(400000);
  // restore apply button state after re-render
  setApplyVisible(pendingManualChange);
}

// tracks whether user has manually changed filters since last apply
let pendingManualChange = false;

function setApplyVisible(v) {
  const btn = document.getElementById('btnApply');
  if (btn) {
    btn.classList.toggle('active', v);
    btn.disabled = !v;
  }
}

function toggleChip(groupKey, opt, btn, key) {
  if (activeChips[key]) {
    delete activeChips[key];
    btn.classList.remove('on');
  } else {
    activeChips[key] = true;
    btn.classList.add('on');
  }
  pendingManualChange = true;
  setApplyVisible(true);
}

function applyFilters() {
  // build a human-readable summary of all active chips
  const parts = [];
  const grouped = {};
  Object.keys(activeChips).forEach(key => {
    const [groupKey, opt] = key.split(':');
    if (!grouped[groupKey]) grouped[groupKey] = [];
    grouped[groupKey].push(opt);
  });

  const labelMap = {
    usage: 'usage', seats: 'seats', fuel: 'fuel type',
    size: 'vehicle size', brand: 'brand'
  };

  Object.entries(grouped).forEach(([groupKey, opts]) => {
    if (groupKey === 'seats') {
      parts.push(`${opts.join(' or ')} seat${opts.length > 1 ? 's' : ''}`);
    } else {
      parts.push(opts.join(' or '));
    }
  });

  // also include budget if slider was moved
  const slider = document.getElementById('budgetSlider');
  const budgetEl = document.getElementById('budgetSelected');
  if (slider && parseInt(slider.value) !== 400000 && budgetEl) {
    parts.push(budgetEl.textContent.toLowerCase());
  }

  if (parts.length === 0) return;

  const msg = `I'm looking for: ${parts.join(', ')}.`;
  document.getElementById('inputField').value = msg;
  updateSend();
  sendMessage();

  pendingManualChange = false;
  setApplyVisible(false);
}

function updateBudgetDisplay(val) {
  const n = parseInt(val);
  const formatted = n.toLocaleString('nb-NO') + ' kr';
  const el = document.getElementById('budgetSelected');
  if (el) el.textContent = 'Up to ' + formatted;
  updateBudgetSliderTrack(n);
}

function updateBudgetSliderTrack(val) {
  const slider = document.getElementById('budgetSlider');
  if (!slider) return;
  const min = 50000, max = 1500000;
  const pct = ((val - min) / (max - min)) * 100;
  slider.style.background = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}%, rgba(31,29,27,0.15) ${pct}%)`;
}

function sendBudget() {
  const slider = document.getElementById('budgetSlider');
  if (!slider) return;
  const val = parseInt(slider.value);
  const formatted = val.toLocaleString('nb-NO') + ' kr';
  const msg = `My budget is up to ${formatted}`;
  document.getElementById('inputField').value = msg;
  updateSend();
  sendMessage();
}

// ── sync chat content → sidebar filters ──────────────────────────────────
// Build a flat lookup: lowercase option text → { groupKey, opt }
function buildFilterLookup() {
  const map = {};
  FILTERS.forEach(group => {
    group.options.forEach(opt => {
      map[opt.toLowerCase()] = { groupKey: group.key, opt };
    });
  });
  // also add BRANDS
  const BRANDS = ['Audi','BMW','Mercedes','Volkswagen','Toyota','Volvo','Peugeot','Renault','Ford','Kia','Hyundai','Tesla'];
  BRANDS.forEach(b => { map[b.toLowerCase()] = { groupKey: 'brand', opt: b }; });
  return map;
}

function syncFiltersFromText(text) {
  const lookup = buildFilterLookup();
  const lower = text.toLowerCase();
  let changed = false;

  Object.entries(lookup).forEach(([word, { groupKey, opt }]) => {
    // match whole word only to avoid false positives
    const re = new RegExp(`\\b${word}\\b`);
    if (re.test(lower)) {
      const key = `${groupKey}:${opt}`;
      if (!activeChips[key]) {
        activeChips[key] = true;
        changed = true;
      }
    }
  });

  if (changed) buildSidebar(); // re-render sidebar with new highlights
}

function resetFilters() {
  activeChips = {};
  activeTokens = [];
  pendingManualChange = false;
  setApplyVisible(false);
  renderTokens();
  buildSidebar();
}

// ── tokens ────────────────────────────────────────────────────────────────
function addToken(label) {
  if (!activeTokens.includes(label)) {
    activeTokens.push(label);
    renderTokens();
    updateSend();
  }
}

function removeToken(label) {
  activeTokens = activeTokens.filter(t => t !== label);
  // deselect chip
  Object.keys(activeChips).forEach(key => {
    const [groupKey, opt] = key.split(':');
    if (tokenLabel(groupKey, opt) === label) delete activeChips[key];
  });
  renderTokens();
  buildSidebar();
  updateSend();
}

function renderTokens() {
  const row = document.getElementById('tokensRow');
  const input = document.getElementById('inputField');
  // remove existing token elements
  row.querySelectorAll('.token').forEach(el => el.remove());
  activeTokens.forEach(label => {
    const span = document.createElement('span');
    span.className = 'token';
    span.innerHTML = `${label}<button onclick="removeToken('${label}')">×</button>`;
    row.insertBefore(span, input);
  });
  const tc = document.getElementById('tokenCount');
  if (tc) tc.textContent = activeTokens.length;
}

// ── chat UI helpers ───────────────────────────────────────────────────────
function appendAIMessage(text, suggestions = []) {
  const stream = document.getElementById('stream');
  stream.querySelectorAll('.quick-chips').forEach(el => el.remove());

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg ai';
  msgDiv.innerHTML = `<div class="av ai">AI</div><div class="bub"></div>`;
  stream.appendChild(msgDiv);

  const bub = msgDiv.querySelector('.bub');
  const formatted = formatText(text);

  // typewriter: reveal HTML char by char, respecting tags
  let i = 0;
  const chars = [...formatted]; // spread preserves multi-byte chars
  // but we need to stream the raw HTML safely — parse into segments first
  // Strategy: build full HTML, then reveal via clip using a character counter
  // on the *text* content only, keeping tags intact
  const full = formatted;
  const textOnly = text; // original plain text length drives the timing

  let revealed = 0;
  const total = textOnly.length;
  const speed = 18; // ms per character

  function tick() {
    revealed = Math.min(revealed + 2, total);
    // calculate what fraction of text is revealed
    const ratio = revealed / total;
    // slice the formatted HTML proportionally by stripping trailing text
    // Simple approach: reveal formatted HTML up to ratio of its plain-text length
    const plainSoFar = Math.floor(ratio * textOnly.length);
    let plainCount = 0;
    let htmlOut = '';
    let inTag = false;
    for (let ci = 0; ci < full.length; ci++) {
      const ch = full[ci];
      if (ch === '<') { inTag = true; }
      if (inTag) { htmlOut += ch; if (ch === '>') inTag = false; continue; }
      if (plainCount >= plainSoFar) break;
      htmlOut += ch;
      plainCount++;
    }
    bub.innerHTML = htmlOut;
    stream.scrollTop = stream.scrollHeight;

    if (revealed < total) {
      setTimeout(tick, speed);
    } else {
      // done — show full text and append chips
      bub.innerHTML = full;
      if (suggestions.length > 0) {
        const chipsDiv = document.createElement('div');
        chipsDiv.className = 'quick-chips';
        suggestions.forEach(label => {
          const btn = document.createElement('button');
          btn.className = 'chip';
          btn.textContent = label;
          btn.onclick = () => {
            const input = document.getElementById('inputField');
            input.value = label;
            input.focus();
            updateSend();
          };
          chipsDiv.appendChild(btn);
        });
        stream.appendChild(chipsDiv);
      }
      stream.scrollTop = stream.scrollHeight;
    }
  }
  tick();
  return msgDiv;
}

function appendUserMessage(text, tokens) {
  const stream = document.getElementById('stream');

  // hide chips when user sends a message
  stream.querySelectorAll('.quick-chips').forEach(el => el.remove());

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg user';
  let tokenHtml = '';
  if (tokens.length > 0) {
    tokenHtml = `<span class="bub-tokens">${tokens.map(t => `<span class="bub-token">${t}</span>`).join('')}</span>`;
  }
  msgDiv.innerHTML = `
    <div class="av user">U</div>
    <div class="bub">${tokenHtml}${text ? escapeHtml(text) : ''}</div>
  `;
  stream.appendChild(msgDiv);
  stream.scrollTop = stream.scrollHeight;
}

function appendTypingIndicator() {
  const stream = document.getElementById('stream');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg ai';
  msgDiv.id = 'typingMsg';
  msgDiv.innerHTML = `
    <div class="av ai">AI</div>
    <div class="bub"><span class="typing"><span></span><span></span><span></span></span></div>
  `;
  stream.appendChild(msgDiv);
  stream.scrollTop = stream.scrollHeight;
  return msgDiv;
}

function removeTypingIndicator() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}


// ── recommendation card parser ────────────────────────────────────────────
function parseRecs(text) {
  if (!text.includes('RECOMMENDATIONS:')) return null;
  const parts = text.split('---').map(s => s.trim()).filter(Boolean);
  return parts.map(part => {
    const get = (key) => {
      const match = part.match(new RegExp(`${key}:\\s*(.+)`));
      return match ? match[1].trim() : '';
    };
    return {
      model: get('Model'),
      type:  get('Type'),
      seats: get('Seats'),
      price: get('Price'),
      why:   get('Why'),
    };
  }).filter(r => r.model);
}

function renderRecs(recs, container) {
  const recsDiv = document.createElement('div');
  recsDiv.className = 'recs';
  recs.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'rec';
    card.innerHTML = `
      <div class="rec-ph">[ car shot ]</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span class="rec-name">${escapeHtml(r.model)}</span>
        ${i === 0 ? '<span class="rec-badge">best match</span>' : ''}
      </div>
      <div class="rec-tags">
        ${r.type ? `<span class="rec-tag">${escapeHtml(r.type)}</span>` : ''}
        ${r.seats ? `<span class="rec-tag">${escapeHtml(r.seats)} seats</span>` : ''}
        ${r.price ? `<span class="rec-tag">${escapeHtml(r.price)}</span>` : ''}
      </div>
      ${r.why ? `<div style="font-size:11px;color:var(--muted);line-height:1.4">${escapeHtml(r.why)}</div>` : ''}
      <div class="rec-actions">
        <span class="rec-det">Details</span>
        <span class="rec-cmp">Compare</span>
      </div>
    `;
    recsDiv.appendChild(card);
  });
  container.querySelector('.bub').appendChild(recsDiv);
}

// ── send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  const tokens = [...activeTokens];
  if (!text && tokens.length === 0) return;

  // build combined content
  const combined = tokens.length > 0
    ? (tokens.join(', ') + (text ? '. ' + text : ''))
    : text;

  // render user bubble
  appendUserMessage(text, tokens);

  // sync sidebar filters from what the user said, then clear input
  syncFiltersFromText(combined);
  input.value = '';
  activeTokens = [];
  // keep activeChips that were synced from text — only remove the token pills
  renderTokens();
  updateSend();

  // push to history
  messages.push({ role: 'user', content: combined });

  // show typing
  isStreaming = true;
  document.getElementById('btnSend').disabled = true;
  appendTypingIndicator();

  try {
    const resp = await fetch(DEEPSEEK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`,
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        max_tokens: 800,
        stream: false,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...messages,
        ],
      }),
    });

    if (!resp.ok) {
      const errBody = await resp.text();
      let errMsg = `HTTP ${resp.status}`;
      try { errMsg = JSON.parse(errBody).error?.message || errMsg; } catch(e) {}
      throw new Error(errMsg);
    }

    const data = await resp.json();
    const aiText = data.choices?.[0]?.message?.content || '';
    if (!aiText) throw new Error('Empty response from API');
    messages.push({ role: 'assistant', content: aiText });

    removeTypingIndicator();

    // check if it has recommendations
    const recs = parseRecs(aiText);
    if (recs && recs.length > 0) {
      const intro = aiText.split('RECOMMENDATIONS:')[0].trim();
      const msgEl = appendAIMessage(intro || 'Here are my top picks for you:', ['Compare these', 'Tell me more', 'Different budget', 'What about EVs?']);
      renderRecs(recs, msgEl);
    } else {
      // extract AI-generated suggestions and clean text
      const { cleanText, suggestions } = parseSuggestions(aiText);
      appendAIMessage(cleanText, suggestions);
    }

  } catch (err) {
    removeTypingIndicator();
    showToast('Error: ' + err.message);
    appendAIMessage('Sorry, something went wrong. Please try again.', []);
    messages.pop(); // remove failed user message
  } finally {
    isStreaming = false;
    updateSend();
  }
}

function parseSuggestions(text) {
  const match = text.match(/SUGGESTIONS:\s*(\[.*?\])/s);
  if (match) {
    try {
      const suggestions = JSON.parse(match[1]);
      const cleanText = text.replace(/SUGGESTIONS:\s*\[.*?\]/s, '').trim();
      return { cleanText, suggestions };
    } catch(e) {}
  }
  return { cleanText: text, suggestions: [] };
}

// ── onboarding spotlight tour ─────────────────────────────────────────────
const ONBOARDING_STEPS = [
  {
    target: '.chat',
    title: 'Chat with your advisor',
    body: "No car knowledge needed. Just talk naturally — about your life, your needs, your budget. The AI will guide you step by step.",
    pos: 'right',
  },
  {
    target: '.side',
    title: 'Refine with filters',
    body: "Use these chips to quickly narrow things down by seat count, fuel type, or vehicle size. Your choices are sent straight to the conversation.",
    pos: 'left',
  },
  {
    target: '.stream',
    title: 'Get matched cars',
    body: "Once the advisor understands your situation, it'll recommend specific models — with reasons tailored to you. You can keep asking questions anytime.",
    pos: 'right',
  },
];

let onboardingStep = 0;

function showOnboarding() {
  onboardingStep = 0;
  // show the greeting in chat first, then overlay the tour on top
  const greeting = "Hi! I'm your car advisor at Möller Bil — no car knowledge needed. **What's got you thinking about a new car?**";
  appendAIMessage(greeting, ["My current car needs replacing", "It's my first car", "I want something different", "Just exploring options"]);
  messages.push({ role: 'assistant', content: greeting });
  renderOnboardingStep();
}

function renderOnboardingStep() {
  // remove previous overlay pieces
  document.querySelectorAll('.ob-overlay, .ob-card').forEach(el => el.remove());

  const step = ONBOARDING_STEPS[onboardingStep];
  const targetEl = document.querySelector(step.target);

  // full-screen dim overlay with a "hole" cut via box-shadow
  const overlay = document.createElement('div');
  overlay.className = 'ob-overlay';
  overlay.style.cssText = `
    position:fixed; inset:0; z-index:300; pointer-events:none;
  `;

  // individual pane dims
  // dim everything except the target by overlaying semi-transparent divs
  const dimAll = document.createElement('div');
  dimAll.style.cssText = `
    position:fixed; inset:0; background:rgba(10,10,10,0.55);
    z-index:300; pointer-events:all;
    transition: opacity .35s;
  `;

  // cut a hole by clipping around the target
  if (targetEl) {
    const r = targetEl.getBoundingClientRect();
    dimAll.style.background = 'transparent';
    dimAll.style.pointerEvents = 'none';

    // four dim rects around the target
    const rects = [
      { top:0, left:0, width:'100%', height: r.top+'px' },
      { top: r.bottom+'px', left:0, width:'100%', bottom:0 },
      { top: r.top+'px', left:0, width: r.left+'px', height: r.height+'px' },
      { top: r.top+'px', left: r.right+'px', right:0, height: r.height+'px' },
    ];
    rects.forEach(s => {
      const d = document.createElement('div');
      d.style.cssText = `position:fixed; background:rgba(10,10,10,0.60); z-index:300; pointer-events:all;`;
      Object.assign(d.style, s);
      overlay.appendChild(d);
    });

    // subtle highlight border on target
    const highlight = document.createElement('div');
    highlight.style.cssText = `
      position:fixed;
      top:${r.top}px; left:${r.left}px;
      width:${r.width}px; height:${r.height}px;
      border:2px solid rgba(124,92,255,0.7);
      border-radius:8px; z-index:301;
      pointer-events:none;
      box-shadow: 0 0 0 4px rgba(124,92,255,0.12);
      transition: all .35s;
    `;
    overlay.appendChild(highlight);
  }

  document.body.appendChild(overlay);

  // floating card
  const card = document.createElement('div');
  card.className = 'ob-card';
  card.style.cssText = `
    position:fixed; z-index:400;
    background:#fff; border:1px solid rgba(31,29,27,0.14);
    border-radius:16px; padding:22px 24px; width:280px;
    box-shadow:0 8px 32px rgba(0,0,0,0.18);
    font-family:"Geist","Inter",system-ui,sans-serif;
    animation: ob-fadein .28s ease;
  `;

  const isLast = onboardingStep === ONBOARDING_STEPS.length - 1;
  const stepNum = onboardingStep + 1;
  const total   = ONBOARDING_STEPS.length;

  card.innerHTML = `
    <style>
      @keyframes ob-fadein { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
      .ob-dots { display:flex; gap:5px; margin-bottom:14px; }
      .ob-dot { width:6px; height:6px; border-radius:50%; background:rgba(31,29,27,0.18); }
      .ob-dot.active { background:#7c5cff; }
      .ob-step-label { font-family:"Inter",sans-serif; font-size:10px; color:rgba(31,29,27,0.45); letter-spacing:.07em; text-transform:uppercase; margin-bottom:6px; }
      .ob-title { font-size:15px; font-weight:600; color:#1f1d1b; margin-bottom:8px; line-height:1.3; }
      .ob-body { font-size:13px; color:rgba(31,29,27,0.6); line-height:1.6; margin-bottom:18px; }
      .ob-actions { display:flex; justify-content:space-between; align-items:center; }
      .ob-skip { font-size:11.5px; color:rgba(31,29,27,0.4); cursor:pointer; background:none; border:none; font-family:inherit; }
      .ob-skip:hover { color:rgba(31,29,27,0.7); }
      .ob-next { appearance:none; background:#7c5cff; color:#fff; border:1.5px solid #4a32c4;
        padding:8px 18px; border-radius:999px; font:600 12px/1 "Geist",sans-serif; cursor:pointer;
        box-shadow:2px 2px 0 #4a32c4; transition:transform .08s, box-shadow .08s; }
      .ob-next:hover { transform:translate(-1px,-1px); box-shadow:3px 3px 0 #4a32c4; }
    </style>
    <div class="ob-dots">
      ${Array.from({length:total}, (_,i) => `<div class="ob-dot${i===onboardingStep?' active':''}"></div>`).join('')}
    </div>
    <div class="ob-step-label">${stepNum} of ${total}</div>
    <div class="ob-title">${step.title}</div>
    <div class="ob-body">${step.body}</div>
    <div class="ob-actions">
      <button class="ob-skip" onclick="finishOnboarding()">Skip tour</button>
      <button class="ob-next" onclick="${isLast ? 'finishOnboarding()' : 'nextOnboardingStep()'}">${isLast ? 'Get started →' : 'Next →'}</button>
    </div>
  `;

  // position card next to target
  if (targetEl) {
    const r = targetEl.getBoundingClientRect();
    if (step.pos === 'right') {
      card.style.left  = (r.right + 16) + 'px';
      card.style.top   = (r.top + r.height/2 - 120) + 'px';
    } else {
      card.style.right = (window.innerWidth - r.left + 16) + 'px';
      card.style.top   = (r.top + r.height/2 - 120) + 'px';
    }
    // clamp vertically
    const cardH = 260;
    const top = parseFloat(card.style.top);
    if (top < 12) card.style.top = '12px';
    if (top + cardH > window.innerHeight - 12) card.style.top = (window.innerHeight - cardH - 12) + 'px';
  } else {
    card.style.top  = '50%';
    card.style.left = '50%';
    card.style.transform = 'translate(-50%,-50%)';
  }

  document.body.appendChild(card);
}

function nextOnboardingStep() {
  onboardingStep++;
  if (onboardingStep >= ONBOARDING_STEPS.length) { finishOnboarding(); return; }
  renderOnboardingStep();
}

function finishOnboarding() {
  document.querySelectorAll('.ob-overlay, .ob-card').forEach(el => {
    el.style.transition = 'opacity .25s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 260);
  });
}

function startChat() { finishOnboarding(); }

// ── utils ─────────────────────────────────────────────────────────────────
function formatText(text) {
  return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function updateSend() {
  const input = document.getElementById('inputField');
  const btn = document.getElementById('btnSend');
  const hasContent = input.value.trim().length > 0 || activeTokens.length > 0;
  btn.disabled = !hasContent || isStreaming;
}

function resetAll() {
  messages = [];
  uiMessages = [];
  activeTokens = [];
  activeChips = {};
  document.getElementById('stream').innerHTML = '';
  document.getElementById('inputField').value = '';
  renderTokens();
  buildSidebar();
  updateSend();
  showOnboarding();
}

function toggleDrawer() {
  const side = document.querySelector('.side');
  const backdrop = document.getElementById('drawerBackdrop');
  const btn = document.querySelector('.btn-filter');
  const isOpen = side.classList.toggle('open');
  backdrop.classList.toggle('open', isOpen);
  if (btn) btn.textContent = isOpen ? 'Filters ↓' : 'Filters ↑';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ── sidebar resize ────────────────────────────────────────────────────────
(function() {
  const handle = document.getElementById('resizeHandle');
  const side   = document.getElementById('side');
  if (!handle || !side) return;

  let startX, startW;

  handle.addEventListener('mousedown', e => {
    startX = e.clientX;
    startW = side.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    function onMove(e) {
      const delta = startX - e.clientX; // dragging left = wider sidebar
      const newW = Math.min(520, Math.max(200, startW + delta));
      side.style.width = newW + 'px';
    }
    function onUp() {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
})();

// ── start ─────────────────────────────────────────────────────────────────
init();
