    budgetGroup.dataset.state = isConfirmed ? 'confirmed' : 'pending';
    budgetGroup.innerHTML = `
      ${sectionHeadHtml('budget', 'Budget', isConfirmed)}
      <div class="filter-value${isConfirmed ? '' : ' placeholder'}">${
        isConfirmed ? escapeHtml(budgetSummary) : escapeHtml(placeholder)
      }</div>
      <button class="filter-change-toggle" type="button" onclick="toggleFilterEdit(this)">${
        isConfirmed ? 'Adjust' : 'Set it now'
      }</button>
      <div class="filter-edit">
        <div class="budget-module">
          <div class="budget-vals"><span>50 000 kr</span><span>1 500 000 kr</span></div>
          <div class="budget-track" id="budgetTrack">
            <div class="budget-track-fill" id="budgetTrackFill"></div>
            <input class="budget-input" id="budgetMin" type="range"
              min="50000" max="1500000" step="25000" value="${startMin}"
              oninput="onBudgetInput('min')">
            <input class="budget-input" id="budgetMax" type="range"
              min="50000" max="1500000" step="25000" value="${startMax}"
              oninput="onBudgetInput('max')">
          </div>
          <span class="budget-selected" id="budgetSelected"></span>
        </div>
      </div>
    `;
    body.appendChild(budgetGroup);
  }

  updateBudgetDisplay();
  if (pendingBudget) { pendingManualChange = true; pendingBudget = null; }
  setApplyVisible(pendingManualChange);

  // Sort: confirmed groups first, pending groups after (preserves DOM/event listeners
  // by moving with appendChild rather than rebuilding HTML)
  const groups = Array.from(body.querySelectorAll('.filter-group'));
  groups.sort((a, b) => {
    const aConf = a.dataset.state === 'confirmed' ? 0 : 1;
    const bConf = b.dataset.state === 'confirmed' ? 0 : 1;
    return aConf - bConf;
  });
  groups.forEach(el => body.appendChild(el));

  // Show a quiet placeholder when nothing's been captured yet — the panel
  // itself stays in the layout, this just fills the visual space.
  const hasConfirmed = body.querySelector('.filter-group[data-state="confirmed"]') !== null;
  if (!hasConfirmed) {
    const empty = document.createElement('div');
    empty.className = 'side-empty-state';
    empty.textContent = "Nothing captured yet — start chatting and answers will appear here.";
    body.appendChild(empty);
  }

  // Refresh the live "Recommended for you" panel — its picks depend on the
  // same activeChips that drive the profile sections below.
  buildLiveRecs();
}

// "dirty" = sidebar has un-sent manual edits. Apply button is gone;
// edits land in the input field as a diff preview and ship with the next Send.
let pendingManualChange = false;
let prevSnapshot = null;          // state when the current edit-burst began
let dirtyChipKeys = new Set();    // chips toggled since snapshot

function takeSnapshotIfNeeded() {
  if (prevSnapshot) return;
  const sMin = document.getElementById('budgetMin');
  const sMax = document.getElementById('budgetMax');
  prevSnapshot = {
    chips:     { ...activeChips },
    budgetMin: window._lastBudget?.min ?? (sMin ? parseInt(sMin.value) : null),
    budgetMax: window._lastBudget?.max ?? (sMax ? parseInt(sMax.value) : null),
    budgetWasSet: !!getBudgetSummary(),
  };
}

function getDirtyGroupKeys() {
  const groups = new Set();
  dirtyChipKeys.forEach(k => groups.add(k.split(':')[0]));
  if (prevSnapshot) {
    const sMin = document.getElementById('budgetMin');
    const sMax = document.getElementById('budgetMax');
    if (sMin && sMax) {
      const lo = parseInt(sMin.value), hi = parseInt(sMax.value);
      if (lo !== prevSnapshot.budgetMin || hi !== prevSnapshot.budgetMax) {
        groups.add('budget');
      }
    }
  }
  return groups;
}

function refreshDirtyClasses() {
  const dirty = getDirtyGroupKeys();
  document.querySelectorAll('.filter-group').forEach(g => {
    g.classList.toggle('dirty', dirty.has(g.dataset.key));
  });
  document.body.classList.toggle('sidebar-dirty', dirty.size > 0);
  // Swap quick-reply chips ↔ update-diff display
  if (dirty.size > 0) showUpdateDiff();
  else restoreQuickReplies();
}

function setDirty(v) {
  pendingManualChange = v;
  if (!v) {
    prevSnapshot = null;
    dirtyChipKeys.clear();
  }
  refreshDirtyClasses();
}
function setApplyVisible(v) { setDirty(v); }

// Fallback simple message when there's no prior state to diff against
function buildLookingForMessage() {
  const parts = [];
  const grouped = {};
  Object.keys(activeChips).forEach(key => {
    const [groupKey, opt] = key.split(':');
    if (!grouped[groupKey]) grouped[groupKey] = [];
    grouped[groupKey].push(opt);
  });
  Object.entries(grouped).forEach(([groupKey, opts]) => {
    if (groupKey === 'seats') parts.push(`${opts.join(' or ')} seat${opts.length > 1 ? 's' : ''}`);
    else parts.push(opts.join(' or '));
  });
  const sMin = document.getElementById('budgetMin');
  const sMax = document.getElementById('budgetMax');
  const budgetEl = document.getElementById('budgetSelected');
  if (sMin && sMax && budgetEl) {
    const lo = parseInt(sMin.value), hi = parseInt(sMax.value);
    if (!(lo === 50000 && hi === 1500000)) parts.push(budgetEl.textContent.toLowerCase());
  }
  return parts.length ? `I'm looking for: ${parts.join(', ')}.` : '';
}

// Lookup the user-facing label for a filter group
function getGroupLabel(key) {
  if (key === 'budget') return 'Budget';
  if (key === 'brand')  return 'Brand preference';
  const f = (typeof FILTERS !== 'undefined') ? FILTERS.find(f => f.key === key) : null;
  return f ? f.title : key;
}

function sameSorted(a, b) {
  if (a.length !== b.length) return false;
  const sa = [...a].sort(), sb = [...b].sort();
  return sa.every((v, i) => v === sb[i]);
}

// Diff-based message that reads like a natural conversational update.
// Format: "I want to change X from A to B" — natural for both AI and user to understand.
function buildSidebarMessage() {
  if (!prevSnapshot) return buildLookingForMessage();

  const optsByGroup = (chips, key) =>
    Object.keys(chips).filter(k => k.startsWith(key + ':')).map(k => k.split(':')[1]);

  const allGroups = new Set();
  Object.keys(activeChips).forEach(k => allGroups.add(k.split(':')[0]));
  Object.keys(prevSnapshot.chips).forEach(k => allGroups.add(k.split(':')[0]));

  const lines = [];

  allGroups.forEach(gKey => {
    const prev = optsByGroup(prevSnapshot.chips, gKey);
    const curr = optsByGroup(activeChips, gKey);
    if (sameSorted(prev, curr)) return;

    const label   = getGroupLabel(gKey).toLowerCase();
    const prevStr = prev.length ? prev.join(' or ') : 'nothing';
    const currStr = curr.length ? curr.join(' or ') : 'nothing';

    if (prev.length === 0) {
      lines.push(`set my ${label} to ${currStr}`);
    } else if (curr.length === 0) {
      lines.push(`clear my ${label} (was ${prevStr})`);
    } else {
      lines.push(`change my ${label} from ${prevStr} to ${currStr}`);
    }
  });

  // Budget
  const sMin = document.getElementById('budgetMin');
  const sMax = document.getElementById('budgetMax');
  if (sMin && sMax && prevSnapshot.budgetMin != null) {
    const lo = parseInt(sMin.value), hi = parseInt(sMax.value);
    if (lo !== prevSnapshot.budgetMin || hi !== prevSnapshot.budgetMax) {
      if (prevSnapshot.budgetWasSet) {
        lines.push(`change my budget from ${formatNOK(prevSnapshot.budgetMin)} - ${formatNOK(prevSnapshot.budgetMax)} to ${formatNOK(lo)} - ${formatNOK(hi)}`);
      } else {
        lines.push(`set my budget to ${formatNOK(lo)} - ${formatNOK(hi)}`);
      }
    }
  }

  if (!lines.length) return '';

  // Single change: smooth one-liner
  if (lines.length === 1) return `I want to ${lines[0]}.`;

  // Multiple changes: header + bullet list
  return `I want to update a few things:\n- ${lines.join('\n- ')}.`;
}

function pushSidebarPreviewToInput() {
  const msg = buildSidebarMessage();
  const input = document.getElementById('inputField');
  if (!input) return;
  const current = input.value;
  const isPreview =
    !current ||
    current.startsWith("I'm looking for:") ||
    current.startsWith("Updating my profile") ||
    current.startsWith("Quick update to my profile") ||
    current.startsWith("I want to update") ||
    current.startsWith("I want to change") ||
    current.startsWith("I want to set") ||
    current.startsWith("I want to clear");
  if (isPreview) {
    input.value = msg;
    if (typeof autoGrow === 'function') autoGrow(input);
  }
  // If everything reverted back to the snapshot, clear the dirty flag
  if (!msg && prevSnapshot) setDirty(false);
  updateSend();
}

function toggleChip(groupKey, opt, btn, key) {
  takeSnapshotIfNeeded();
  const wasOn = !!activeChips[key];
  if (wasOn) { delete activeChips[key]; btn.classList.remove('on'); }
  else       { activeChips[key] = true; btn.classList.add('on'); }

  // Toggle the per-chip "pending" marker — if a chip ends up matching snapshot
  // again (toggled back), drop its pending mark.
  if (dirtyChipKeys.has(key)) {
    dirtyChipKeys.delete(key);
    btn.classList.remove('pending', 'was-on');
  } else {
    dirtyChipKeys.add(key);
    btn.classList.add('pending');
    // If this chip was originally ON and is now being turned OFF, flag it visually
    if (prevSnapshot && prevSnapshot.chips[key] && !activeChips[key]) {
      btn.classList.add('was-on');
    } else {
      btn.classList.remove('was-on');
    }
  }

  setDirty(true);
  refreshDirtyClasses();  // re-evaluate which groups are still dirty
  refreshGroupSummary(groupKey);
  pushSidebarPreviewToInput();
}

// Legacy alias — the Apply button is gone, but resetFilters etc. still expect this name.
function applyFilters() {
  const msg = buildSidebarMessage();
  if (!msg) return;
  setDirty(false);
  document.getElementById('inputField').value = msg;
  updateSend();
  sendMessage();
}

function fmtKr(n) { return parseInt(n).toLocaleString('nb-NO').replace(/,/g, ' ') + ' kr'; }

function onBudgetInput(which) {
  takeSnapshotIfNeeded();
  const sMin = document.getElementById('budgetMin');
  const sMax = document.getElementById('budgetMax');
  let lo = parseInt(sMin.value), hi = parseInt(sMax.value);
  if (which === 'min' && lo >= hi) sMin.value = (hi - 25000);
  if (which === 'max' && hi <= lo) sMax.value = (lo + 25000);
  updateBudgetDisplay();
  setDirty(true);
  pushSidebarPreviewToInput();
}

function updateBudgetDisplay() {
  const sMin = document.getElementById('budgetMin');
  const sMax = document.getElementById('budgetMax');
  const fill = document.getElementById('budgetTrackFill');
  const sel = document.getElementById('budgetSelected');
  if (!sMin || !sMax) return;
  const lo = parseInt(sMin.value), hi = parseInt(sMax.value);
  const MIN = 50000, MAX = 1500000;
  const loPct = ((lo - MIN) / (MAX - MIN)) * 100;
  const hiPct = ((hi - MIN) / (MAX - MIN)) * 100;
  if (fill) { fill.style.left = loPct + '%'; fill.style.right = (100 - hiPct) + '%'; }
  if (sel) {
    if (lo === MIN && hi === MAX) sel.textContent = 'Any budget';
    else if (lo === MIN) sel.textContent = 'Up to ' + fmtKr(hi);
    else if (hi === MAX) sel.textContent = 'From ' + fmtKr(lo);
    else sel.textContent = fmtKr(lo) + ' – ' + fmtKr(hi);
  }
  window._lastBudget = { min: lo, max: hi };
  refreshGroupSummary('budget');
}

// ── sync chat → sidebar filters ──────────────────────────────────────────
function buildFilterLookup() {
  const map = {};
  FILTERS.forEach(group => {
    group.options.forEach(opt => {
      map[opt.toLowerCase()] = { groupKey: group.key, opt };
    });
  });
  BRANDS.forEach(b => { map[b.toLowerCase()] = { groupKey: 'brand', opt: b }; });
  return map;
}

function syncFiltersFromText(text) {
  // Snapshot to detect newly-activated chips after this run
  const before = Object.assign({}, activeChips);

  // Anchor candidate = the user message that just got appended
  // (it's the last .msg element since we run AFTER appendUserMessage).
  const allMsgs = document.querySelectorAll('#stream .msg');
  const userAnchor = allMsgs.length ? allMsgs[allMsgs.length - 1] : null;
  const userAnchorId = userAnchor ? userAnchor.id : null;

  const lookup = buildFilterLookup();
  const lower = text.toLowerCase();
  let changed = false;

  Object.entries(lookup).forEach(([word, { groupKey, opt }]) => {
    const matched = word.includes(' ')
      ? lower.includes(word)
      : new RegExp(`\\b${word}\\b`).test(lower);
    if (matched) {
      const key = `${groupKey}:${opt}`;
      if (!activeChips[key]) { activeChips[key] = true; changed = true; }
    }
  });

  const aliases = {
    'commut': 'usage:Commuting',
    'city driv': 'usage:City driving',
    'family': 'usage:Family use',
    'road trip': 'usage:Road trips',
    'mountain': 'usage:Mountain trips',
    'leisure': 'usage:Leisure',
    'electric': 'fuel:Electric',
    'hybrid': 'fuel:Hybrid',
    'petrol': 'fuel:Petrol',
    'diesel': 'fuel:Diesel',
    'suv': 'size:SUV',
    'compact': 'size:Compact',
    'van': 'size:Van',
    'just me': 'seats:2',
    'just myself': 'seats:2',
    'alone': 'seats:2',
  };

  Object.entries(aliases).forEach(([alias, chipKey]) => {
    if (lower.includes(alias)) {
      if (!activeChips[chipKey]) { activeChips[chipKey] = true; changed = true; }
    }
  });

  const seatChip = inferSeatsFromText(lower);
  if (seatChip) {
    Object.keys(activeChips).forEach(k => { if (k.startsWith('seats:') && k !== seatChip) delete activeChips[k]; });
    if (!activeChips[seatChip]) { activeChips[seatChip] = true; changed = true; }
  }

  const budget = inferBudgetFromText(lower);
  if (budget) {
    const slider = document.getElementById('budgetMin');
    if (slider) {
      setBudgetRange(budget.min, budget.max, true /* fromChat */);
      changed = true;
    } else {
      pendingBudget = budget;
      changed = true;
    }
    if (userAnchorId) topicAnchors.budget = userAnchorId;
  }

  // Anchor every group that gained at least one new chip in this run
  // to the user message that was just sent.
  if (userAnchorId) {
    const newGroups = new Set();
    Object.keys(activeChips).forEach(key => {
      if (!before[key]) newGroups.add(key.split(':')[0]);
    });
    newGroups.forEach(g => { topicAnchors[g] = userAnchorId; });
  }

  if (changed) buildSidebar();
}

let pendingBudget = null;

const NUM_WORDS = { a:1, an:1, one:1, two:2, three:3, four:4, five:5, six:6, seven:7, eight:8, nine:9, ten:10 };
function wordToNum(w) {
  if (!w) return 0;
  if (/^\d+$/.test(w)) return parseInt(w, 10);
  return NUM_WORDS[w] || 0;
}

function inferSeatsFromText(text) {
  let humans = 0;
  let mentioned = false;

  const adultRe = /(\d+|a|an|one|two|three|four)\s+(wife|wives|husband|husbands|partner|partners|spouse|spouses|adult|adults)/g;
  let m;
  while ((m = adultRe.exec(text)) !== null) { humans += wordToNum(m[1]); mentioned = true; }

  const kidRe = /(\d+|a|an|one|two|three|four|five|six|seven|eight|nine|ten)\s+(kid|kids|child|children|son|sons|daughter|daughters)/g;
  while ((m = kidRe.exec(text)) !== null) { humans += wordToNum(m[1]); mentioned = true; }

  const genericRe = /(\d+|one|two|three|four|five|six|seven|eight|nine|ten)\s+(people|persons|passengers|family member|family members)/g;
  while ((m = genericRe.exec(text)) !== null) { humans = Math.max(humans, wordToNum(m[1])); mentioned = true; }

  if (mentioned && !/just\s+(me|myself)/.test(text)) humans += 1;

  const seaterRe = /(\d+)\s*[-\s]?(seat|seater|seats)/;
  const sm = text.match(seaterRe);
  if (sm) humans = Math.max(humans, parseInt(sm[1], 10));

  if (humans <= 0) return null;
  if (humans <= 2) return 'seats:2';
  if (humans <= 4) return 'seats:4';
  if (humans <= 5) return 'seats:5';
  if (humans <= 6) return 'seats:6';
  return 'seats:7+';
}

function parseKr(s) {
  if (!s) return null;
  const cleaned = s.replace(/\s|,/g, '');
  const num = parseInt(cleaned, 10);
  if (isNaN(num)) return null;
  if (/k$/i.test(s)) return num * 1000;
  if (num < 10000) return num * 1000;
  return num;
}

function inferBudgetFromText(text) {
  const MIN = 50000, MAX = 1500000;

  // NUM = a number with optional 'k' suffix; (?!r) prevents matching the 'k' in "kr"
  const NUM = '([\\d][\\d\\s,.]*(?:k(?!r))?)';
  const CUR = '\\s*(?:kr|kroner)?';

  const isPlausible = v => v != null && v >= 50000 && v <= 3000000;
  const fuzzy = v => ({
    min: Math.max(MIN, Math.round(v * 0.85 / 25000) * 25000),
    max: Math.min(MAX, Math.round(v * 1.15 / 25000) * 25000),
  });

  let m;

  // Range: "between 400 000 and 600 000 kr"
  m = text.match(new RegExp(`between\\s+${NUM}\\s+(?:and|to|-|–|—)\\s+${NUM}${CUR}`));
  // Range: "400 000 – 600 000 kr" / "400k to 600k"
  if (!m) m = text.match(new RegExp(`${NUM}${CUR}\\s*(?:to|-|–|—)\\s*${NUM}${CUR}`));
  if (m) {
    const a = parseKr(m[1]), b = parseKr(m[2]);
    if (isPlausible(a) && isPlausible(b)) return { min: Math.min(a,b), max: Math.max(a,b) };
  }

  m = text.match(new RegExp(`(?:under|below|max|maximum|up to|less than|no more than)\\s+${NUM}${CUR}`));
  if (m) { const v = parseKr(m[1]); if (isPlausible(v)) return { min: MIN, max: v }; }

  m = text.match(new RegExp(`(?:above|over|at least|min|minimum|more than|from)\\s+${NUM}${CUR}`));
  if (m) { const v = parseKr(m[1]); if (isPlausible(v)) return { min: v, max: MAX }; }

  m = text.match(new RegExp(`(?:around|about|roughly|approximately|~|circa)\\s*${NUM}${CUR}`));
  if (m) { const v = parseKr(m[1]); if (isPlausible(v)) return fuzzy(v); }

  m = text.match(new RegExp(`(?:budget|price|spend)\\s*(?:is|of|around|:|=)?\\s*${NUM}${CUR}`));
  if (m) { const v = parseKr(m[1]); if (isPlausible(v)) return fuzzy(v); }

  // Bare amount with explicit "kr" suffix — "500 000 kr"
  m = text.match(new RegExp(`${NUM}\\s*(?:kr|kroner)\\b`));
  if (m) { const v = parseKr(m[1]); if (isPlausible(v)) return fuzzy(v); }

  return null;
}

function setBudgetRange(min, max, fromChat) {
  const sMin = document.getElementById('budgetMin');
  const sMax = document.getElementById('budgetMax');
  if (!sMin || !sMax) { pendingBudget = { min, max }; return; }
  if (!fromChat) takeSnapshotIfNeeded();
  sMin.value = min;
  sMax.value = max;
  updateBudgetDisplay();
  if (!fromChat) {
    setDirty(true);
    pushSidebarPreviewToInput();
  }
}

function resetFilters() {
  activeChips = {};
  activeTokens = [];
  activeTokenPayloads = {};
  pendingBudget = null;
  window._lastBudget = null;
  topicAnchors = {};
  setDirty(false);
  renderTokens();
  buildSidebar();
  // Clear any sidebar-preview text out of the input
  const input = document.getElementById('inputField');
  if (input && (
    input.value.startsWith("I'm looking for:") ||
    input.value.startsWith("Updating my profile") ||
    input.value.startsWith("Quick update to my profile") ||
    input.value.startsWith("I want to update") ||
    input.value.startsWith("I want to change") ||
    input.value.startsWith("I want to set") ||
    input.value.startsWith("I want to clear")
  )) {
    input.value = '';
    updateSend();
  }
}

// ── tokens ────────────────────────────────────────────────────────────────
function addToken(label, payload) {
  if (!activeTokens.includes(label)) {
    activeTokens.push(label);
    if (payload && payload !== label) activeTokenPayloads[label] = payload;
    renderTokens();
    updateSend();
  }
}

function removeToken(label) {
  activeTokens = activeTokens.filter(t => t !== label);
  delete activeTokenPayloads[label];
  Object.keys(activeChips).forEach(key => {
    const [groupKey, opt] = key.split(':');
    if (tokenLabel(groupKey, opt) === label) delete activeChips[key];
  });
  document.querySelectorAll('#suggestionsBar .chip').forEach(c => {
    if (c.textContent === label) c.classList.remove('on');
  });
  renderTokens();
  buildSidebar();
  updateSend();
}

function renderTokens() {
  const row = document.getElementById('tokensRow');
  row.innerHTML = '';
  activeTokens.forEach(label => {
    const span = document.createElement('span');
    span.className = 'token';
    const safeLabel = label.replace(/'/g, "\\'");
    span.innerHTML = `${escapeHtml(label)}<button onclick="removeToken('${safeLabel}')">×</button>`;
    row.appendChild(span);
  });
  row.style.display = activeTokens.length ? 'flex' : 'none';
}

function autoGrow(el) {
  el.style.height = 'auto';
  requestAnimationFrame(() => {
    el.style.height = (el.scrollHeight + 2) + 'px';
  });
}

// ── chat UI helpers ───────────────────────────────────────────────────────
function appendAIMessage(text, onDone) {
  const stream = document.getElementById('stream');

  const msgDiv = document.createElement('div');
  msgDiv.id = nextMsgId();
  msgDiv.className = 'msg ai';
  // tag the message with its conversation topic so sidebar jump buttons can find it
  const topic = detectMessageTopic(text);
  if (topic) msgDiv.dataset.topic = topic;
  msgDiv.innerHTML = `
    <div class="av ai">AI</div>
    <div class="msg-content">
      <div class="bub"></div>
    </div>
  `;
  stream.appendChild(msgDiv);
  // a new topic message means at least one jump button just became active
  refreshJumpButtons(); // always re-evaluate, so cleared chats deactivate stale buttons

  const bub = msgDiv.querySelector('.bub');
  const displayText = sanitizeAssistantText(text);
  const full = formatText(displayText);
  const total = displayText.length;
  const speed = 18;
  let revealed = 0;

  function tick() {
    revealed = Math.min(revealed + 2, total);
    let plainCount = 0;
    let htmlOut = '';
    let inTag = false;
    for (let ci = 0; ci < full.length; ci++) {
      const ch = full[ci];
      if (ch === '<') { inTag = true; }
      if (inTag) { htmlOut += ch; if (ch === '>') inTag = false; continue; }
      if (plainCount >= revealed) break;
      htmlOut += ch;
      plainCount++;
    }
    bub.innerHTML = htmlOut;
    stream.scrollTop = stream.scrollHeight;

    if (revealed < total) {
      setTimeout(tick, speed);
    } else {
      bub.innerHTML = full;
      stream.scrollTop = stream.scrollHeight;
      if (typeof onDone === 'function') onDone(msgDiv);
    }
  }
  tick();
  return msgDiv;
}

function appendUserMessage(text, tokens) {
  const stream = document.getElementById('stream');
  const _bar = document.getElementById('suggestionsBar'); if (_bar) _bar.innerHTML = '';

  const msgDiv = document.createElement('div');
  msgDiv.id = nextMsgId();
  msgDiv.className = 'msg user';
  let tokenHtml = '';
  if (tokens && tokens.length > 0) {
    tokenHtml = `<span class="bub-tokens">${tokens.map(t => `<span class="bub-token">${escapeHtml(t)}</span>`).join('')}</span>`;
  }
  msgDiv.innerHTML = `
    <div class="av user">U</div>
    <div class="msg-content">
      <div class="bub">${tokenHtml}${text ? escapeHtml(text) : ''}</div>
    </div>
  `;
  stream.appendChild(msgDiv);
  stream.scrollTop = stream.scrollHeight;
}

function appendTypingIndicator() {
  const stream = document.getElementById('stream');

// ── quick chips ───────────────────────────────────────────────────────────
// Remember the most recent AI-provided suggestions so we can restore them
// after the sidebar dirty state clears.
let lastSuggestions = [];

function renderQuickChips(suggestions, msgEl) {
  lastSuggestions = Array.isArray(suggestions) ? suggestions.slice() : [];
  // If sidebar is currently mid-edit, show the update diff instead of fresh chips
  if (pendingManualChange) { showUpdateDiff(); return; }
  const bar = document.getElementById('suggestionsBar');
  const wrap = document.getElementById('suggestionsWrap');
  const label = wrap ? wrap.querySelector('.quick-reply-label') : null;
  bar.innerHTML = '';
  bar.classList.remove('quick-chips-diff');
  if (label) {
    label.textContent = 'Quick reply';
    label.classList.remove('is-loading', 'is-update');
  }
  if (!suggestions || suggestions.length === 0) {
    wrap.classList.add('empty');
    return;
  }
  wrap.classList.remove('empty');
  const topic = msgEl?.dataset?.topic || detectMessageTopic(msgEl?.innerText || '');
  if (topic) wrap.dataset.topic = topic;
  else delete wrap.dataset.topic;

  suggestions.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = s;
    if (activeTokens.includes(s)) btn.classList.add('on');
    btn.onclick = () => {
      if (btn.classList.contains('on')) {
        removeToken(s);
        btn.classList.remove('on');
      } else {
        addToken(s, getQuickReplyPayload(s, topic));
        btn.classList.add('on');
      }
    };
    bar.appendChild(btn);
  });
}

function getQuickReplyPayload(label, topic) {
  if (!/not sure|unsure|don't know|do not know/i.test(label || '')) return label;
  // The wording below is intentionally blunt — we've seen the model wander to
  // the next topic if the request is too soft. Repeat the do-not-move-on rule.
  const tail = (subject) =>
    `Stay on this exact subject — do NOT bring up budget, seats, brand, must-haves, or any other topic in this reply. End your message by asking me the SAME ${subject} question again.`;
  const prompts = {
    fuel:   `[NOT-SURE-YET on FUEL] I'm still undecided on fuel type. Give me a quick tutorial: 1–2 short sentences each on petrol, diesel, hybrid, and fully electric. ${tail('fuel-type')}`,
    budget: `[NOT-SURE-YET on BUDGET] I'm still undecided on budget. Give me a quick rundown of typical Norwegian used-car budget ranges (under 300k, 300–500k, 500–800k, 800k+) and what I'd realistically get in each. ${tail('budget')}`,
    seats:  `[NOT-SURE-YET on SEATS] I'm still undecided on seat count. Explain the tradeoffs between 5, 6, and 7+ seats in 1–2 sentences each. ${tail('seat-count')}`,
    size:   `[NOT-SURE-YET on SIZE] I'm still undecided on vehicle size. Briefly explain compact, family, SUV, and van — when each makes sense. ${tail('vehicle-size')}`,
    brand:  `[NOT-SURE-YET on BRAND] I'm still undecided on brand. Briefly tell me whether picking a brand matters at all, and which brands you'd trust. ${tail('brand-preference')}`,
    usage:  `[NOT-SURE-YET on USAGE] I'm still undecided on how I'll use the car. Briefly explain why commuting vs city vs family vs road-trip vs mountain matter. ${tail('car-usage')}`,
  };
  return prompts[topic] || `[NOT-SURE-YET] I'm still undecided on the current question. Briefly explain the options, then ask me the SAME question again. Do NOT move on to any other topic.`;
}

// Compute structured diff rows for the update preview
function computeDiffStructure() {
  if (!prevSnapshot) return [];
  const optsByGroup = (chips, key) =>
    Object.keys(chips).filter(k => k.startsWith(key + ':')).map(k => k.split(':')[1]);

  const allGroups = new Set();
  Object.keys(activeChips).forEach(k => allGroups.add(k.split(':')[0]));
  Object.keys(prevSnapshot.chips).forEach(k => allGroups.add(k.split(':')[0]));

  const rows = [];
  allGroups.forEach(gKey => {
    const prev = optsByGroup(prevSnapshot.chips, gKey);
    const curr = optsByGroup(activeChips, gKey);
    if (sameSorted(prev, curr)) return;
    rows.push({ label: getGroupLabel(gKey), prev, curr });
  });

  const sMin = document.getElementById('budgetMin');
  const sMax = document.getElementById('budgetMax');
  if (sMin && sMax && prevSnapshot.budgetMin != null) {
    const lo = parseInt(sMin.value), hi = parseInt(sMax.value);
    if (lo !== prevSnapshot.budgetMin || hi !== prevSnapshot.budgetMax) {
      rows.push({
        label: 'Budget',
        prev: [`${formatNOK(prevSnapshot.budgetMin)}–${formatNOK(prevSnapshot.budgetMax)}`],
        curr: [`${formatNOK(lo)}–${formatNOK(hi)}`],
      });
    }
  }
  return rows;
}

// Render the dirty-edit diff in the quick-reply slot
function showUpdateDiff() {
  const bar  = document.getElementById('suggestionsBar');
  const wrap = document.getElementById('suggestionsWrap');
  if (!bar || !wrap) return;
  const label = wrap.querySelector('.quick-reply-label');

  const rows = computeDiffStructure();
  if (rows.length === 0) { restoreQuickReplies(); return; }

  wrap.classList.remove('empty');
  if (label) {
    label.textContent = 'Quick update';
    label.classList.remove('is-loading');
    label.classList.add('is-update');
  }

  bar.innerHTML = '';
  bar.classList.add('quick-chips-diff');

  rows.forEach(({ label: gLabel, prev, curr }) => {
    const row = document.createElement('div');
    row.className = 'diff-row';

    const lbl = document.createElement('span');
    lbl.className = 'diff-label';
    lbl.textContent = gLabel;
    row.appendChild(lbl);

    // Old tags grouped together
    const oldGrp = document.createElement('span');
    oldGrp.className = 'diff-tags-group';
    const oldList = prev.length ? prev : ['—'];
    oldList.forEach(p => {
      const t = document.createElement('span');
      t.className = 'diff-tag diff-tag-old';
      t.textContent = p;
      oldGrp.appendChild(t);
    });
    row.appendChild(oldGrp);

    const arrow = document.createElement('span');
    arrow.className = 'diff-arrow';
    arrow.textContent = '→';
    row.appendChild(arrow);

    // New tags grouped together
    const newGrp = document.createElement('span');
    newGrp.className = 'diff-tags-group';
    const newList = curr.length ? curr : ['—'];
    newList.forEach(c => {
      const t = document.createElement('span');
      t.className = 'diff-tag diff-tag-new';
      t.textContent = c;
      newGrp.appendChild(t);
    });
    row.appendChild(newGrp);

    bar.appendChild(row);
  });
}

// Put the original quick-reply chips back when dirty state clears
function restoreQuickReplies() {
  const bar  = document.getElementById('suggestionsBar');
  const wrap = document.getElementById('suggestionsWrap');
  if (!bar || !wrap) return;
  const label = wrap.querySelector('.quick-reply-label');

  bar.classList.remove('quick-chips-diff');
  if (label) {
    label.textContent = 'Quick reply';
    label.classList.remove('is-update');
  }
  // Re-render the cached suggestions exactly the same way renderQuickChips would
  bar.innerHTML = '';
  if (!lastSuggestions.length) { wrap.classList.add('empty'); return; }
  wrap.classList.remove('empty');
  lastSuggestions.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = s;
    if (activeTokens.includes(s)) btn.classList.add('on');
    const topic = wrap.dataset.topic || '';
    btn.onclick = () => {
      if (btn.classList.contains('on')) { removeToken(s); btn.classList.remove('on'); }
      else                              { addToken(s, getQuickReplyPayload(s, topic)); btn.classList.add('on'); }
    };
    bar.appendChild(btn);
  });
}

// ── tool steps ────────────────────────────────────────────────────────────
function parseToolSteps(text) {
  const match = text.match(/^TOOLS:\s*(\[.*?\])/m);
  if (match) {
    try { return JSON.parse(match[1]); } catch(e) {}
  }
  return [];
}

function stripToolsBlock(text) {
  return text.replace(/^TOOLS:\s*\[.*?\]\s*/m, '').trim();
}

async function runToolStrip(steps) {
  const strip = document.getElementById('toolStrip');
  if (!strip || !steps.length) return;
  for (let i = 0; i < steps.length; i++) {
    const stepEl = document.createElement('div');
    stepEl.className = 'tool-step';
    stepEl.innerHTML = `<span class="tool-icon"></span><span>${escapeHtml(steps[i])}…</span>`;
    strip.appendChild(stepEl);
    document.getElementById('stream').scrollTop = document.getElementById('stream').scrollHeight;
    await new Promise(r => setTimeout(r, 500 + Math.random() * 250));
    stepEl.classList.add('done');
    const labelEl = stepEl.querySelector('span:last-child');
    if (labelEl) labelEl.textContent = steps[i];
  }
}

// ── EV surprises ─────────────────────────────────────────────────────────
function parseEVSurprises(text) {
  const marker = text.match(/EV_SURPRISES:/i);
  const itemMarker = text.match(/(?:^|\n)\s*(?:[-*]\s*)?Item\s*1\s*[:.)-]/i);
  if (!marker && !itemMarker) return null;
  const after = marker
    ? text.slice(marker.index + marker[0].length)
    : text.slice(itemMarker.index);
  const block = after.split(/SUGGESTIONS:/i)[0];
  const items = [];
  for (let i = 1; i <= 5; i++) {
    const m = block.match(new RegExp(`(?:^|\\n)\\s*(?:[-*]\\s*)?Item\\s*${i}\\s*[:.)-]?\\s*([^|\\n]+?)(?:\\s*\\|\\s*|\\s+-\\s+|:\\s+)([^\\n]+)`, 'i'));
    if (m) items.push({ title: cleanField(m[1]), desc: cleanField(m[2]) });
  }
  if (!items.length) {
    block.split(/\n+/).map(line => line.trim()).filter(Boolean).forEach(line => {
      if (items.length >= 5) return;
      const cleaned = line
        .replace(/^[-*]\s*/, '')
        .replace(/^Item\s*\d+\s*[:.)-]?\s*/i, '')
        .trim();
      const parts = cleaned.split(/\s*\|\s*|\s+-\s+|:\s+/);
      if (parts.length >= 2) {
        items.push({ title: cleanField(parts.shift()), desc: cleanField(parts.join(' - ')) });
      }
    });
  }
  return items.length ? items : null;
}

function stripEVSurprisesBlock(text) {
  let working = String(text || '');
  working = working.replace(/EV_SURPRISES:[\s\S]*?(?=SUGGESTIONS:|$)/i, '').trim();

  // Some model replies forget the EV_SURPRISES marker and emit raw Item1/2/3
  // lines after a short intro. Remove those lines so the card renderer owns them.
  working = working
    .split('\n')
    .filter(line => !/^\s*(?:[-*]\s*)?Item\s*\d+\s*[:.)-]/i.test(line))
    .join('\n')
    .trim();

  return working;
}

// ── recommendation card parser & renderer ─────────────────────────────────
function parseRecs(text) {
  if (!text.includes('RECOMMENDATIONS:')) return null;
  const after = text.split('RECOMMENDATIONS:')[1] || '';
  const parts = after.split('---').map(s => s.trim()).filter(Boolean);
  return parts.map(part => {
    const get = (key) => {
      const match = part.match(new RegExp(`${key}:\\s*(.+)`));
      return match ? match[1].trim() : '';
    };
    const specs = [];
    for (let i = 1; i <= 4; i++) {
      const label = get(`Spec${i}Label`);
      const value = get(`Spec${i}Value`);
      if (label && value) specs.push({ label, value });
    }
    const highlights = [];
    for (let i = 1; i <= 4; i++) {
      const h = get(`Highlight${i}`);
      if (h) highlights.push(h);
    }
    return {
      badge:    get('Badge'),
      model:    get('Model'),
      year:     get('Year'),
      subtitle: get('Subtitle'),
      specs,
      highlights,
    };
  }).filter(r => r.model);
}

function cleanField(str) {
  if (!str) return '';
  let s = str.trim();
  s = s.replace(/^["']+|["']+$/g, '');
  s = s.replace(/\s*\([^)]*\)\s*/g, ' ').trim();
  s = s.replace(/\s{2,}/g, ' ');
  return s;
}

function renderRecs(recs, msgEl) {
  const content = msgEl.querySelector('.msg-content');
  const recsDiv = document.createElement('div');
  recsDiv.className = 'recs';

  recs.forEach((r) => {
    const card = document.createElement('div');
    card.className = 'rec';

    const model    = cleanField(r.model);
    const badge    = cleanField(r.badge);
    const year     = cleanField(r.year);
    const subtitle = cleanField(r.subtitle);

    // Remember this model so the AI doesn't repeat it on "show me more"
    if (model && !recommendedModels.includes(model)) recommendedModels.push(model);

    const subline = (year && subtitle)
      ? `${escapeHtml(year)} · ${escapeHtml(subtitle)}`
      : escapeHtml(year || subtitle);

    // Try to pull a real image from our inventory cache for this model
    const matches = inventoryLoaded ? matchInventory(model) : [];

    // If we have real inventory for this model, override AI's estimated price
    // with the actual minimum price in stock.
    let realSpecs = r.specs;
    if (matches.length > 0) {
      const validPrices = matches.map(m => m.price).filter(p => typeof p === 'number' && p > 0);
      const minPrice = validPrices.length ? Math.min(...validPrices) : null;
      if (minPrice != null) {
        realSpecs = r.specs.map(s => {
          const labelLower = (s.label || '').toLowerCase();
          if (labelLower.includes('price') || labelLower.includes('starting') || labelLower.includes('from')) {
            return { label: 'From', value: `${formatNOK(minPrice)} · ${matches.length} in stock` };
          }
          return s;
        });
      }
    }

    const specsHtml = realSpecs.length
      ? `<div class="rec-specs">${realSpecs.map(s => `
          <div class="rec-spec">
            <span class="rec-spec-label">${escapeHtml(cleanField(s.label))}</span>
            <span class="rec-spec-value">${enrichTerms(escapeHtml(cleanField(s.value)))}</span>
          </div>
        `).join('')}</div>`
      : '';

    const highlightsHtml = r.highlights.length
      ? `<div class="rec-divider"></div>
         <div class="rec-highlights">${r.highlights.map(h =>
            `<div class="rec-highlight">${escapeHtml(cleanField(h))}</div>`
          ).join('')}</div>`
      : '';

    const badgeHtml = badge
      ? `<span class="rec-badge">${escapeHtml(badge)}</span>`
      : '';
    const heroImage = matches.length
      ? ((matches[0].carImages || []).find(i => i.sortOrder === 0) || (matches[0].carImages || [])[0])?.normalUrl
      : null;
    const hasInventory = matches.length > 0;

    let imageHtml;
    if (heroImage) {
      imageHtml = `<img class="rec-img" src="${escapeHtml(heroImage)}" alt="${escapeHtml(model)}" loading="lazy">`;
    } else if (!inventoryLoaded) {
      // Inventory still fetching — show the striped placeholder
      imageHtml = `<div class="rec-ph">[ ${escapeHtml(model)} ]</div>`;
    } else {
      imageHtml = `<div class="rec-ph rec-ph-empty">No ${escapeHtml(model)} in stock right now — ask me for another model</div>`;
    }

    const ctaHtml = (inventoryLoaded && !hasInventory)
      ? `<button class="rec-inv" disabled>Not in stock</button>`
      : `<button class="rec-inv">View inventory</button>`;

    card.innerHTML = `
      ${imageHtml}
      <div class="rec-body">
        ${badgeHtml}
        <div class="rec-title">
          <div class="rec-name">${escapeHtml(model)}</div>
          ${subline ? `<div class="rec-sub">${subline}</div>` : ''}
        </div>
        ${specsHtml}
        ${highlightsHtml}
        <div class="rec-actions">
          ${ctaHtml}
        </div>
      </div>
    `;

    const invBtn = card.querySelector('.rec-inv');
    if (invBtn && !invBtn.disabled) {
      invBtn.addEventListener('click', () => {
        if (invBtn.disabled) return;
        invBtn.disabled = true;
        invBtn.textContent = 'Loading…';
        loadInventory(model, r).finally(() => {
          invBtn.disabled = false;
          invBtn.textContent = 'View inventory';
        });
      });
    }

    recsDiv.appendChild(card);
  });
  content.appendChild(recsDiv);
  document.getElementById('stream').scrollTop = document.getElementById('stream').scrollHeight;
}

// ── inventory ─────────────────────────────────────────────────────────────
const INVENTORY_PROMPT = `You are the inventory system at Møller Bil, a Norwegian used-car dealer. Generate 3 plausible used-car listings for the requested model, drawn from a realistic dealer's lot.

Output ONLY this exact format, no other text:
INVENTORY:
Year: [e.g. 2021]
Trim: [e.g. "Inscription AWD" or "GT-Line" — keep it brief, 1-3 words]
Mileage: [e.g. "45 000 km"]
Color: [e.g. "Crystal White" or "Onyx Black"]
Price: [e.g. "489 000 kr"]
TcoYearly: [estimated yearly cost of ownership total, e.g. "~38 000 kr/year"]
TcoBreakdown: [4 short items joined with " · ", e.g. "Insurance 14 000 · Service 9 000 · Tires 4 500 · Repairs ~10 000"]
Edge: [ONE concrete advantage this specific listing has over the OTHER listings of the SAME model in the set — max 14 words. e.g. "Lowest mileage of the three", "Newest model year with full warranty left", "Top trim with heated rear seats", "Best value — same trim for 60 000 kr less"]
---
(repeat 2 more times)

Rules:
- All prices in Norwegian kroner (kr). Format like "489 000 kr".
- Listings should differ on year/mileage/trim to give the customer real choice.
- Mileage realistic for age (e.g. ~12-18 000 km/year).
- TCO breakdown items must be Insurance, Service, Tires, Repairs (in that order).
- Each Edge MUST be different and reflect a genuine comparative advantage between THIS listing and the OTHER two — never generic praise, always relative.
- Keep the data plausible for the actual model requested.`;

async function loadInventory(model, recData) {
  appendTypingIndicator();
  showChipsLoading();

  try {
    const toolPromise = runToolStrip([`Searching ${model} inventory`, 'Filtering by availability', 'Ranking by best match']);

    // Wait for inventory cache if still loading (max 12s)
    if (!inventoryLoaded && inventoryLoadPromise) {
      await Promise.race([
        inventoryLoadPromise,
        new Promise(r => setTimeout(r, 12000)),
      ]);
    }

    // Try real inventory first
    let items = [];
    let usingRealData = false;

    const rawMatches = matchInventory(model);
    if (rawMatches.length > 0) {
      items = rawMatches.map((car, i) => {
        const it = apiCarToItem(car);
        it.edge = generateEdge(rawMatches, i);
        return it;
      });
      usingRealData = true;
    }

    // Fallback: ask AI to generate plausible listings
    if (!usingRealData) {
      const resp = await fetch(GEMINI_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(toGeminiBody([
          { role: 'system', content: INVENTORY_PROMPT },
          { role: 'user',   content: `Show me used inventory for: ${model}` },
        ], 700)),
      });
      if (resp.ok) {
        const data = await resp.json();
        const aiRaw = geminiText(data);
        const aiItems = parseInventory(aiRaw);
        if (aiItems && aiItems.length) items = aiItems;
      }
    }

    await toolPromise;

    const stripEl = document.getElementById('toolStrip');
    if (stripEl) { stripEl.removeAttribute('id'); stripEl.parentNode?.removeChild(stripEl); }
    removeTypingIndicator();

    if (!items.length) {
      appendAIMessage(`Sorry, I couldn't find inventory for ${model} right now.`);
      return;
    }

    const intro = usingRealData
      ? `Here are the ${model}s currently in stock:`
      : `Here are the ${model}s currently in our inventory:`;

    const msgEl = appendAIMessage(intro, (el) => {
      renderInventory(items, model, el, usingRealData);
      renderQuickChips([
        'How does mileage affect me?',
        'Can I finance or lease?',
        "What's included in maintenance?",
        'Book a test drive',
      ], el);
    });
    msgEl.classList.add('has-inv');
    if (stripEl) {
      const c = msgEl.querySelector('.msg-content');
      c.insertBefore(stripEl, c.firstChild);
    }
  } catch (err) {
    removeTypingIndicator();
    showToast('Could not load inventory: ' + err.message);
  }
}

function parseInventory(text) {
  if (!text.includes('INVENTORY:')) return null;
  const after = text.split('INVENTORY:')[1] || '';
  const parts = after.split('---').map(s => s.trim()).filter(Boolean);
  return parts.map(part => {
    const get = (key) => {
      const m = part.match(new RegExp(`${key}:\\s*(.+)`));
      return m ? cleanField(m[1]) : '';
    };
    return {
      year: get('Year'), trim: get('Trim'), mileage: get('Mileage'), color: get('Color'),
      price: get('Price'), tcoYearly: get('TcoYearly'), tcoBreakdown: get('TcoBreakdown'), edge: get('Edge'),
    };
  }).filter(it => it.year && it.price);
}

function renderInventory(items, model, msgEl, realData = false) {
  const content = msgEl.querySelector('.msg-content');
  const block = document.createElement('div');
  block.className = 'inv-block';

  const header = document.createElement('div');
  header.className = 'inv-header';
  header.textContent = `IN STOCK · ${model.toUpperCase()}`;
  block.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'inv-grid';

  items.forEach((it) => {
    const card = document.createElement('div');
    card.className = 'inv-card';

    const id = `${model} · ${it.year} ${it.trim || ''}`.trim();
    const subParts = [it.trim, it.color, it.mileage].filter(Boolean);
    const subHtml = subParts.map(p => `<span>${enrichTerms(escapeHtml(p))}</span>`).join('');

    // Image: real photo or striped placeholder
    const imageHtml = it.image
      ? `<img class="inv-img" src="${escapeHtml(it.image)}" alt="${escapeHtml(model)}" loading="lazy">`
      : `<div class="inv-ph">[ ${escapeHtml(model)} ]</div>`;

    // Second stat: location (real) or TCO (AI-generated)
    // Stack fuel and range on separate lines so they never wrap mid-phrase
    const stat2Html = realData
      ? `<div class="inv-stat">
           <span class="inv-stat-label">Location</span>
           <span class="inv-stat-value">${escapeHtml(it.location || 'Møller Bil')}</span>
           <span class="inv-stat-note">
             ${it.fuel  ? `<span>${enrichTerms(escapeHtml(it.fuel))}</span>`   : ''}
             ${it.range ? `<span>${enrichTerms('Range: ' + escapeHtml(it.range))}</span>` : ''}
           </span>
         </div>`
      : `<div class="inv-stat">
           <span class="inv-stat-label">Per year</span>
           <span class="inv-stat-value">${escapeHtml(it.tcoYearly || '')}</span>
           <span class="inv-stat-note"><span>Insurance, service, tires &amp; repairs</span></span>
         </div>`;

    card.innerHTML = `
      ${imageHtml}
      <div class="inv-body">
        <div class="inv-head">
          <div class="inv-title">${escapeHtml(it.year)} ${escapeHtml(model)}</div>
          <div class="inv-sub">${subHtml}</div>
        </div>
        <div class="inv-stats">
          <div class="inv-stat is-price">
            <span class="inv-stat-label">Car price</span>
            <span class="inv-stat-value">${escapeHtml(it.price)}</span>
            <span class="inv-stat-note"><span>Incl. VAT &amp; registration</span></span>
          </div>
          ${stat2Html}
        </div>
        ${it.edge ? `<div class="inv-edge"><div class="inv-edge-text"><span class="inv-edge-label">Why this one</span>${escapeHtml(it.edge)}</div></div>` : ''}
        <div class="inv-actions">
          <button class="inv-save">Save</button>
          <button class="inv-cta">View details</button>
        </div>
      </div>
    `;

    const saveBtn = card.querySelector('.inv-save');
    if (pinnedCars.some(c => c.model === id)) {
      card.classList.add('pinned');
      saveBtn.classList.add('on');
      saveBtn.textContent = 'Saved';
    }
    saveBtn.addEventListener('click', () => {
      const wasPinned = card.classList.toggle('pinned');
      saveBtn.classList.toggle('on', wasPinned);
      saveBtn.textContent = wasPinned ? 'Saved' : 'Save';
      if (wasPinned) {
        pinCar({ model: id, year: it.year, badge: it.price });
      } else {
        unpinCar(id);
      }
    });

    card.querySelector('.inv-cta').addEventListener('click', () => {
      // If real data, open the bruktbil.no listing page
      const rawId = it._raw?.id;
      if (rawId) {
        window.open(`https://www.bruktbil.no/bil/${rawId}`, '_blank');
      } else {
        showToast(`Detail page for ${id} — coming soon`);
      }
    });

    grid.appendChild(card);
  });

  block.appendChild(grid);
  content.appendChild(block);
  document.getElementById('stream').scrollTop = document.getElementById('stream').scrollHeight;
}

// ── pin / collection ─────────────────────────────────────────────────────
function pinCar(rec) {
  const model = cleanField(rec.model);
  if (pinnedCars.some(c => c.model === model)) return;
  pinnedCars.push({ model, year: cleanField(rec.year), badge: cleanField(rec.badge) });
  renderCollection();
  flashCollectionButton();
  showToast(`Saved — open “Your Collection” at the top right to view it`);
}

function flashCollectionButton() {
  const btn = document.getElementById('btnCollection');
  if (!btn) return;
  btn.classList.remove('flash');
  // force reflow so the animation restarts each save
  void btn.offsetWidth;
  btn.classList.add('flash');
  setTimeout(() => btn.classList.remove('flash'), 1100);
}

function unpinCar(model) {
  pinnedCars = pinnedCars.filter(c => c.model !== model);
  renderCollection();
  document.querySelectorAll('.inv-card').forEach(card => {
    const titleEl = card.querySelector('.inv-title');
    if (titleEl) {
      const saveBtn = card.querySelector('.inv-save');
      const stillPinned = pinnedCars.some(c =>
        titleEl.textContent.includes(c.model.split(' · ')[0]) || c.model.includes(titleEl.textContent)
      );
      if (!stillPinned && saveBtn) {
        card.classList.remove('pinned');
        saveBtn.classList.remove('on');
        saveBtn.textContent = 'Save';
      }
    }
  });
}

function renderCollection() {
  const body    = document.getElementById('collectionBody');
  const empty   = document.getElementById('collectionEmpty');
  const sub     = document.getElementById('collectionSub');
  const countEl = document.getElementById('collectionCount');
  const btn     = document.getElementById('btnCollection');

  const n = pinnedCars.length;
  countEl.textContent = n;
  btn.classList.toggle('has-items', n > 0);
  sub.textContent = n === 0 ? 'No cars saved yet' : `${n} car${n > 1 ? 's' : ''} saved`;

  if (n === 0) {
    body.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  body.innerHTML = '';
  pinnedCars.forEach(c => {
    const card = document.createElement('div');
    card.className = 'coll-card';
    const matchLabel = c.badge || 'Matched';
    card.innerHTML = `
      <div class="coll-card-ph"></div>
      <div class="coll-card-info">
        <div class="coll-card-name">${escapeHtml(c.model)}</div>
        <div class="coll-card-match">${escapeHtml(matchLabel)}</div>
        <button class="coll-card-details" onclick="showToast('Detail page — coming soon')">View details</button>
      </div>
      <button class="coll-card-remove" aria-label="Remove">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2.5 2.5l7 7M9.5 2.5l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    `;
    card.querySelector('.coll-card-remove').addEventListener('click', () => { unpinCar(c.model); });
    body.appendChild(card);
  });
}

function toggleCollection() {
  const drawer = document.getElementById('collectionDrawer');
  const backdrop = document.getElementById('collectionBackdrop');
  const isOpen = drawer.classList.toggle('open');
  backdrop.classList.toggle('open', isOpen);
}

function closeCollection() {
  document.getElementById('collectionDrawer').classList.remove('open');
  document.getElementById('collectionBackdrop').classList.remove('open');
}

// ── send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  const tokens = [...activeTokens];
  if (!text && tokens.length === 0) return;
  const tokenPayloads = tokens.map(t => activeTokenPayloads[t] || t);

  const combined = tokenPayloads.length > 0
    ? (tokenPayloads.join(', ') + (text ? '. ' + text : ''))
    : text;
  const isExplanationRequest = tokenPayloads.some(t => /I am not sure yet about/i.test(t));

  appendUserMessage(text, tokens);
  detectMode(combined);
  if (conversationMode === 'shopping' && !isExplanationRequest) {
    syncFiltersFromText(combined);
  }
  // The message just shipped — clear any "un-sent edit" highlight and snapshot before the rebuild
  setDirty(false);
  input.value = '';
  autoGrow(input);
  activeTokens = [];
  activeTokenPayloads = {};
  renderTokens();
  buildSidebar();
  updateSend();
  // First-time-only mini-tour for the sidebar controls
  maybeShowFilterTour();

  messages.push({ role: 'user', content: combined });
  isStreaming = true;
  document.getElementById('btnSend').disabled = true;
  appendTypingIndicator();
  showChipsLoading();

  try {
    const inv = getAvailableModelsHint();
    const allMessages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...(inv ? [{ role: 'system', content: inv }] : []),
      ...messages,
    ];
    const resp = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(toGeminiBody(allMessages, 800)),
    });

    if (!resp.ok) {
      const errBody = await resp.text();
      let errMsg = `HTTP ${resp.status}`;
      try { errMsg = JSON.parse(errBody).error?.message || errMsg; } catch(e) {}
      throw new Error(errMsg);
    }

    const data = await resp.json();
    const aiRaw = geminiText(data);
    if (!aiRaw) throw new Error('Empty response from API');
    messages.push({ role: 'assistant', content: aiRaw });

    const toolSteps = parseToolSteps(aiRaw);
    const aiText   = stripToolsBlock(aiRaw);

    // Direct inventory shortcut — skip tool strip animation and go straight to listings
    const invMatch = aiText.match(/SHOW_INVENTORY:\s*([^\n\r]+)/i);
    if (invMatch) {
      const stripEl0 = document.getElementById('toolStrip');
      if (stripEl0) { stripEl0.removeAttribute('id'); stripEl0.parentNode?.removeChild(stripEl0); }
      removeTypingIndicator();
      const modelName = invMatch[1].trim().replace(/[.*_`]/g, '');
      await loadInventory(modelName);
      return;
    }

    await runToolStrip(toolSteps);

    const stripEl = document.getElementById('toolStrip');
    if (stripEl) {
      stripEl.removeAttribute('id');
      stripEl.parentNode && stripEl.parentNode.removeChild(stripEl);
    }
    removeTypingIndicator();

    const attachStripTo = (msgEl) => {
      if (!stripEl || !stripEl.children.length) return;
      const content = msgEl.querySelector('.msg-content');
      content.insertBefore(stripEl, content.firstChild);
    };

    const recs = parseRecs(aiText);
    if (recs && recs.length > 0) {
      const intro = aiText.split('RECOMMENDATIONS:')[0].trim();
      const introText = intro || 'Here are my top picks for you:';
      const msgEl = appendAIMessage(introText, (el) => {
        renderRecs(recs, el);
        renderQuickChips([
          'How does mileage affect me?',
          'Can I finance or lease?',
          "What's included in maintenance?",
          'Show me different models'
        ], el);
      });
      msgEl.classList.add('has-recs');
      attachStripTo(msgEl);
    } else {
      const surprises = parseEVSurprises(aiText);
      const { cleanText, suggestions } = parseSuggestions(aiText);
      const msgEl = appendAIMessage(cleanText, (el) => {
        if (surprises && surprises.length > 0) renderEVSurprises(surprises, el);
        renderQuickChips(suggestions, el);
      });
      attachStripTo(msgEl);
    }

  } catch (err) {
    removeTypingIndicator();
    showToast('Error: ' + err.message);
    appendAIMessage('Sorry, something went wrong. Please try again.', (el) => {
      renderQuickChips(['Try again', 'Start over'], el);
    });
    messages.pop();
  } finally {
    isStreaming = false;
    updateSend();
  }
}

function parseSuggestions(text) {
  let working = text;
  working = working.replace(/^TOOLS:\s*\[.*?\]\s*/im, '').trim();
  working = stripEVSurprisesBlock(working);

  const match = working.match(/SUGGESTIONS:\s*(\[.*?\])/is);
  if (match) {
    try {
      const suggestions = JSON.parse(match[1]);
      const cleanText = sanitizeAssistantText(working.replace(/SUGGESTIONS:\s*\[.*?\]/is, '').trim());
      if (Array.isArray(suggestions) && suggestions.length > 0) {
        return { cleanText, suggestions: normalizeSuggestionsForQuestion(cleanText, suggestions) };
      }
    } catch(e) {}
  }
  const cleanText = sanitizeAssistantText(working);
  return { cleanText, suggestions: defaultSuggestions(cleanText) };
}

// Detect the "Area G" personal-preferences wrap-up question, in any phrasing
function isPersonalPreferencesQuestion(textLower) {
  return /(personal preference|preferred color|colors? (to avoid|you('?d| would) (love|like|hate))|no-go color|trade-?in|comfort extra|ownership cost|insurance band|before i (pull up|show you) (the )?(match|top pick|recommend)|one last (quick )?thing before i)/i.test(textLower);
}

function normalizeSuggestionsForQuestion(aiText, suggestions) {
  const full = (aiText || '');
  const fullLower = full.toLowerCase();
  const questions = full.match(/[^.!?]*\?/g) || [];
  const text = (questions[questions.length - 1] || full).toLowerCase();
  const joined = (suggestions || []).join(' ').toLowerCase();
  const fallback = () => defaultSuggestions(aiText);

  // PERSONAL PREFERENCES wrap-up — must come FIRST, because the question
  // often mentions "ownership costs", "insurance", "seats", etc. which would
  // falsely trigger the budget / seats rules and let bad chips slip through.
  // We check the FULL reply text, not just the last `?` sentence, because
  // the AI sometimes splits this wrap-up across multiple sentences.
  if (isPersonalPreferencesQuestion(fullLower) || isPersonalPreferencesQuestion(text)) {
    if (!/color|trade|insurance|premium|comfort|preference|no specific|leather|sunroof|audio|panoram|extras?\b|family.*(love|like)/i.test(joined)) {
      return fallback();
    }
    return suggestions;
  }

  if (/electric|hybrid|petrol|diesel|fuel|ev\b/.test(text) &&
      !/electric|ev|hybrid|petrol|diesel|not sure/.test(joined)) {
    return fallback();
  }
  if (/must.?have|feature|tow hitch|towing package|sunroof|heated|roof rack|roof rail|awd|leather|panoram/.test(text) &&
      !/tow|roof|heated|must|specific|awd|leather|sunroof|panoram/.test(joined)) {
    return fallback();
  }
  if (/passenger|seat|family|kids|children|how many people/.test(text) &&
      !/\bseat|people|just me|2-4|5-7|7\+/.test(joined)) {
    return fallback();
  }
  if (/budget|price|cost|spend|how much|\bkr\b/.test(text) &&
      !/\bkr\b|budget|flexible|\d/.test(joined)) {
    return fallback();
  }
  return suggestions;
}

function defaultSuggestions(aiText) {
  const full = (aiText || '');
  const fullLower = full.toLowerCase();
  const questions = full.match(/[^.!?]*\?/g) || [];
  const lastQuestion = (questions[questions.length - 1] || full).toLowerCase();

  // Personal preferences wrap-up — check FIRST (otherwise the "ownership costs"
  // keyword would route us into the budget branch below). Check full text + last
  // question to be robust regardless of how the AI phrases it.
  if (isPersonalPreferencesQuestion(fullLower) || isPersonalPreferencesQuestion(lastQuestion)) {
    return ['Avoid bright colors', 'Trade in my current car', 'Worried about insurance', 'No specific preferences'];
  }

  if (/electric|hybrid|petrol|diesel|fuel|ev\b/i.test(lastQuestion)) {
    return ['Electric (EV)', 'Hybrid', 'Petrol or diesel', 'Not sure yet'];
  }
  if (/must.?have|feature|tow hitch|towing package|sunroof|heated|roof rack|roof rail|awd|leather|panoram/i.test(lastQuestion)) {
    return ['Tow hitch', 'Roof rails', 'Heated seats', 'No specific must-haves'];
  }
  if (/\bbrand\b|brand in mind|particular brand|brands you|manufacturer/i.test(lastQuestion)) {
    return ['Open to anything', 'Toyota or Volvo', 'German brands', 'Tesla or Polestar'];
  }
  if (/passenger|seat|family|kids|children|how many people/i.test(lastQuestion)) {
    return ['Just me', '2-4 people', '5-7 people', 'Need 7+ seats'];
  }
  if (/budget|price|cost|spend|how much|\bkr\b/i.test(lastQuestion)) {
    return ['Around 300 000 kr', 'Around 500 000 kr', 'Around 700 000 kr', 'Flexible on budget'];
  }
  if (/recommend|show|suggest|find/i.test(lastQuestion)) {
    return ['Show me options', 'Need more info first', 'Different direction', 'Continue'];
  }
  return ['Tell me more', 'Continue', 'Skip this', 'Start over'];
}

// ── utils ─────────────────────────────────────────────────────────────────
// ── car-jargon glossary (hover '?' tooltip) ───────────────────────────────
const GLOSSARY = {
  'AWD':   'All-Wheel Drive — power goes to all four wheels (better grip in snow, gravel and slippery roads).',
  'FWD':   'Front-Wheel Drive — only the front wheels are driven. Efficient and good in most conditions.',
  'RWD':   'Rear-Wheel Drive — only the rear wheels are driven. Sportier feel, slightly less grip in snow.',
  'WLTP':  'Worldwide Light vehicles Test Procedure — the EU standard for measuring range and fuel economy.',
  'kWh':   'Kilowatt-hour — the unit for battery capacity. Bigger kWh = more electric range.',
  'kW':    'Kilowatt — the unit for charging speed (DC fast charging). Higher kW = faster charge.',
  'V2L':   'Vehicle-to-Load — your car can power external devices (kettle, laptop, projector) through a regular plug.',
  'PHEV':  'Plug-in Hybrid — has both an electric motor and a petrol engine, and can be charged externally for short electric trips.',
  'BEV':   'Battery Electric Vehicle — fully electric, no combustion engine.',
  'OTA':   'Over-the-Air — software updates installed wirelessly, no garage visit needed.',
  'TCO':   'Total Cost of Ownership — purchase price plus running costs (fuel, insurance, service, tires).',
  'hk':    'Hestekrefter — Norwegian for horsepower. Engine output.',
  'hp':    'Horsepower — engine output. 1 hk ≈ 1 hp.',
  'NCAP':  'European New Car Assessment Programme — independent crash-safety rating (out of 5 stars).',
  'DC':    'Direct Current — high-power fast charging at public stations.',
  'AC':    'Alternating Current — slower charging from home outlets or wall boxes.',
  'driven':'Total kilometres on the odometer so far — how much the car has been used.',
  'Range': 'How far the car can drive on a single full charge (in real-world conditions, similar to WLTP).',
};
// pre-build the regex once
const _GLOSSARY_RE = new RegExp(
  '\\b(' + Object.keys(GLOSSARY)
    .map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))
    .sort((a, b) => b.length - a.length)  // longer terms first so PHEV beats EV etc.
    .join('|') + ')\\b',
  'g'
);

function enrichTerms(html) {
  if (!html) return html;
  // Don't double-wrap and don't touch attribute text — split on tags, only replace in text parts.
  return html.split(/(<[^>]+>)/).map(part => {
    if (part.startsWith('<')) return part;
    return part.replace(_GLOSSARY_RE, (match) => {
      // Look up case-sensitive first, then case-insensitive
      const key = GLOSSARY[match] ? match : Object.keys(GLOSSARY).find(k => k.toLowerCase() === match.toLowerCase());
      if (!key) return match;
      return `<span class="term" tabindex="0">${match}<span class="term-tip">${escapeHtml(GLOSSARY[key])}</span></span>`;
    });
  }).join('');
}

// Detect 2+ consecutive bullet lines (• or - or *) and wrap them in a styled card.
// Runs AFTER escapeHtml / **bold** / enrichTerms so the inner content is already
// formatted HTML that can be safely inserted.
function renderBulletCards(html) {
  const lines = html.split('\n');
  const out = [];
  let bullets = [];

  const flushBullets = () => {
    if (bullets.length >= 2) {
      const items = bullets.map((b, i) =>
        `<div class="msg-note"><span class="msg-note-icon">${i + 1}</span><span class="msg-note-text">${b}</span></div>`
      ).join('');
      out.push(`<div class="msg-notes">${items}</div>`);
    } else if (bullets.length === 1) {
      out.push('• ' + bullets[0]);
    }
    bullets = [];
  };

  for (const line of lines) {
    const m = line.match(/^\s*(?:[•\-\*]|\d+[.)])\s+(.+)$/);
    if (m) {
      bullets.push(m[1]);
    } else {
      flushBullets();
      // Skip empty lines — paragraph spacing is handled by block-level cards
      if (line.trim() !== '') out.push(line);
      else out.push('<span class="msg-gap"></span>');
    }
  }
  flushBullets();

  // Insert a single <br> only between consecutive plain-text chunks; bullet
  // cards are block-level and already supply their own vertical rhythm.
  let result = '';
  for (let i = 0; i < out.length; i++) {
    const cur = out[i];
    const next = out[i + 1];
    result += cur;
    if (next !== undefined) {
      const curIsCard  = cur.startsWith('<div class="msg-notes"');
      const nextIsCard = next.startsWith('<div class="msg-notes"');
      const curIsGap  = cur.startsWith('<span class="msg-gap"');
      const nextIsGap = next.startsWith('<span class="msg-gap"');
      if (!curIsCard && !nextIsCard && !curIsGap && !nextIsGap) result += '<br>';
    }
  }
  return result;
}

function sanitizeAssistantText(text) {
  return String(text || '')
    .replace(/<\/?[a-z][\w:-]*[^>]*>/gi, '')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/`/g, '')
    .trim();
}

function addFinalQuestionBreak(text) {
  let s = String(text || '').trim();
  if (!s || /\n\s*\n/.test(s)) return s;
  const questionMatch = s.match(/([.!?])\s+(\*\*[A-Z][^?\n]{12,}\?\*\*|[A-Z][^?\n]{12,}\?)\s*$/);
  if (!questionMatch || questionMatch.index === 0) return s;
  const questionStart = questionMatch.index + questionMatch[0].indexOf(questionMatch[2]);
  const before = s.slice(0, questionStart).trimEnd();
  const after = s.slice(questionStart).trimStart();
  if (!before || before.endsWith('\n')) return s;
  return `${before}\n\n${after}`;
}

function formatText(text) {
  text = addFinalQuestionBreak(sanitizeAssistantText(text));
  let html = escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  html = enrichTerms(html);
  html = renderBulletCards(html);
  return html;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const drawer = document.getElementById('collectionDrawer');
    if (drawer && drawer.classList.contains('open')) closeCollection();
  }
});

function updateSend() {
  const input = document.getElementById('inputField');
  const btn = document.getElementById('btnSend');
  const hasContent = input.value.trim().length > 0 || activeTokens.length > 0;
  btn.disabled = !hasContent || isStreaming;
}

function resetAll() {
  messages = [];
  activeTokens = [];
  activeTokenPayloads = {};
  activeChips = {};
  pinnedCars = [];
  topicAnchors = {};
  recommendedModels = [];
  msgCounter = 0;
  document.getElementById('stream').innerHTML = '';
  document.getElementById('inputField').value = '';
  renderTokens();
  buildSidebar();
  renderCollection();
  closeCollection();
  updateSend();
  showOnboarding();
}

function toggleDrawer() {
  const side = document.querySelector('.side');
  const backdrop = document.getElementById('drawerBackdrop');
  const btn = document.querySelector('.btn-filter');
  const isOpen = side.classList.toggle('open');
  backdrop.classList.toggle('open', isOpen);
  if (btn) btn.textContent = isOpen ? 'Filters ↓' : 'Filters ↑';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ── sidebar resize ────────────────────────────────────────────────────────
(function() {
  const handle = document.getElementById('resizeHandle');
  const side   = document.getElementById('side');
  if (!handle || !side) return;

  let startX, startW;

  handle.addEventListener('mousedown', e => {
    startX = e.clientX;
    startW = side.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    function onMove(e) {
      const delta = startX - e.clientX;
      const newW = Math.min(520, Math.max(260, startW + delta));
      side.style.width = newW + 'px';
    }
    function onUp() {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
})();

// ── start ─────────────────────────────────────────────────────────────────
init();
