<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>AI Car Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #7c5cff;
  --accent-soft: rgba(124,92,255,0.12);
  --accent-ink: #4a32c4;
  --bg: #fafaf7;
  --ink: #1f1d1b;
  --border: rgba(31,29,27,0.14);
  --border-strong: rgba(31,29,27,0.55);
  --muted: rgba(31,29,27,0.45);
  --chip-bg: #f0eee8;
}

html, body { height: 100%; font-family: "Geist","Inter",system-ui,sans-serif; color: var(--ink); background: var(--bg); }

/* ── layout ── */
.app { display: flex; flex-direction: column; height: 100vh; }

.topbar {
  height: 60px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 14px; gap: 14px; flex-shrink: 0;
}
.topbar-title { font-weight: 600; font-size: 16px; }
.topbar-spacer { flex: 1; }
.btn-reset-all {
  appearance: none; border: 1px solid rgba(31,29,27,0.3); background: transparent;
  color: rgba(31,29,27,0.65); font: 500 13px/1 "Geist",sans-serif;
  height: 34px; padding: 0 14px;
  border-radius: 999px; cursor: pointer;
}
.btn-reset-all:hover { color: var(--ink); border-color: rgba(31,29,27,0.6); }

.main { flex: 1; display: flex; min-height: 0; }

/* outer spacer columns — the vertical strips flanking the chat */
.col-spacer {
  flex: 1; max-width: 80px; background: var(--bg);
}
.col-spacer.left { }
.col-spacer.right { }

.col-center {
  flex: 1; max-width: 1200px; margin: 0 auto;
  display: flex; flex-direction: column; min-height: 0;
}

/* ── chat ── */
.chat { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }

.stream {
  flex: 1; overflow-y: auto; padding: 28px 18px 12px;
  display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth;
}
.stream::-webkit-scrollbar { width: 8px; }
.stream::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

/* ── info banner above stream ── */
.info-banner {
  margin: 18px 18px 0;
  border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 18px; background: #fff;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.info-banner-text { flex: 1; }
.info-banner-text b { font-size: 15px; font-weight: 600; display: block; margin-bottom: 3px; }
.info-banner-text span { font-size: 13.5px; color: var(--muted); line-height: 1.45; }
.info-banner-link {
  appearance: none; border: 1px solid var(--border-strong); background: transparent;
  color: var(--ink); font: 500 13.5px/1 "Geist",sans-serif; padding: 9px 16px;
  border-radius: 999px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  transition: background .12s;
}
.info-banner-link:hover { background: var(--chip-bg); }

.msg { display: flex; flex-direction: column; max-width: 100%; }
.msg.ai { align-items: flex-start; }
.msg.user { align-items: flex-end; }

/* AI side wraps bubble + tool indicators + cards together */
.msg-content { display: flex; flex-direction: column; gap: 10px; max-width: 760px; min-width: 0; width: 100%; }
.msg.user .msg-content { max-width: 620px; }

.bub {
  padding: 14px 18px; border: 1.25px solid var(--border-strong);
  border-radius: 14px 14px 14px 4px; background: var(--bg);
  font-size: 16px; line-height: 1.6;
  word-wrap: break-word;
  align-self: flex-start;
}
.msg.user .bub { border-radius: 14px 14px 4px 14px; background: var(--chip-bg); align-self: flex-end; }
.bub b { font-weight: 600; }

/* tool indicators — shown above AI bubble while typing */
.tool-strip { display: flex; flex-direction: column; gap: 5px; align-self: flex-start; }
.tool-step {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 11px; border-radius: 999px;
  background: var(--accent-soft); border: 1px solid rgba(124,92,255,0.25);
  font-family: "Inter",sans-serif; font-size: 12.5px; font-weight: 500;
  color: var(--accent-ink);
  animation: tool-fade .3s cubic-bezier(.4,0,.2,1);
}
.tool-step.done {
  background: var(--bg); border-color: var(--border);
  color: var(--muted);
}
.tool-step .tool-icon {
  width: 14px; height: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
/* spinner for active tool steps */
.tool-step:not(.done) .tool-icon::before {
  content: '';
  width: 11px; height: 11px;
  border: 1.5px solid currentColor; border-right-color: transparent;
  border-radius: 50%;
  animation: tool-spin .8s linear infinite;
}
.tool-step.done .tool-icon::before {
  content: '✓';
  font-size: 11px; font-weight: 700; line-height: 1;
}
@keyframes tool-spin { to { transform: rotate(360deg); } }
@keyframes tool-fade {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: none; }
}

/* typing dots */
.typing { display: inline-flex; gap: 4px; padding: 4px 0; align-items: center; }
.typing span {
  width: 7px; height: 7px; border-radius: 50%; background: rgba(31,29,27,0.35);
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: .4; }
  40% { transform: translateY(-4px); opacity: 1; }
}

/* car recommendation cards — richer layout matching reference design */
.recs {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}
.rec {
  border: 1.5px solid var(--border-strong); border-radius: 14px;
  background: #fff; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  position: relative;
  transition: border-color .18s, box-shadow .18s, transform .18s;
}
.rec.pinned {
  border-color: var(--accent);
  border-width: 2px;
  box-shadow: 0 0 0 4px var(--accent-soft);
  order: -1; /* pinned cards float to the top of the grid */
}

/* car image placeholder */
.rec-ph {
  background: repeating-linear-gradient(135deg,rgba(31,29,27,.05) 0 6px,rgba(0,0,0,0) 6px 12px), var(--bg);
  border: 1.25px dashed rgba(31,29,27,0.2); border-radius: 10px; height: 100px;
  display: flex; align-items: center; justify-content: center;
  font-family: "Inter",sans-serif; font-size: 12px; color: var(--muted);
  letter-spacing: .04em;
}

/* pin button (top-right) */
.rec-pin {
  position: absolute; top: 10px; right: 10px;
  width: 32px; height: 32px;
  appearance: none; border: 1px solid var(--border-strong); background: rgba(255,255,255,0.92);
  backdrop-filter: blur(4px);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted);
  transition: all .12s;
  z-index: 2;
}
.rec-pin:hover { color: var(--ink); border-color: var(--ink); transform: scale(1.05); }
.rec-pin.on {
  background: var(--accent); color: #fff; border-color: var(--accent-ink);
  box-shadow: 1px 1px 0 var(--accent-ink);
}
.rec-pin svg { width: 16px; height: 16px; }

/* badge */
.rec-badge {
  align-self: flex-start;
  font-family: "Inter",sans-serif; font-size: 11.5px; font-weight: 600;
  padding: 4px 10px; border-radius: 999px;
  letter-spacing: .01em;
}
.rec-badge.b-best  { background: #e8f4ff; color: #1d4ed8; }
.rec-badge.b-value { background: #ecfdf3; color: #15803d; }
.rec-badge.b-tow   { background: var(--accent-soft); color: var(--accent-ink); }
.rec-badge.b-eff   { background: #fef3c7; color: #a16207; }
.rec-badge.b-fam   { background: #fce7f3; color: #be185d; }
.rec-badge.b-default { background: var(--chip-bg); color: var(--ink); }

.rec-title { display: flex; flex-direction: column; gap: 3px; }
.rec-name { font-size: 17px; font-weight: 600; line-height: 1.25; padding-right: 36px; /* room for pin */ }
.rec-sub { font-family: "Inter",sans-serif; font-size: 13px; color: var(--muted); }

/* 2x2 spec grid */
.rec-specs {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.rec-spec {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 11px;
  display: flex; flex-direction: column; gap: 2px;
}
.rec-spec-label {
  font-family: "Inter",sans-serif; font-size: 11.5px; color: var(--muted);
  font-weight: 500;
}
.rec-spec-value { font-size: 14px; font-weight: 600; color: var(--ink); }

/* horizontal divider before highlights */
.rec-divider { height: 1px; background: var(--border); margin: 2px 0; }

/* highlights list with green checkmarks */
.rec-highlights { display: flex; flex-direction: column; gap: 7px; }
.rec-highlight {
  display: flex; align-items: flex-start; gap: 9px;
  font-size: 13.5px; font-weight: 500; color: var(--ink); line-height: 1.4;
}
.rec-highlight::before {
  content: '✓';
  flex-shrink: 0;
  color: #16a34a; font-weight: 700;
  font-family: "Inter",sans-serif;
  font-size: 14px;
  line-height: 1.2;
  margin-top: 1px;
}

/* CTA button at the bottom */
.rec-cta {
  margin-top: auto;
  appearance: none; width: 100%;
  border: 1px solid var(--border-strong); background: var(--bg);
  border-radius: 10px; padding: 11px 14px;
  font: 600 13.5px/1 "Geist",sans-serif; color: var(--ink);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background .12s, border-color .12s;
}
.rec-cta:hover { background: var(--chip-bg); border-color: var(--ink); }

/* ── composer ── */
.composer {
  border-top: 1px solid var(--border); padding: 16px 18px 22px;
  flex-shrink: 0; background: var(--bg);
}

/* AI-suggested replies, shown above the input box */
.suggestions {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 12px;
}
.suggestions:empty { display: none; }

.suggestions.animate-in {
  animation: sug-slide .35s cubic-bezier(.4,0,.2,1);
}

@keyframes sug-slide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}

.suggestion-label {
  width: 100%;
  font-family: "Inter",sans-serif; font-size: 12px;
  color: var(--muted); letter-spacing: .06em; text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 2px;
}

.sug-chip {
  appearance: none;
  padding: 9px 14px; border: 1px solid var(--border-strong); border-radius: 999px;
  font: 500 14px/1.2 "Geist",sans-serif; color: var(--ink); background: #fff;
  cursor: pointer; user-select: none;
  transition: all .12s;
}
.sug-chip:hover {
  background: var(--accent-soft); color: var(--accent-ink); border-color: var(--accent);
  transform: translateY(-1px);
}
.sug-chip:active { transform: translateY(0); }

.cbox {
  border: 1.5px solid var(--border-strong); border-radius: 14px; padding: 12px 14px;
  min-height: 70px; display: flex; flex-direction: column; gap: 8px; background: #fff;
  transition: border-color .15s, box-shadow .15s;
}
.cbox:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.input-field {
  flex: 1; min-width: 140px; appearance: none; border: 0; outline: 0; background: transparent;
  font: inherit; font-size: 16px; color: var(--ink); padding: 4px 0;
}
.input-field::placeholder { color: rgba(31,29,27,0.4); }

.cfoot { display: flex; justify-content: flex-end; align-items: center; }

.btn-send {
  appearance: none; border: 1.5px solid var(--accent-ink); background: var(--accent); color: #fff;
  padding: 10px 22px; border-radius: 999px; font: 600 14px/1 "Geist",sans-serif; cursor: pointer;
  box-shadow: 2px 2px 0 var(--accent-ink); transition: transform .08s, box-shadow .08s;
}
.btn-send:hover:not(:disabled) { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--accent-ink); }
.btn-send:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

/* ── responsive ── */
@media (max-width: 980px) {
  .col-spacer { display: none; }
  .col-center { width: 100%; }
}
@media (max-width: 720px) {
  .recs { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .stream { padding: 14px 10px 8px; gap: 14px; }
  .composer { padding: 10px 10px 14px; }
  .info-banner { margin: 10px 10px 0; padding: 12px 14px; }
  .info-banner-text b { font-size: 14px; }
  .info-banner-text span { font-size: 12.5px; }
  .bub { font-size: 15px; }
  .topbar { padding: 0 18px; gap: 10px; }
  .topbar-title { font-size: 14px; }
  .sug-chip { font-size: 13.5px; padding: 8px 12px; }
}

/* error toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #ef4444; color: #fff; font-size: 13.5px; padding: 10px 18px;
  border-radius: 8px; z-index: 999; opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ── collection (saved cars) ── */
.btn-collection {
  appearance: none; border: 1px solid rgba(31,29,27,0.3); background: transparent;
  color: rgba(31,29,27,0.7); font: 500 13px/1 "Geist",sans-serif;
  height: 34px; padding: 0 12px; gap: 7px;
  border-radius: 999px; cursor: pointer;
  display: inline-flex; align-items: center;
  position: relative;
  transition: all .12s;
}
.btn-collection:hover { color: var(--ink); border-color: rgba(31,29,27,0.6); }
.btn-collection.has-items {
  border-color: var(--accent);
  color: var(--accent-ink);
  background: var(--accent-soft);
}
.btn-collection-count {
  font-family: "Inter",sans-serif; font-size: 11.5px; font-weight: 600;
  min-width: 18px; height: 18px; padding: 0 5px;
  background: rgba(31,29,27,0.08); color: var(--ink);
  border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center;
  line-height: 1;
}
.btn-collection.has-items .btn-collection-count {
  background: var(--accent); color: #fff;
}

.collection-backdrop {
  position: fixed; inset: 0;
  background: rgba(10,10,10,0.32);
  z-index: 99;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.collection-backdrop.open { opacity: 1; pointer-events: all; }

.collection-drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 380px; max-width: 92vw;
  background: var(--bg);
  border-left: 1px solid var(--border);
  box-shadow: -8px 0 32px rgba(0,0,0,0.10);
  z-index: 100;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
.collection-drawer.open { transform: none; }
.collection-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.collection-title { font-size: 15px; font-weight: 600; display: block; margin-bottom: 2px; }
.collection-sub { font-family: "Inter",sans-serif; font-size: 12px; color: var(--muted); }
.collection-close {
  appearance: none; background: transparent; border: 1px solid var(--border);
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--muted); transition: color .12s, border-color .12s;
  flex-shrink: 0;
}
.collection-close:hover { color: var(--ink); border-color: var(--ink); }

.collection-body {
  flex: 1; overflow-y: auto; padding: 14px 20px 20px;
  display: flex; flex-direction: column; gap: 12px;
}
.collection-body:empty { display: none; }

/* mini saved-car card */
.coll-card {
  border: 1px solid var(--border-strong); border-radius: 12px;
  background: #fff; padding: 12px; display: flex; gap: 11px;
  position: relative;
}
.coll-card-ph {
  width: 64px; height: 56px; flex-shrink: 0;
  background: repeating-linear-gradient(135deg,rgba(31,29,27,.06) 0 4px,rgba(0,0,0,0) 4px 8px), var(--bg);
  border: 1px dashed rgba(31,29,27,0.2); border-radius: 7px;
}
.coll-card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.coll-card-name { font-size: 13.5px; font-weight: 600; line-height: 1.25; padding-right: 24px; }
.coll-card-match {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: "Inter",sans-serif; font-size: 11.5px; font-weight: 500;
  color: var(--accent-ink); margin-top: 2px;
}
.coll-match-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #16a34a; flex-shrink: 0;
}
.coll-card-details {
  appearance: none; border: 1px solid var(--border-strong); background: var(--bg);
  border-radius: 8px; padding: 6px 12px; margin-top: 6px;
  font: 500 12px/1 "Geist",sans-serif; color: var(--ink);
  cursor: pointer; transition: background .12s;
}
.coll-card-details:hover { background: var(--chip-bg); }
.coll-card-remove {
  position: absolute; top: 8px; right: 8px;
  appearance: none; background: transparent; border: none;
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted);
  transition: color .12s, background .12s;
}
.coll-card-remove:hover { color: var(--ink); background: var(--chip-bg); }

.collection-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; gap: 10px; text-align: center;
  color: var(--muted);
}
.collection-empty.hidden { display: none; }
.collection-empty-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--chip-bg);
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  margin-bottom: 4px;
}
.collection-empty-title { font-size: 14px; font-weight: 600; color: var(--ink); }
.collection-empty-text { font-family: "Inter",sans-serif; font-size: 12.5px; line-height: 1.5; max-width: 240px; }

@media (max-width: 720px) {
  .recs { grid-template-columns: 1fr; }
}

/* ── EV design surprises — minimal text-list style ── */
.surprises {
  margin-top: 2px;
  padding: 14px 16px;
  border-left: 2px solid var(--accent);
  background: rgba(124,92,255,0.04);
  border-radius: 0 8px 8px 0;
}
.surprises-header {
  font-family: "Inter",sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--accent-ink);
  margin-bottom: 10px;
}
.surprises-list { display: flex; flex-direction: column; gap: 7px; }
.surprise-row {
  font-size: 13.5px; line-height: 1.5;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.surprise-title { font-weight: 600; color: var(--ink); }
.surprise-sep { color: var(--muted); }
.surprise-desc { color: rgba(31,29,27,0.7); flex: 1; min-width: 0; }
</style>
</head>
<body>

<div class="app">

  <!-- top bar -->
  <div class="topbar">
    <b class="topbar-title">Möller Bil · Find a car</b>
    <div class="topbar-spacer"></div>
    <button class="btn-collection" id="btnCollection" onclick="toggleCollection()" title="Saved cars">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3.5 2.5h9v11l-4.5-3-4.5 3v-11z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
      </svg>
      <span class="btn-collection-count" id="collectionCount">0</span>
    </button>
    <button class="btn-reset-all" onclick="resetAll()">Reset chat</button>
  </div>

  <!-- main: [spacer] [chat] [spacer] -->
  <div class="main">
    <div class="col-spacer left"></div>
    <div class="col-center">

      <!-- chat area -->
      <div class="chat">

        <!-- info banner -->
        <div class="info-banner">
          <div class="info-banner-text">
            <b>More than just finding a car</b>
            <span>Möller Bil offers insurance, service plans, financing, trade-ins and more.</span>
          </div>
          <a class="info-banner-link" href="#" target="_blank">Learn more →</a>
        </div>

        <div class="stream" id="stream"></div>

        <!-- composer -->
        <div class="composer">

          <!-- AI suggestions appear here, above input -->
          <div class="suggestions" id="suggestions"></div>

          <div class="cbox">
            <input class="input-field" id="inputField" placeholder="Tell the assistant what you need…"
              onkeydown="handleKey(event)" oninput="updateSend()">
            <div class="cfoot">
              <button class="btn-send" id="btnSend" disabled onclick="sendMessage()">Send →</button>
            </div>
          </div>
        </div>

      </div>

    </div><!-- /col-center -->
    <div class="col-spacer right"></div>
  </div>
</div>

<!-- collection (saved cars) drawer -->
<div class="collection-backdrop" id="collectionBackdrop" onclick="closeCollection()"></div>
<aside class="collection-drawer" id="collectionDrawer">
  <div class="collection-head">
    <div>
      <b class="collection-title">Your saved cars</b>
      <div class="collection-sub" id="collectionSub">No cars saved yet</div>
    </div>

// ── config ──────────────────────────────────────────────────────────────
const DEEPSEEK_API_KEY = 'sk-014c7c0d0b8a48d19db2ace18c9b0cce';

const SYSTEM_PROMPT = `You are a friendly car advisor at Möller Bil. Help users find the right car through natural conversation.

Rules:
- STRICTLY ONE question per reply. Never ask two questions in the same message — not even casually ("Also, ...?" or "And one more thing..."). If you have multiple areas left to cover, pick the single most natural one and save the rest for later turns.
- Keep replies short: 1-2 sentences of acknowledgment + 1 question. That's it.
- Always respond in English
- All prices and budgets are in Norwegian kroner (kr). Format like "350 000 kr" or "~450 000 kr". NEVER use $ or €.

Conversation flow — adaptive, not rigid:
Before recommending cars, you should have info on these 5 areas:
A) Situation/motivation (why they're looking)
B) Passengers/seats they need
C) Budget range
D) Fuel type preference (petrol, diesel, hybrid, electric)
E) Must-have features (e.g. tow hitch, sunroof, heated seats, AWD)

Rules for the flow:
- Ask about whatever is the natural next topic given what the user just said. Follow their lead — if they bring up budget, dive into budget; if they mention kids, explore passengers/safety.
- If a user's earlier message already answered an area (e.g. they said "I need a 7-seater for my family"), DON'T ask that question again — just acknowledge it and move to a different area.
- Track what's been covered. Skip topics they've already answered, even implicitly.
- Budget is the one area you should not let them skip entirely. If they avoid it or you've covered other areas without it, gently circle back: "Before I can find the right match, it'd really help to know roughly what budget you're thinking — even a ballpark helps!"
- Once you have info on all 5 areas (explicitly or implicitly), it's time to recommend.

Handling user input issues:
- If the user's message looks like a typo, garbled text, or they seem confused (e.g. random characters, an obvious misspelling of a car model, an unrealistic number like "5 kr budget" or "200 passengers"), respond gently with an "Oops, looks like something might have gone wrong there — did you mean…?" tone. Stay warm and helpful, never make them feel bad. Then suggest 2-3 likely interpretations as SUGGESTIONS so they can tap to clarify.
- If the message is too vague or unclear, ask a soft clarifying question instead of guessing.

Special micro-feature — EV DESIGN SURPRISES:
- When you ask the "One quick last thing: are there any must-have features..." question (the must-haves area E above), you SHOULD include an EV_SURPRISES block to surface 2-3 modern EV features the user may not know exist. This sparks ideas for what they might want.
- Format (place this AFTER your main reply text, before SUGGESTIONS):
EV_SURPRISES:
Item1: [feature name] | [one-line description, max 12 words]
Item2: [feature name] | [one-line description]
Item3: [feature name] | [one-line description]
- Pick 2-3 from: vehicle-to-load power outlets, frunk (front trunk) storage, panoramic glass roofs, ambient interior lighting, regenerative one-pedal driving, heat pump cabin warming, dog mode/camp mode, OTA software updates, vegan eco-leather interiors, AR navigation HUD, massage seats, summon/auto-park, captain's chair second row, integrated dashcam, Matrix LED headlights.
- Only include this block on the must-haves question, nowhere else.

IMPORTANT — TOOL STEPS:
Every reply MUST start with a TOOLS block on the very first line. This tells the user what you did before answering. Format:
TOOLS:["step 1","step 2"]
- Use 1-3 short steps (max 5 words each), written as present participle ("Searching...", "Comparing...", "Checking...")
- Steps must reflect what you ACTUALLY considered to answer — not generic filler.
- Examples:
  - User asks about budget → TOOLS:["Filtering by price range"]
  - User asks about a family car → TOOLS:["Checking 7-seater models","Reviewing safety ratings"]

  - Before recommending → TOOLS:["Searching inventory","Comparing models","Reading owner reviews"]
  - User sends gibberish → TOOLS:["Parsing your message"]
- TOOLS block must appear BEFORE any text, on its own line. Then your normal reply follows.

CRITICAL — SUGGESTIONS ARE MANDATORY:
Every single reply (except RECOMMENDATIONS) MUST end with a SUGGESTIONS block. This is non-negotiable. Even if the user just said "thanks" or made small talk, provide 3-4 tappable replies that move the conversation forward. NEVER omit this block. Format:
SUGGESTIONS:["option 1","option 2","option 3","option 4"]
- Each option must be max 6 words, written as something a user might naturally say.
- Make them concrete and useful — not generic ("Tell me more" is too vague). Examples: "Yes, that's right", "Show me hybrids instead", "Around 400 000 kr", "Family of 4".

When recommending, also start with a TOOLS block, then the intro text, then RECOMMENDATIONS. Recommend 2-3 cars max. Each must follow this exact format:
RECOMMENDATIONS:
Badge: [short label like "Best overall pick" / "Best value" / "Best for families" / "Most efficient" / "Best for towing"]
Model: [Brand Model]
Year: [e.g. 2025]
Subtitle: [short tagline, e.g. "Most reliable in class" or "Under 400 000 kr with hybrid"]
Spec1Label: [e.g. "Starting price"]
Spec1Value: [e.g. "~380 000 kr"]
Spec2Label: [e.g. "Fuel economy"]
Spec2Value: [e.g. "1.6 l/100km"]
Spec3Label: [e.g. "Seating"]
Spec3Value: [e.g. "7 passengers"]
Spec4Label: [e.g. "Range" or "Towing" or "0-60"]
Spec4Value: [e.g. "1 500 kg towing"]
Highlight1: [short benefit, max 8 words]
Highlight2: [short benefit, max 8 words]
Highlight3: [short benefit, max 8 words]
Highlight4: [short benefit, max 8 words]
---
(repeat block for each car, separated by ---)`;

// ── state ────────────────────────────────────────────────────────────────
let messages = [];   // { role, content } for API
let isStreaming = false;
let pinnedCars = []; // { model, year, badge } objects

// ── collection (saved cars) ───────────────────────────────────────────────
function pinCar(rec) {
  const model = cleanField(rec.model);
  if (pinnedCars.some(c => c.model === model)) return;
  pinnedCars.push({
    model: model,
    year: cleanField(rec.year),
    badge: cleanField(rec.badge),

}

function unpinCar(model) {
  pinnedCars = pinnedCars.filter(c => c.model !== model);
  renderCollection();
  // also update any open rec cards in the stream that match this model
  document.querySelectorAll('.rec').forEach(card => {
    const nameEl = card.querySelector('.rec-name');
    if (nameEl && nameEl.textContent === model) {
      card.classList.remove('pinned');
      const pinBtn = card.querySelector('.rec-pin');
      if (pinBtn) {
        pinBtn.classList.remove('on');

}

// ── chat UI helpers ───────────────────────────────────────────────────────
function appendAIMessage(text, onDone) {
  const stream = document.getElementById('stream');

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg ai';
  msgDiv.innerHTML = `
    <div class="msg-content">
      <div class="bub"></div>
    </div>
  `;
  stream.appendChild(msgDiv);

  const bub = msgDiv.querySelector('.bub');
  const full = formatText(text);
  const total = text.length;
  let revealed = 0;
  const speed = 18;

  function tick() {
    revealed = Math.min(revealed + 2, total);
    const plainSoFar = revealed;
    let plainCount = 0;
    let htmlOut = '';
    let inTag = false;
    for (let ci = 0; ci < full.length; ci++) {
      const ch = full[ci];
      if (ch === '<') { inTag = true; }
      if (inTag) { htmlOut += ch; if (ch === '>') inTag = false; continue; }
      if (plainCount >= plainSoFar) break;
      htmlOut += ch;
      plainCount++;
    }
    bub.innerHTML = htmlOut;
    stream.scrollTop = stream.scrollHeight;

    if (revealed < total) {
      setTimeout(tick, speed);
    } else {
      bub.innerHTML = full;
      stream.scrollTop = stream.scrollHeight;
      if (typeof onDone === 'function') onDone(msgDiv);
    }
  }
  tick();
  return msgDiv;
}

function appendUserMessage(text) {
  const stream = document.getElementById('stream');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg user';
  msgDiv.innerHTML = `
    <div class="msg-content">

    </div>

}

function appendTypingIndicator() {
  const stream = document.getElementById('stream');

  msgDiv.className = 'msg ai';
  msgDiv.id = 'typingMsg';
  msgDiv.innerHTML = `
    <div class="msg-content">

}

function removeTypingIndicator() {

}

// ── tool steps (real, from AI response) ────────────────────────────────────
function parseToolSteps(text) {
  const match = text.match(/^TOOLS:\s*(\[.*?\])/m);
  if (match) {
    try { return JSON.parse(match[1]); } catch(e) {}
  }
  return [];
}

function stripToolsBlock(text) {
  return text.replace(/^TOOLS:\s*\[.*?\]\s*/m, '').trim();
}

// Animate tool steps inside the typing indicator — returns a promise
async function runToolStrip(steps) {
  const strip = document.getElementById('toolStrip');
  if (!strip || !steps.length) return;
  for (let i = 0; i < steps.length; i++) {
    const stepEl = document.createElement('div');
    stepEl.className = 'tool-step';
    stepEl.innerHTML = `<span class="tool-icon"></span><span>${escapeHtml(steps[i])}…</span>`;
    strip.appendChild(stepEl);
    document.getElementById('stream').scrollTop = document.getElementById('stream').scrollHeight;
    // stagger each step for natural feel
    await new Promise(r => setTimeout(r, 500 + Math.random() * 250));
    stepEl.classList.add('done');
    stepEl.querySelector('span:last-child').textContent = steps[i];
  }
}

// ── EV design surprises (shown with the must-haves question) ──────────────
function parseEVSurprises(text) {
  if (!text.includes('EV_SURPRISES:')) return null;
  const after = text.split('EV_SURPRISES:')[1] || '';
  const block = after.split('SUGGESTIONS:')[0];

  const items = [];
  for (let i = 1; i <= 5; i++) {
    const m = block.match(new RegExp(`Item${i}:\\s*([^|\\n]+)\\|\\s*([^\\n]+)`));
    if (m) {
      items.push({
        title: cleanField(m[1]),
        desc:  cleanField(m[2]),
      });
    }
  }
  return items.length ? items : null;
}

function renderEVSurprises(items, msgEl) {
  const content = msgEl.querySelector('.msg-content');
  const wrap = document.createElement('div');
  wrap.className = 'surprises';

  const header = document.createElement('div');
  header.className = 'surprises-header';
  header.textContent = 'You might not know about';
  wrap.appendChild(header);

  const list = document.createElement('div');
  list.className = 'surprises-list';
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'surprise-row';
    row.innerHTML = `
      <span class="surprise-title">${escapeHtml(item.title)}</span>
      <span class="surprise-sep">—</span>
      <span class="surprise-desc">${escapeHtml(item.desc)}</span>
    `;
    list.appendChild(row);
  });
  wrap.appendChild(list);
  content.appendChild(wrap);
  document.getElementById('stream').scrollTop = document.getElementById('stream').scrollHeight;
}

// ── recommendation card parser & renderer ─────────────────────────────────
function parseRecs(text) {
  if (!text.includes('RECOMMENDATIONS:')) return null;
  // strip everything before RECOMMENDATIONS: marker
  const after = text.split('RECOMMENDATIONS:')[1] || '';
  const parts = after.split('---').map(s => s.trim()).filter(Boolean);
  return parts.map(part => {
    const get = (key) => {
      const match = part.match(new RegExp(`${key}:\\s*(.+)`));
      return match ? match[1].trim() : '';
    };

    const specs = [];
    for (let i = 1; i <= 4; i++) {
      const label = get(`Spec${i}Label`);
      const value = get(`Spec${i}Value`);
      if (label && value) specs.push({ label, value });
    }

    const highlights = [];
    for (let i = 1; i <= 4; i++) {
      const h = get(`Highlight${i}`);
      if (h) highlights.push(h);
    }

    // fallback for old-format responses (Type/Seats/Price/Why)
    if (specs.length === 0) {
      const type  = get('Type');
      const seats = get('Seats');
      const price = get('Price');
      if (price) specs.push({ label: 'Price', value: price });
      if (seats) specs.push({ label: 'Seating', value: seats + ' passengers' });
      if (type)  specs.push({ label: 'Type',  value: type });
    }
    if (highlights.length === 0) {
      const why = get('Why');
      if (why) highlights.push(why);
    }

    return {
      badge:     get('Badge'),
      model:     get('Model'),
      year:      get('Year'),
      subtitle:  get('Subtitle'),
      specs,
      highlights,
    };
  }).filter(r => r.model);
}

// pick a badge color class based on the badge text
function badgeClass(badge) {
  const b = (badge || '').toLowerCase();
  if (b.includes('overall') || b.includes('best pick') || b.includes('top')) return 'b-best';
  if (b.includes('value') || b.includes('budget') || b.includes('affordable')) return 'b-value';
  if (b.includes('tow') || b.includes('haul') || b.includes('rugged')) return 'b-tow';
  if (b.includes('efficient') || b.includes('economy') || b.includes('eco')) return 'b-eff';
  if (b.includes('family') || b.includes('safe') || b.includes('practical')) return 'b-fam';
  return 'b-default';
}

const PIN_SVG = `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M9.5 1.5L14.5 6.5L11.5 7L8 10.5L5.5 8L9 4.5L9.5 1.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="currentColor" fill-opacity="0.15"/>
  <path d="M5.5 8L1.5 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
</svg>`;

// Clean AI-generated field text: strip outer quotes and parenthetical explanations
function cleanField(str) {
  if (!str) return '';
  let s = str.trim();
  // strip outer quotes (single or double)
  s = s.replace(/^["']+|["']+$/g, '');
  // remove parenthesized content like "(within budget)" or "(pre-owned 2023)"
  s = s.replace(/\s*\([^)]*\)\s*/g, ' ').trim();
  // collapse double spaces
  s = s.replace(/\s{2,}/g, ' ');
  return s;
}

function renderRecs(recs, msgEl) {
  const content = msgEl.querySelector('.msg-content');
  const recsDiv = document.createElement('div');
  recsDiv.className = 'recs';
  recs.forEach((r) => {
    const card = document.createElement('div');
    card.className = 'rec';

    const model = cleanField(r.model);
    const badge = cleanField(r.badge);
    const year = cleanField(r.year);
    const subtitle = cleanField(r.subtitle);

    const yearPart = year || '';
    const subPart = subtitle || '';
    const subline = (yearPart && subPart) ? `${escapeHtml(yearPart)} · ${escapeHtml(subPart)}` : escapeHtml(yearPart || subPart);

    const specsHtml = r.specs.length
      ? `<div class="rec-specs">${r.specs.map(s => `
          <div class="rec-spec">
            <span class="rec-spec-label">${escapeHtml(cleanField(s.label))}</span>
            <span class="rec-spec-value">${escapeHtml(cleanField(s.value))}</span>
          </div>
        `).join('')}</div>`
      : '';

    const highlightsHtml = r.highlights.length
      ? `<div class="rec-divider"></div>
         <div class="rec-highlights">${r.highlights.map(h =>
            `<div class="rec-highlight">${escapeHtml(cleanField(h))}</div>`
          ).join('')}</div>`
      : '';

    const badgeHtml = badge
      ? `<span class="rec-badge ${badgeClass(badge)}">${escapeHtml(badge)}</span>`
      : '';

    card.innerHTML = `
      <button class="rec-pin" title="Save this car" aria-label="Save this car">${PIN_SVG}</button>
      <div class="rec-ph">[ car shot ]</div>
      ${badgeHtml}
      <div class="rec-title">
        <div class="rec-name">${escapeHtml(model)}</div>
        ${subline ? `<div class="rec-sub">${subline}</div>` : ''}
      </div>
      ${specsHtml}
      ${highlightsHtml}
      <button class="rec-cta">View details</button>
    `;

    // wire pin button
    const pinBtn = card.querySelector('.rec-pin');
    if (pinnedCars.some(c => c.model === model)) {
      card.classList.add('pinned');
      pinBtn.classList.add('on');
      pinBtn.title = 'Unsave';
    }
    pinBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const wasPinned = card.classList.toggle('pinned');
      pinBtn.classList.toggle('on', wasPinned);
      pinBtn.title = wasPinned ? 'Unsave' : 'Save this car';
      if (wasPinned) {
        pinCar({ ...r, model }); // pass cleaned model
      } else {
        unpinCar(model);
      }
    });

    // wire CTA
    const cta = card.querySelector('.rec-cta');
    cta.addEventListener('click', () => {
      // placeholder: in future, navigate to detail page
      showToast(`Detail page for ${model} — coming soon`);
    });

    recsDiv.appendChild(card);
  });
  content.appendChild(recsDiv);
  // scroll into view after cards render
  const stream = document.getElementById('stream');
  stream.scrollTop = stream.scrollHeight;
}

// ── send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if (!text) return;

  // render user bubble
  appendUserMessage(text);

  // clear input + suggestions
  input.value = '';
  clearSuggestions();
  updateSend();

  // push to history
  messages.push({ role: 'user', content: text });

  // show typing indicator (tool steps will be added once we get the AI response)
  isStreaming = true;
  document.getElementById('btnSend').disabled = true;
  appendTypingIndicator();

  try {
    const resp = await fetch(DEEPSEEK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`,
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        max_tokens: 800,
        stream: false,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...messages,
        ],
      }),
    });

    if (!resp.ok) {
      const errBody = await resp.text();
      let errMsg = `HTTP ${resp.status}`;
      try { errMsg = JSON.parse(errBody).error?.message || errMsg; } catch(e) {}
      throw new Error(errMsg);
    }

    const data = await resp.json();
    const aiRaw = data.choices?.[0]?.message?.content || '';
    if (!aiRaw) throw new Error('Empty response from API');
    messages.push({ role: 'assistant', content: aiRaw });

    // 1) Parse the TOOLS block from the AI response
    const toolSteps = parseToolSteps(aiRaw);
    // Strip TOOLS block from the text so it doesn't show in the bubble
    const aiText = stripToolsBlock(aiRaw);

    // 2) Animate the real tool steps into the typing indicator
    await runToolStrip(toolSteps);

    // 3) Detach the strip element so it survives removeTypingIndicator
    const stripEl = document.getElementById('toolStrip');
    if (stripEl) {
      stripEl.removeAttribute('id');
      stripEl.parentNode && stripEl.parentNode.removeChild(stripEl);
    }

    removeTypingIndicator();

    // helper to inject the preserved strip at the top of a freshly-created AI msg
    const attachStripTo = (msgEl) => {
      if (!stripEl || !stripEl.children.length) return;
      const content = msgEl.querySelector('.msg-content');
      content.insertBefore(stripEl, content.firstChild);
    };

    // check if it has recommendations
    const recs = parseRecs(aiText);
    if (recs && recs.length > 0) {
      const intro = aiText.split('RECOMMENDATIONS:')[0].trim();
      const introText = stripToolsBlock(intro) || 'Here are my top picks for you:';
      const msgEl = appendAIMessage(introText, (el) => {
        renderRecs(recs, el);
        setSuggestions(['Compare these cars', 'Adjust my budget', 'What about EVs?', 'Show more options']);
      });
      attachStripTo(msgEl);
    } else {
      const surprises = parseEVSurprises(aiText);
      const { cleanText, suggestions } = parseSuggestions(aiText);
      const msgEl = appendAIMessage(cleanText, (el) => {
        if (surprises && surprises.length > 0) {
          renderEVSurprises(surprises, el);
        }
        setSuggestions(suggestions);
      });
      attachStripTo(msgEl);
    }

  } catch (err) {
    removeTypingIndicator();
    showToast('Error: ' + err.message);
    appendAIMessage('Sorry, something went wrong. Please try again.');
    messages.pop(); // remove failed user message
  } finally {
    isStreaming = false;
    updateSend();
  }
}

function parseSuggestions(text) {
  // strip TOOLS block from the displayed text
  let working = text;
  working = working.replace(/^TOOLS:\s*\[.*?\]\s*/m, '').trim();
  // also strip EV_SURPRISES block (rendered separately)
  working = working.replace(/EV_SURPRISES:[\s\S]*?(?=SUGGESTIONS:|$)/, '').trim();

  const match = working.match(/SUGGESTIONS:\s*(\[.*?\])/s);
  if (match) {
    try {
      const suggestions = JSON.parse(match[1]);
      const cleanText = working.replace(/SUGGESTIONS:\s*\[.*?\]/s, '').trim();
      if (Array.isArray(suggestions) && suggestions.length > 0) {
        return { cleanText, suggestions };
      }
    } catch(e) {}
  }
  // FALLBACK: AI forgot to include SUGGESTIONS. Generate sensible defaults.
  return { cleanText: working, suggestions: defaultSuggestions(working) };
}

// Default suggestion fallback when AI omits the SUGGESTIONS block
function defaultSuggestions(aiText) {
  const t = (aiText || '').toLowerCase();
  if (/budget|price|cost|kr|spend/i.test(t)) {
    return ['Around 300 000 kr', 'Around 500 000 kr', 'Around 700 000 kr', 'Flexible on budget'];
  }
  if (/passenger|seat|family|kids/i.test(t)) {
    return ['Just me', '2-4 people', '5-7 people', 'Need 7+ seats'];
  }
  if (/electric|hybrid|petrol|diesel|fuel/i.test(t)) {
    return ['Electric (EV)', 'Hybrid', 'Petrol or diesel', 'Not sure yet'];
  }
  if (/feature|must.?have|tow|sunroof|heated/i.test(t)) {
    return ['Heated seats', 'Tow hitch', 'Sunroof', 'No specific must-haves'];
  }
  if (/recommend|show|suggest|find/i.test(t)) {
    return ['Show me options', 'Need more info first', 'Different direction', 'Continue'];
  }
  // generic catch-all
  return ['Tell me more', 'Continue', 'Skip this', 'Start over'];
}

// ── utils ─────────────────────────────────────────────────────────────────
function formatText(text) {
  return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// global Escape handler — close the collection drawer if open
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const drawer = document.getElementById('collectionDrawer');
    if (drawer && drawer.classList.contains('open')) {
      closeCollection();
    }
  }
});

function updateSend() {
  const input = document.getElementById('inputField');
  const btn = document.getElementById('btnSend');
  const hasContent = input.value.trim().length > 0;
  btn.disabled = !hasContent || isStreaming;
}

function resetAll() {
  messages = [];
  pinnedCars = [];
  document.getElementById('stream').innerHTML = '';
  document.getElementById('inputField').value = '';
  clearSuggestions();
  closeCollection();
  renderCollection();
  updateSend();
  showGreeting();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ── start ─────────────────────────────────────────────────────────────────
init();
</script>
</body>
