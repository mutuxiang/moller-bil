<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AI Car Assistant — Møller Bil</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@font-face { font-family: "Moller"; src: url("fonts/Moller-Regular.otf") format("opentype"); font-weight: 400; font-style: normal; }
@font-face { font-family: "Moller"; src: url("fonts/Moller-RegularItalic.otf") format("opentype"); font-weight: 400; font-style: italic; }
@font-face { font-family: "Moller"; src: url("fonts/Moller-Book.otf") format("opentype"); font-weight: 450; font-style: normal; }
@font-face { font-family: "Moller"; src: url("fonts/Moller-BookItalic.otf") format("opentype"); font-weight: 450; font-style: italic; }
@font-face { font-family: "Moller"; src: url("fonts/Moller-Medium.otf") format("opentype"); font-weight: 500; font-style: normal; }
@font-face { font-family: "Moller"; src: url("fonts/Moller-MediumItalic.otf") format("opentype"); font-weight: 500; font-style: italic; }
</style>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Brand primitives */
  --moller-blue:       #001946;
  --moller-blue-700:   #001232;
  --salmon:            #E1644B;
  --cream-100:         #F9F7F4;
  --cream-200:         #F3EEE8;
  --cream-300:         #EFE9E1;
  --light-blue:        #D9E4F9;

  /* Action: brand "electric" blue — signature CTA color from the brand system */
  --action-blue:       #0000FF;
  --action-blue-hover: #0000D6;
  --action-blue-press: #0000B0;

  /* Semantic */
  --accent:        var(--moller-blue);
  --accent-soft:   rgba(0,25,70,0.06);
  --accent-soft-2: rgba(0,25,70,0.10);
  --accent-ink:    var(--moller-blue-700);
  --action:        var(--action-blue);
  --action-hover:  var(--action-blue-hover);
  --eyebrow:       var(--salmon);

  --bg:           var(--cream-100);
  --bg-surface:   var(--cream-200);
  --bg-surface-2: var(--cream-300);
  --ink:          var(--moller-blue);
  --border:       rgba(0,0,0,0.05);
  --border-strong:rgba(0,0,0,0.10);
  --muted:        rgba(0,25,70,0.55);
  --chip-bg:      var(--cream-200);

  /* Radii — brand uses sharp, minimal corners */
  --radius-card:  4px;   /* sm — cards / images */
  --radius-md:    6px;   /* split / surfaces */
  --radius-lg:    8px;   /* large surfaces */
  --radius-pill:  999px; /* all buttons & chips */
  --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
}

html, body { height: 100%; font-family: "Moller",system-ui,sans-serif; color: var(--ink); background: var(--bg); }

/* ── layout ── */
.app { display: flex; flex-direction: column; height: 100vh; }

.topbar {
  height: 80px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex; align-items: center;
  padding: 0 40px; gap: 16px;
  flex-shrink: 0;
  position: relative;
}
.topbar-brand {
  display: inline-flex; align-items: center;
  flex-shrink: 0;
  text-decoration: none;
}
.topbar-logo { height: 34px; width: auto; display: block; }
/* Title sits absolutely centered in the topbar, regardless of brand/button widths */
.topbar-title {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
  pointer-events: none;
}
.topbar-spacer { flex: 1; }

/* ── mode toggle — flat editorial tabs with a salmon underline ── */
.chat-mode-bar {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
.mode-toggle {
  display: inline-flex;
  background: transparent;
  border: 0;
  height: auto;
  margin: 0;
  position: relative;
}
.mode-toggle button {
  appearance: none; border: 0; background: transparent;
  position: relative;
  padding: 20px 6px;
  margin-right: 36px;
  font: 400 17px/1 "Moller", sans-serif;
  color: var(--muted); cursor: pointer;
  letter-spacing: 0.01em;
  transition: color 220ms var(--ease-out);
}
.mode-toggle button:last-child { margin-right: 0; }
.mode-toggle button:hover { color: var(--ink); }
.mode-toggle button.on {
  color: var(--ink);
  font-weight: 500;
}
.mode-toggle button.on::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 2px;
  background: var(--salmon);
  border-radius: 1px;
}
.mode-toggle button.locked {
  color: rgba(0,25,70,0.35);
  cursor: not-allowed;
}
.mode-toggle button.locked:hover { color: rgba(0,25,70,0.35); }
.mode-toggle button.locked::before {
  content: '';
  display: inline-block;
  width: 9px; height: 11px;
  margin-right: 6px;
  vertical-align: -1px;
  background: currentColor;
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 14 16'><path fill='black' d='M7 0a4 4 0 0 0-4 4v3H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-1V4a4 4 0 0 0-4-4zm-2.5 7V4a2.5 2.5 0 0 1 5 0v3z'/></svg>") center/contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 14 16'><path fill='black' d='M7 0a4 4 0 0 0-4 4v3H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-1V4a4 4 0 0 0-4-4zm-2.5 7V4a2.5 2.5 0 0 1 5 0v3z'/></svg>") center/contain no-repeat;
}


.btn-reset-all,
.btn-filter,
.btn-collection {
  appearance: none; border: 1px solid var(--border-strong); background: transparent;
  color: var(--muted); font: 400 16px/1 "Moller",sans-serif;
  height: 44px; padding: 0 20px;
  border-radius: 999px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  transition: color 220ms var(--ease-out), border-color 220ms var(--ease-out), background 220ms var(--ease-out);
}
.btn-reset-all:hover,
.btn-filter:hover,
.btn-collection:hover { color: var(--ink); border-color: var(--ink); background: var(--accent-soft); }

.btn-collection { position: relative; }
.btn-collection.has-items {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.btn-collection-count {
  font-family: "Moller",sans-serif; font-size: 12px; font-weight: 400;
  min-width: 20px; height: 20px; padding: 0 6px;
  background: var(--accent-soft-2); color: var(--ink);
  border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center;
  line-height: 1;
}
.btn-collection.has-items .btn-collection-count {
  background: var(--accent); color: var(--cream-100);
}

.main { flex: 1; display: flex; min-height: 0; }

.col-spacer {
  width: 80px; flex-shrink: 0; background: var(--bg);
  border-right: 1px solid var(--border);
}
.col-spacer.right {
  border-right: none; border-left: 1px solid var(--border);
}

.col-center {
  flex: 1; display: flex; min-width: 0; min-height: 0;
}

/* ── chat ── */
.chat { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }

.stream {
  flex: 1; overflow-y: auto; padding: 32px 40px 20px;
  display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth;
}
.stream::-webkit-scrollbar { width: 6px; }
.stream::-webkit-scrollbar-thumb { background: rgba(0,25,70,0.12); border-radius: 3px; }

/* ── info banner ── */
.info-banner {
  margin: 24px 32px 0;
  border-radius: var(--radius-lg);
  padding: 20px 24px; background: var(--bg-surface-2);
  display: flex; align-items: center; gap: 16px; flex-shrink: 0;
}
.info-banner-text { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.info-banner-text .eyebrow { font-size: 13px; font-weight: 500; color: var(--eyebrow); display: block; }
.info-banner-text b { font-size: 18px; font-weight: 500; display: block; color: var(--ink); }
.info-banner-text span { font-size: 15px; color: var(--muted); line-height: 1.5; }
.info-banner-link {
  appearance: none; border: 1px solid var(--ink); background: transparent;
  color: var(--ink); font: 400 15px/1 "Moller",sans-serif; padding: 11px 22px;
  border-radius: 999px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  transition: background 220ms var(--ease-out), color 220ms var(--ease-out);
}
.info-banner-link:hover { background: var(--ink); color: var(--cream-100); }

/* ── messages ── */
.msg { display: flex; gap: 12px; align-items: flex-start; max-width: 960px; }
.msg.ai { width: min(100%, 960px); }
.msg.ai.has-recs,
.msg.ai.has-inv {
  width: 100%;
  max-width: none;
}
.msg.user { flex-direction: row-reverse; align-self: flex-end; }

.av { display: none; }

.msg-content { display: flex; flex-direction: column; gap: 10px; min-width: 0; flex: 1; }
.msg.user .msg-content { align-items: flex-end; }

/* ── chat bubbles: 1 small corner, 3 large ── */
.bub {
  padding: 18px 24px; border: 1px solid var(--border);
  /* Brand-aligned: minimal radius, top-left flat to indicate sender */
  border-radius: 2px 12px 12px 12px;
  background: var(--bg-surface);
  font-size: 19px; line-height: 1.6;
  word-wrap: break-word;
  align-self: flex-start;
  width: fit-content;
  max-width: min(820px, calc(100vw - 96px));
  color: var(--ink);
  overflow-wrap: anywhere;
  word-break: break-word;
  hyphens: auto;
  min-width: 0;
  white-space: normal;
}
.msg.user .bub {
  background: var(--bg-surface-2); border-color: transparent; align-self: flex-end;
  /* Brand-aligned: minimal radius, top-right flat to indicate sender */
  border-radius: 12px 2px 12px 12px;
}
.bub b { font-weight: 500; }
.msg-gap {
  display: block;
  height: 10px;
}

/* user-bubble filter tags — outlined, not filled */
.bub-tokens { display: inline-flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-right: 6px; }
.bub-token {
  padding: 3px 11px; border-radius: 999px;
  background: transparent; color: var(--ink);
  border: 1.5px solid rgba(0,25,70,0.35);
  font-size: 13px; font-weight: 400;
}

/* ── tool indicators ── */
.tool-strip { display: flex; flex-direction: column; gap: 5px; align-self: flex-start; }
.tool-step {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 999px;
  background: var(--accent-soft); border: 1px solid var(--border);
  font-family: "Moller",sans-serif; font-size: 13px; font-weight: 400;
  color: var(--accent);
  animation: tool-fade .3s var(--ease-out);
}
.tool-step.done {
  background: transparent; border-color: var(--border);
  color: var(--muted);
}
.tool-step .tool-icon {
  width: 14px; height: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.tool-step:not(.done) .tool-icon::before {
  content: '';
  width: 11px; height: 11px;
  border: 1.5px solid currentColor; border-right-color: transparent;
  border-radius: 50%;
  animation: tool-spin .8s linear infinite;
}
.tool-step.done .tool-icon::before {
  content: '✓'; font-size: 11px; font-weight: 500; line-height: 1;
}
@keyframes tool-spin { to { transform: rotate(360deg); } }
@keyframes tool-fade {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: none; }
}

/* typing dots */
.typing { display: inline-flex; gap: 4px; padding: 4px 0; align-items: center; }
.typing span {
  width: 7px; height: 7px; border-radius: 50%; background: rgba(0,25,70,0.25);
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: .4; }
  40% { transform: translateY(-4px); opacity: 1; }
}

/* ── quick chips ── */
.quick-reply-wrap { padding-bottom: 16px; width: 100%; }
.quick-reply-wrap.empty { display: none; }
.quick-reply-label {
  font-family: "Moller",sans-serif; font-size: 13px; font-weight: 500;
  color: var(--eyebrow); margin-bottom: 10px; display: block;
}
.quick-chips {
  display: flex; flex-wrap: wrap; gap: 8px;
  animation: chips-slide .35s var(--ease-out);
}
@keyframes chips-slide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}

/* loading skeleton chips — shown while AI is generating its reply */
.quick-reply-label.is-loading {
  color: var(--muted);
}
.chip-skeleton {
  height: 36px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background:
    linear-gradient(
      90deg,
      rgba(0,25,70,0.04) 0%,
      rgba(0,25,70,0.10) 50%,
      rgba(0,25,70,0.04) 100%
    );
  background-size: 200% 100%;
  animation: chip-shimmer 1.4s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes chip-shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.chip {
  appearance: none;
  padding: 13px 22px;
  border: 1px solid var(--border-strong); border-radius: 999px;
  font: 500 17.5px/1.5 "Moller",sans-serif;
  color: var(--ink); background: var(--cream-100);
  cursor: pointer; user-select: none;
  transition: background 220ms var(--ease-out), color 220ms var(--ease-out), border-color 220ms var(--ease-out);
}
.chip:hover {
  background: var(--accent); color: var(--cream-100);
  border-color: var(--accent);
}
.chip.on {
  background: var(--accent); color: var(--cream-100);
  border-color: var(--accent);
}

/* ── EV surprises ── */
.surprises {
  margin-top: 2px;
  padding: 18px 20px;
  background: var(--bg-surface);
  border-radius: var(--radius-md);
  align-self: flex-start;
  max-width: 680px;
}
.surprises-header {
  font-size: 13px; font-weight: 500;
  color: var(--eyebrow); margin-bottom: 12px;
}
.surprises-list { display: flex; flex-direction: column; gap: 8px; }
.surprise-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--cream-100); border-radius: var(--radius-card); padding: 12px 14px;
}
.surprise-img {
  width: 56px; height: 56px; flex-shrink: 0;
  background: repeating-linear-gradient(135deg,rgba(0,25,70,.05) 0 5px,rgba(0,0,0,0) 5px 10px), var(--bg);
  border: 1px solid var(--border); border-radius: var(--radius-card);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--muted);
}
.surprise-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
.surprise-title { font-size: 15px; font-weight: 500; color: var(--ink); line-height: 1.3; }
.surprise-desc { font-size: 13.5px; color: var(--muted); line-height: 1.45; }

/* ════════════════════════════════════════════════════════════
   RECOMMENDATION CARDS — redesigned
   ════════════════════════════════════════════════════════════ */
.recs {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
  margin-top: 4px;
  max-width: 1080px;
}
.msg.has-recs { max-width: none; }
.msg.has-recs .msg-content,
.msg.has-inv .msg-content {
  width: 100%;
  flex: 1 1 100%;
}

.rec {
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  background: var(--cream-50, #FEFDFD);
  display: flex; flex-direction: column;
  position: relative;
  overflow: visible;
  transition: border-color 220ms var(--ease-out), box-shadow 220ms var(--ease-out);
}
.rec:hover {
  border-color: rgba(0,0,0,0.18);
  box-shadow: 0 1px 2px rgba(0,25,70,0.06);
}
.rec.pinned {
  border-color: var(--accent);
  background: var(--bg-surface);
  order: -1;
  box-shadow: 0 4px 16px rgba(0,25,70,0.10);
}

/* Image placeholder — short side doubled (120→240px) */
.rec-ph, .rec-img {
  width: 100%; height: 240px;
  border-bottom: 1px solid var(--border);
  border-top-left-radius: var(--radius-card);
  border-top-right-radius: var(--radius-card);
  flex-shrink: 0;
  position: relative;
  display: block;
}
.rec-ph {
  background:
    repeating-linear-gradient(135deg, rgba(0,25,70,.04) 0 8px, rgba(0,0,0,0) 8px 16px),
    var(--cream-200);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--muted); letter-spacing: .02em;
  text-align: center; padding: 0 24px;
}
.rec-img { object-fit: cover; background: var(--cream-200); }
.rec-ph.rec-ph-empty {
  background: var(--cream-200);
  color: var(--muted);
  font-size: 13.5px;
  line-height: 1.5;
  letter-spacing: 0;
}

/* Card body — all content below image */
.rec-body {
  padding: 16px 18px 18px;
  display: flex; flex-direction: column; gap: 14px;
  flex: 1;
}

.rec-actions {
  margin-top: auto;
  display: flex; gap: 10px;
}
.rec-inv {
  appearance: none; flex: 1;
  border: 0; background: var(--action-blue); color: var(--white, #fff);
  border-radius: 999px; padding: 13px 20px;
  font: 500 15px/1 "Moller",sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background 220ms var(--ease-out), opacity 220ms;
}
.rec-inv:hover:not(:disabled) { background: var(--action-blue-hover); }
.rec-inv:active:not(:disabled) { background: var(--action-blue-press); }
.rec-inv:disabled { opacity: .5; cursor: wait; }

/* ── inventory cards ── */
.inv-block {
  align-self: flex-start; max-width: 1080px; width: 100%;
  display: flex; flex-direction: column; gap: 8px;
}
.msg.has-inv { max-width: none; }
.inv-header {
  font-size: 13px; font-weight: 500; color: var(--eyebrow);
  letter-spacing: .03em;
}
.inv-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; margin-top: 4px;
}
.inv-card {
  border: 1px solid var(--border); border-radius: var(--radius-card);
  background: var(--cream-50, #FEFDFD);
  display: flex; flex-direction: column;
  overflow: visible;
  transition: border-color 220ms var(--ease-out), box-shadow 220ms var(--ease-out);
}
.inv-card:hover {
  border-color: rgba(0,0,0,0.18);
  box-shadow: 0 1px 2px rgba(0,25,70,0.06);
}
.inv-card.pinned {
  border-color: var(--accent);
  background: var(--bg-surface);
  order: -1;
}
.inv-ph, .inv-img {
  width: 100%; height: 240px;
  border-bottom: 1px solid var(--border);
  border-top-left-radius: var(--radius-card);
  border-top-right-radius: var(--radius-card);
  flex-shrink: 0;
  display: block;
}
.inv-ph {
  background:
    repeating-linear-gradient(135deg, rgba(0,25,70,.04) 0 8px, rgba(0,0,0,0) 8px 16px),
    var(--cream-200);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--muted);
}
.inv-img {
  object-fit: cover;
  background: var(--cream-200);
}

/* ── AI message bullet list — same type-scale as the bubble, light separators ── */
.msg-notes {
  display: flex; flex-direction: column;
  margin: 6px 0;
}
.msg-note {
  display: flex; align-items: flex-start; gap: 14px;
  font-size: 19px; line-height: 1.6; color: var(--ink);
  padding: 10px 0;
}
.msg-note + .msg-note {
  border-top: 1px solid var(--border);
}
.msg-note-icon {
  flex-shrink: 0;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--moller-blue); color: var(--cream-100);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 13.5px; font-weight: 500;
  margin-top: 3px;
}
.msg-note-text { flex: 1; min-width: 0; overflow-wrap: anywhere; }

/* ── glossary terms with hover tooltip ── */
.term {
  position: relative;
  cursor: help;
  border-bottom: 1px dotted rgba(0,25,70,0.32);
}
.term::after {
  content: '?';
  display: inline-block;
  font-size: 0.65em;
  vertical-align: super;
  color: var(--muted);
  margin-left: 1px;
  font-weight: 500;
  line-height: 1;
}
.term-tip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--moller-blue);
  color: var(--cream-100);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 400;
  line-height: 1.45;
  width: max-content;
  max-width: 260px;
  text-align: left;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 180ms var(--ease-out), visibility 180ms var(--ease-out);
  z-index: 100;
  white-space: normal;
}
.term-tip::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--moller-blue);
}
.term:hover .term-tip,
.term:focus .term-tip { opacity: 1; visibility: visible; }

/* ── collection-button flash on Save ── */
@keyframes btnFlash {
  0%   { transform: scale(1);   box-shadow: 0 0 0 0 rgba(225,100,75,0.45); }
  30%  { transform: scale(1.08); box-shadow: 0 0 0 8px rgba(225,100,75,0); }
  100% { transform: scale(1); }
}
.btn-collection.flash {
  animation: btnFlash 1s var(--ease-out);
  border-color: var(--salmon) !important;
  color: var(--salmon) !important;
}

/* Inner padding wrapper for inventory cards */
.inv-body {
  padding: 14px 16px 16px;
  display: flex; flex-direction: column; gap: 12px;
  flex: 1;
}

.inv-head { display: flex; flex-direction: column; gap: 3px; }
.inv-title { font-size: 20px; font-weight: 500; line-height: 1.3; color: var(--ink); }
.inv-sub {
  font-size: 15.5px; color: var(--muted);
  display: flex; gap: 6px; flex-wrap: wrap;
  /* Reserve space so a 1-line subline and a 2-line subline align across cards */
  min-height: 3em;
  line-height: 1.4;
}
.inv-sub > span:not(:last-child)::after { content: '·'; margin-left: 6px; opacity: .5; }
.inv-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.inv-stat {
  border-radius: var(--radius-card); padding: 11px 13px;
  display: flex; flex-direction: column; gap: 3px;
  background: var(--bg-surface);
  /* Fixed min-height so the price stat and location stat are the same height */
  min-height: 92px;
}
/* Car price gets the blue highlight; per-year gets the plain surface */
.inv-stat.is-price { background: var(--light-blue); }
.inv-stat-label { font-size: 12.5px; color: var(--muted); }
.inv-stat.is-price .inv-stat-label { color: var(--accent); }
.inv-stat-value {
  font-size: 19px; font-weight: 500; color: var(--ink); line-height: 1.2;
  white-space: nowrap;
}
.inv-stat-note {
  font-size: 12px; color: var(--muted); line-height: 1.4; margin-top: 2px;
  display: flex; flex-direction: column; gap: 1px;
  /* No overflow:hidden — would clip the glossary tooltips inside */
}
.inv-stat-note > span {
  white-space: nowrap;
  /* Allow content (including hover tooltips) to escape this row */
  overflow: visible;
  position: relative;
}
.inv-stat.is-price .inv-stat-note { color: var(--accent-ink); }
.inv-edge {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 11px 13px; border-radius: var(--radius-card);
  background: var(--cream-200);
  font-size: 13.5px; line-height: 1.45; color: var(--ink);
  /* Reserve space for 2 lines so all cards' edge boxes line up */
  min-height: 64px;
}
.inv-edge-text { flex: 1; min-width: 0; }
.inv-edge-label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--eyebrow); margin-bottom: 2px;
}
.inv-actions { margin-top: auto; display: flex; gap: 8px; }
.inv-save, .inv-cta {
  appearance: none; flex: 1;
  border: 1px solid var(--border-strong); background: transparent;
  border-radius: 999px; padding: 10px 14px;
  font: 400 13.5px/1 "Moller",sans-serif; color: var(--ink);
  cursor: pointer;
  transition: background 220ms var(--ease-out), color 220ms var(--ease-out), border-color 220ms var(--ease-out);
}
.inv-save:hover, .inv-cta:hover { background: var(--ink); color: var(--cream-100); border-color: var(--ink); }
.inv-save.on {
  background: var(--accent); color: var(--cream-100); border-color: var(--accent);
}
.inv-save.on:hover { background: var(--accent-ink); border-color: var(--accent-ink); }

@media (max-width: 900px) {
  .inv-grid { grid-template-columns: 1fr; }
}

/* Rec badge — eyebrow above model name */
.rec-badge {
  font-size: 12.5px; font-weight: 500;
  color: var(--eyebrow);
  display: inline-block;
  letter-spacing: .01em;
}

.rec-title { display: flex; flex-direction: column; gap: 2px; }
.rec-name { font-size: 26px; font-weight: 500; line-height: 1.2; color: var(--ink); }
.rec-sub { font-size: 16px; color: var(--muted); margin-top: 1px; }

.rec-specs {
  display: grid; grid-template-columns: 1fr 1fr; gap: 7px;
}
.rec-spec {
  background: var(--bg-surface); border-radius: var(--radius-card); padding: 9px 12px;
  display: flex; flex-direction: column; gap: 2px;
}
.rec-spec-label { font-size: 14px; color: var(--muted); }
.rec-spec-value { font-size: 17.5px; font-weight: 500; color: var(--ink); }

.rec-divider { height: 1px; background: var(--border); }

.rec-highlights { display: flex; flex-direction: column; gap: 6px; }
.rec-highlight {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 16px; font-weight: 400; color: var(--ink); line-height: 1.5;
}
.rec-highlight::before {
  content: '';
  flex-shrink: 0;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--salmon);
  margin-top: 8px;
}

/* ── composer ── */
.composer {
  border-top: 1px solid var(--border); padding: 18px 40px 24px;
  flex-shrink: 0; background: var(--bg);
}
.cbox {
  border: 1px solid var(--border-strong); border-radius: var(--radius-md); padding: 18px 20px;
  display: flex; flex-direction: column; gap: 12px; background: var(--cream-50, #FEFDFD);
  transition: border-color 180ms var(--ease-out);
}
.cbox:focus-within { border-color: var(--action-blue); }

.tokens-row { display: none; flex-wrap: wrap; gap: 6px; align-items: center; }
.tokens-row:not(:empty) { display: flex; }
.token {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 8px 5px 14px; border-radius: 999px;
  background: var(--accent); color: var(--cream-100);
  border: 0; font-size: 13px; font-weight: 400;
}
.token button {
  appearance: none; border: 0; background: transparent; color: inherit;
  cursor: pointer; opacity: .55; font-size: 13px; padding: 0 4px; line-height: 1;
}
.token button:hover { opacity: 1; }

.input-field {
  flex: 1 1 auto; min-width: 140px; width: 100%;
  appearance: none; border: 0; outline: 0; background: transparent;
  font-family: "Moller",sans-serif; font-size: 19px; color: var(--ink);
  padding: 0; margin: 0; resize: none; line-height: 1.55;
  overflow-y: hidden;
  display: block;
  field-sizing: content;
  box-sizing: content-box;
}
.input-field::placeholder { color: rgba(0,25,70,0.32); }

.cfoot { display: flex; justify-content: flex-end; align-items: center; }

.btn-send {
  appearance: none; border: 0; background: var(--action-blue); color: var(--white, #fff);
  padding: 15px 32px; border-radius: 999px;
  font: 500 17.5px/1 "Moller",sans-serif; cursor: pointer;
  transition: background 180ms var(--ease-out), opacity 180ms;
}
.btn-send:hover:not(:disabled) { background: var(--action-blue-hover); }
.btn-send:active:not(:disabled) { background: var(--action-blue-press); }
.btn-send:disabled { opacity: .35; cursor: not-allowed; }

/* ── sidebar ── */
.side {
  width: 540px; border-left: 1px solid var(--border); background: var(--bg-surface);
  display: flex; flex-direction: column; flex-shrink: 0;
  min-width: 300px; max-width: 600px;
}
.side-head {
  padding: 22px 26px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.side-head-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.side-head b { font-size: 22px; font-weight: 500; color: var(--ink); display: block; }
.side-head-sub { font-size: 13px; color: var(--muted); }
.side-head-actions { display: flex; align-items: center; gap: 8px; }
.side-reset {
  font-size: 11.5px; color: var(--muted);
  cursor: pointer; background: none; border: none; font-family: inherit;
}
.side-reset:hover { color: var(--ink); }
.btn-apply {
  appearance: none; background: transparent; color: var(--muted);
  border: 1px solid var(--border-strong); border-radius: 999px;
  font: 400 13.5px/1 "Moller",sans-serif; padding: 8px 16px; cursor: default;
  transition: background 220ms var(--ease-out), color 220ms var(--ease-out), border-color 220ms var(--ease-out);
}
.btn-apply.active {
  background: var(--accent); color: var(--cream-100);
  border-color: var(--accent); cursor: pointer;
}
.btn-apply.active:hover { background: var(--action-hover); border-color: var(--action-hover); }

.side-body { padding: 22px 26px; display: flex; flex-direction: column; gap: 22px; overflow-y: auto; }

/* ── Recommended for you (live picks) ── */
.side-recs {
  display: flex;
  flex-direction: column; gap: 14px;
  padding: 22px 26px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  max-height: 46%;
  background: var(--bg-surface);
}
.live-rec-skeleton {
  height: 64px; border-radius: 6px;
  background: linear-gradient(90deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.04) 100%);
  background-size: 200% 100%;
  animation: live-rec-shimmer 1.4s ease-in-out infinite;
}
@keyframes live-rec-shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}
.live-rec-empty {
  font-size: 14px; color: var(--muted); line-height: 1.5;
  padding: 6px 0;
}
.side-recs-head { display: flex; flex-direction: column; gap: 3px; }
.side-recs-head b { font-size: 20px; font-weight: 500; color: var(--ink); display: block; }
.side-recs-reason {
  font-size: 12.5px; font-weight: 500;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--salmon);
}
.side-recs-body {
  display: flex; flex-direction: column; gap: 8px;
  overflow-y: auto; min-height: 0;
}
.live-rec-card {
  appearance: none; border: 1px solid var(--border);
  background: var(--cream-50, #FEFDFD);
  border-radius: 6px;
  padding: 10px 12px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  color: var(--ink);
  transition: border-color 180ms var(--ease-out), background 180ms var(--ease-out);
}
.live-rec-card:hover {
  border-color: rgba(0,0,0,0.18);
  background: var(--cream-100);
}
.live-rec-card:disabled { opacity: .55; cursor: wait; }
.live-rec-img {
  width: 76px; height: 56px;
  object-fit: cover;
  border-radius: 4px;
  background: var(--cream-200);
  flex-shrink: 0;
}
.live-rec-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.live-rec-name {
  font-size: 14.5px; font-weight: 500; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.live-rec-meta { font-size: 12.5px; color: var(--muted); }
.live-rec-arrow {
  color: var(--muted); font-size: 18px; flex-shrink: 0;
  transition: color 180ms var(--ease-out), transform 180ms var(--ease-out);
}
.live-rec-card:hover .live-rec-arrow {
  color: var(--action-blue);
  transform: translateX(2px);
}

/* ── filter section: status display first, editing tools second ── */
.filter-group {
  display: flex; flex-direction: column; gap: 6px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.filter-group:first-of-type { padding-top: 4px; }
.filter-group:last-of-type { border-bottom: 0; padding-bottom: 4px; }

.filter-label-row {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.filter-label-left {
  display: inline-flex; align-items: center; gap: 7px;
  flex: 1; min-width: 0;
}

/* Section title — eyebrow accent (salmon) so the topic stands as metadata */
.filter-label {
  font-size: 14.5px; font-weight: 500;
  color: var(--eyebrow);
  letter-spacing: .14em;
  text-transform: uppercase;
}

/* Status pill — replaces dot + text */
.filter-status-pill {
  display: inline-flex; align-items: center;
  padding: 2px 9px;
  border-radius: 999px;
  font-size: 11.5px; font-weight: 500;
  letter-spacing: .02em;
  border: 1.5px solid var(--border-strong);
  color: var(--muted);
  background: transparent;
  transition: background .2s, border-color .2s, color .2s;
}
.filter-group[data-state="confirmed"] .filter-status-pill {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--cream-100);
}

/* The CONFIRMED VALUE — focal point of the panel */
.filter-value {
  font-size: 20px; line-height: 1.4; color: var(--ink);
  font-weight: 500;
  padding-top: 4px;
  transition: color 220ms var(--ease-out);
}
.filter-value.placeholder {
  font-size: 15px; color: var(--muted); font-weight: 400;
}
/* Group has un-sent manual edits — value text + status pill turn salmon */
.filter-group.dirty .filter-value { color: var(--salmon); }
.filter-group.dirty .filter-status-pill {
  background: rgba(225,100,75,0.14);
  color: var(--salmon);
}
/* Individual chip that was newly toggled (added or removed) — salmon-tinted */
.chip.pending {
  background: var(--salmon) !important;
  border-color: var(--salmon) !important;
  color: var(--cream-100) !important;
}
.chip.pending.was-on {
  /* Was on, now off — show as outlined salmon (about to be removed) */
  background: transparent !important;
  color: var(--salmon) !important;
  text-decoration: line-through;
}
/* Learning mode — hide the right sidebar entirely, the user isn't building a profile */
body.mode-learning .side,
body.mode-learning .col-spacer.right {
  display: none !important;
}

/* Lazy sidebar sections — only confirmed sections show; pending ones stay hidden.
   The panel itself always stays in the layout, just empty at first. */
.filter-group[data-state="pending"] { display: none; }
/* Gentle slide-in for each new filter section that appears */
.filter-group { animation: filter-pop-in 0.35s var(--ease-out); }
@keyframes filter-pop-in {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: none; }
}
/* Empty-state placeholder shown when no filter sections are confirmed yet */
.side-empty-state {
  font-size: 16px;
  color: var(--muted);
  line-height: 1.55;
  padding: 8px 0;
}

/* Update-diff layout that replaces the quick-reply chips while sidebar is dirty */
.quick-reply-label.is-update { color: var(--salmon); }
#suggestionsBar.quick-chips-diff {
  flex-direction: column;
  gap: 10px;
  animation: none;
}
.diff-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--cream-200);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.diff-label {
  font: 500 11px/1 "Moller", sans-serif;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--eyebrow);
  flex-shrink: 0;
  margin-right: 4px;
}
.diff-tags-group {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}
.diff-tag {
  padding: 5px 12px;
  border-radius: 6px;
  font: 400 13px/1.3 "Moller", sans-serif;
  border: 1px solid;
  white-space: nowrap;
}
.diff-tag-old {
  color: var(--muted);
  border-color: rgba(0,25,70,0.20);
  background: var(--cream-100);
  text-decoration: line-through;
  text-decoration-color: rgba(0,25,70,0.45);
}
.diff-tag-new {
  color: var(--cream-100);
  background: var(--salmon);
  border-color: var(--salmon);
  font-weight: 500;
}
.diff-arrow {
  color: var(--muted);
  font-size: 16px;
  margin: 0 2px;
  flex-shrink: 0;
}

/* Toggle that reveals the editing chips — pill button, clearly clickable */
.filter-change-toggle {
  appearance: none;
  background: transparent;
  border: 1px solid var(--border-strong);
  font: 400 14.5px/1 "Moller", sans-serif;
  color: var(--ink);
  display: inline-flex; align-items: center;
  padding: 10px 18px;
  margin-top: 6px;
  border-radius: 999px;
  cursor: pointer;
  align-self: flex-start;
  transition: background 180ms var(--ease-out), color 180ms var(--ease-out), border-color 180ms var(--ease-out);
}
.filter-change-toggle:hover {
  background: var(--action-blue);
  color: var(--white, #fff);
  border-color: var(--action-blue);
}

/* Hidden by default; shown when user clicks Change */
.filter-edit {
  display: none;
  padding-top: 6px; padding-left: 18px;
}
.filter-group.expanded .filter-edit { display: block; }

.chips-row { display: flex; flex-wrap: wrap; gap: 6px; }

/* small "?" help icon with tooltip */
.filter-help {
  appearance: none; background: transparent;
  border: 1px solid var(--border);
  width: 16px; height: 16px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font: 500 10px/1 "Moller", sans-serif;
  color: var(--muted); cursor: help;
  position: relative;
  transition: color .15s, border-color .15s;
}
.filter-help:hover { color: var(--ink); border-color: var(--ink); }
.filter-help::after {
  content: attr(data-tip);
  position: absolute; left: 50%; top: calc(100% + 8px);
  transform: translateX(-50%);
  background: var(--ink); color: var(--cream-100);
  font: 400 11.5px/1.4 "Moller", sans-serif;
  padding: 8px 10px; border-radius: 6px;
  width: 200px; text-align: left;
  opacity: 0; pointer-events: none;
  transition: opacity .15s;
  z-index: 50;
  box-shadow: 0 4px 16px rgba(0,25,70,0.15);
}
.filter-help::before {
  content: ''; position: absolute; left: 50%; top: 100%;
  transform: translateX(-50%);
  border: 5px solid transparent; border-bottom-color: var(--ink);
  margin-top: 3px;
  opacity: 0; pointer-events: none;
  transition: opacity .15s;
}
.filter-help:hover::after,
.filter-help:hover::before { opacity: 1; }

/* jump-to-message button — quiet text link, not a CTA. No arrow. */
.filter-jump {
  appearance: none; background: transparent;
  border: 0;
  height: 22px; padding: 0; border-radius: 0;
  display: inline-flex; align-items: center;
  cursor: pointer; color: var(--muted);
  font: 400 12.5px/1 "Moller", sans-serif;
  letter-spacing: .01em;
  text-decoration: underline;
  text-decoration-color: rgba(0,25,70,0.18);
  text-underline-offset: 3px;
  transition: color .15s, text-decoration-color .15s, opacity .15s;
  flex-shrink: 0;
  margin-left: auto;
}
.filter-jump:hover:not(:disabled) {
  color: var(--ink);
  text-decoration-color: var(--ink);
}
.filter-jump:disabled { opacity: 0.30; cursor: not-allowed; text-decoration: none; }
.filter-jump.has-message { color: var(--accent); }
.filter-jump.has-message:hover { text-decoration-color: var(--accent); }
.filter-jump.has-message:not(:disabled) { color: var(--accent) !important; }

/* highlight when chat is jumped to */
@keyframes msg-pulse {
  0%   { box-shadow: 0 0 0 0   rgba(225,100,75,0.50); }
  40%  { box-shadow: 0 0 0 8px rgba(225,100,75,0.18); }
  100% { box-shadow: 0 0 0 0   rgba(225,100,75,0.00); }
}
.msg.msg-jumped .bub {
  animation: msg-pulse 1.6s ease-out;
  border-color: var(--salmon);
}

/* sidebar chips are quieter than chat suggestion chips — editing tools, not CTAs */
.chips-row .chip {
  padding: 5px 12px;
  font-size: 13px;
  font-weight: 400;
  background: transparent;
  border-color: var(--border);
  color: var(--muted);
}
.chips-row .chip:hover {
  background: transparent;
  color: var(--ink);
  border-color: rgba(0,25,70,0.40);
}
.chips-row .chip.on {
  background: var(--accent);
  color: var(--cream-100);
  border-color: var(--accent);
  font-weight: 500;
}
.chips-row .chip.on:hover {
  background: var(--moller-blue-700);
  border-color: var(--moller-blue-700);
}

/* budget dual-handle slider */
.budget-module { display: flex; flex-direction: column; gap: 10px; }
.budget-vals {
  display: flex; justify-content: space-between;
  font-size: 11.5px; color: var(--muted);
}
.budget-track { position: relative; height: 24px; margin: 4px 0; }
.budget-track::before {
  content: ''; position: absolute;
  top: 50%; left: 0; right: 0; height: 4px;
  transform: translateY(-50%);
  background: rgba(0,25,70,0.14); border-radius: 2px;
}
.budget-track-fill {
  position: absolute; top: 50%; height: 4px;
  transform: translateY(-50%);
  background: var(--accent); border-radius: 2px;
  pointer-events: none;
}
.budget-input {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 24px; margin: 0;
  appearance: none; -webkit-appearance: none;
  background: transparent; outline: none;
  pointer-events: none;
}
.budget-input::-webkit-slider-thumb {
  appearance: none; -webkit-appearance: none;
  pointer-events: auto;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--cream-100); border: 2px solid var(--accent);
  box-shadow: 0 1px 4px rgba(0,25,70,0.20); cursor: pointer;
  position: relative; z-index: 2;
}
.budget-input::-moz-range-thumb {
  pointer-events: auto;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--cream-100); border: 2px solid var(--accent);
  box-shadow: 0 1px 4px rgba(0,25,70,0.20); cursor: pointer;
}
.budget-input::-webkit-slider-runnable-track { background: transparent; }
.budget-selected { font-size: 13px; font-weight: 500; color: var(--ink); }

/* drag handle */
.resize-handle {
  width: 5px; flex-shrink: 0; cursor: col-resize;

// ── config ──────────────────────────────────────────────────────────────
// Gemini API
const GEMINI_API_KEY = 'AIzaSyCrbEFNyBsMkCFkTdsvz_if8-znO-1w-v8';
const GEMINI_MODEL   = 'gemini-2.5-flash';
const GEMINI_URL     = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;

// Convert OpenAI-style {role, content} messages into Gemini's {systemInstruction, contents}
function toGeminiBody(allMessages, maxTokens) {
  const systemParts = allMessages
    .filter(m => m.role === 'system')
    .map(m => m.content)
    .join('\n\n');
  const contents = allMessages
    .filter(m => m.role !== 'system')
    .map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content || '' }],
    }));
  const body = {
    contents,
    generationConfig: {
      maxOutputTokens: maxTokens || 800,
      temperature: 0.7,
    },
  };
  if (systemParts) body.systemInstruction = { parts: [{ text: systemParts }] };
  return body;
}

// Extract text from a Gemini /generateContent response
function geminiText(data) {
  return data?.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
}

const SYSTEM_PROMPT = `You are a friendly car advisor at Møller Bil. Help users find the right car through natural conversation.

IMPORTANT — inventory and stock:
- You DO have access to Møller Bil's live inventory. When you recommend a model, the user can click "View inventory" in the interface to instantly see real listings in stock.
- NEVER say you don't have access to inventory, stock, or listings. NEVER direct users to an external website or offer to "connect them with a sales adviser" to check availability.
- Your job is to recommend the right MODEL. The interface handles showing the actual cars in stock.

Rules:
- ONE question per reply. NEVER ask two questions in the same reply, even labeled "1." and "2." or chained with "and". If you've covered topic A and want to move to topic B, save B for the next turn.
- Keep replies short (2-3 sentences max unless recommending).
- Start by asking something open and easy — like what's prompting them to look for a car, or what their current situation is. Do NOT ask about car usage scenarios first.
- Always respond in English.
- All prices and budgets are in Norwegian kroner (kr). Format like "350 000 kr" or "~450 000 kr". NEVER use $ or €.
- HIGH-PRIORITY OVERRIDE: If the user's message contains "Not sure yet", "I am not sure yet", "[NOT-SURE-YET", "unsure", or similar — DO NOT advance the conversation. Stay on the EXACT current topic. Briefly explain the options (1–2 sentences each), then re-ask the SAME question. The last sentence of your reply MUST be a question about the same topic. NEVER pivot to budget, seats, brand, must-haves, etc. when the user is asking for clarification on the current question. This rule overrides the normal B+C+D+F+G flow.

OPENING — read the user's mode from their FIRST reply:
- If they say "Find my next car" / "replace my car" / "compare options" / "shopping" → SHOPPING MODE. Begin the discovery flow below.
- If they say "Just learning" / "exploring" / "researching" / "want to know more" → LEARNING MODE. Skip the discovery flow. Be a friendly Norwegian car-buying tutor — answer their questions about price ranges, fuel types, financing, ownership costs, what to look for in a used car. Keep replies short and conversational. If they show buying intent later ("OK now help me find one"), smoothly switch to SHOPPING MODE.
- If they say "Both" or are unclear → ask which they'd like to start with.

Conversation flow (SHOPPING MODE only) — adaptive, not rigid:
There are 7 possible areas you can cover. Some are REQUIRED before recommending, others are optional.

REQUIRED (must all be covered before you can show RECOMMENDATIONS):
B) Passengers / seats they need
C) Budget range
D) Fuel type / powertrain (petrol, diesel, hybrid, electric)
F) Must-have features — always ask this ONCE; this is the question where you emit the EV_SURPRISES block (see that rule)
G) Personal preferences wrap-up — the LAST question, always asked once right before recommending (see PERSONAL PREFERENCES rule)

OPTIONAL (ask only if there's a natural opening — don't gate recommendations on these):
A) Situation/motivation (why they're looking)
E) Brand preference (Audi, BMW, Volvo, Toyota, Tesla, Volkswagen, Hyundai, Kia, Peugeot, Renault, Mercedes, Ford, etc., or "no preference / open to anything")

Rules for the flow:
- Always lead with the user's energy. If they open with "growing family" → ask seats. If they open with budget → dive into budget.
- Required order: B + C + D (any order) → F (with EV surprises) → G (personal preferences) → RECOMMENDATIONS.
- A (situation) is a nice warm-up but skip it if the user is impatient or has already implied their motivation.
- Budget is the one REQUIRED area users sometimes try to dodge. If they avoid it, gently circle back: "Before I can find the right match, it'd really help to know roughly what budget you're thinking — even a ballpark helps!"
- If a user's earlier message already answered an area (e.g. they said "I need a 7-seater for my family"), DON'T ask that area again.
- E (brand) is OPTIONAL — ask only ONCE, casually, e.g. "Any brands you already trust?" Accept "no preference" immediately. NEVER push. If the user mentions a brand anywhere, treat E as covered.

DECISION POINT — when to recommend:
- All of B, C, D, F, G covered? → Emit RECOMMENDATIONS on the next turn.
- You may weave E in between if there's natural space, but never delay recommendations to ask brand if you already have B+C+D+F+G.
- Don't ask more than ONE question per turn. Don't drag the conversation.

PERSONAL PREFERENCES (Area G — ask exactly ONCE, right before recommending):
- This is the LAST question before recommendations. It comes AFTER the must-haves question (F, which included the EV_SURPRISES panel) and is CLEARLY different from it:
  • Area F asked about FUNCTIONAL features (tow hitch, AWD, sunroof, heated seats) and surfaced cutting-edge EV capabilities the user may not know exist.
  • Area G asks about SUBJECTIVE / LIFESTYLE preferences — things that don't show up on a spec sheet: looks, ownership-cost worries, life situation around the purchase.
- Phrase it as ONE combined wrap-up question that bundles several personal touches. Example:
  "One last quick thing before I pull up your matches — any **personal preferences** I should know? Things like preferred (or no-go) colors, ownership costs you're watching (parking, tolls, insurance), trade-in plans, or comfort extras you'd love."
- Keep it open — invite them to mention whichever of those topics applies, or say "no specific preferences" if none.
- SUGGESTIONS for this question should be concrete personal-preference answers, e.g.:
  ["Just no bright colors please", "Trade-in my current car", "Worried about insurance band", "Want premium audio", "No specific preferences"]
- After the user replies, emit RECOMMENDATIONS on the next turn (acknowledge their personal preferences briefly in the intro sentence).

Handling user input issues:
- If the user's message looks like a typo, garbled text, or they seem confused (e.g. random characters, an obvious misspelling of a car model, an unrealistic number like "5 kr budget" or "200 passengers"), respond gently with an "Oops, looks like something might have gone wrong there — did you mean…?" tone. Stay warm and helpful, never make them feel bad. Then suggest 2-3 likely interpretations as SUGGESTIONS so they can tap to clarify.
- If the message is too vague or unclear, ask a soft clarifying question instead of guessing.

Special micro-feature — EV DESIGN SURPRISES (MANDATORY when asking about must-have features):
- The must-haves question (area F) is THE ONLY question where you MUST emit an EV_SURPRISES block. This is non-negotiable — never skip it when asking about must-haves.
- The block goes AFTER your main reply text and BEFORE the SUGGESTIONS block.
- EXACT format (use these EXACT field names — Item1, Item2, Item3 — with a pipe between name and description):
EV_SURPRISES:
Item1: Vehicle-to-Load (V2L) | Power devices from your car — kettle, laptop, even a projector
Item2: Frunk storage | Front trunk under the bonnet for boots or charging cables
Item3: One-pedal driving | Lift off the pedal and the car brakes itself, recharging as it slows
- You may swap items from this pool: vehicle-to-load power outlets, frunk storage, panoramic glass roofs, ambient interior lighting, regenerative one-pedal driving, heat pump cabin warming, dog mode/camp mode, OTA software updates, vegan eco-leather interiors, AR navigation HUD, massage seats, summon/auto-park, captain's chair second row, integrated dashcam, Matrix LED headlights.
- Pick 3 items most likely to surprise/excite this specific user given the conversation.
- NEVER include this block on any other question — only on the must-haves question.

Special shortcut — DIRECT INVENTORY REQUEST:
- If the user EXPLICITLY asks to see inventory/stock of a specific brand+model (e.g. "show me your Volkswagen ID.4", "do you have any Volvo XC90 in stock", "what Tesla Model Y do you have", "I want to see ID.Buzz inventory now"), respond with ONLY this exact line:
SHOW_INVENTORY: [Brand Model]
- No TOOLS block, no other text, no SUGGESTIONS — just that one line. The frontend will load real stock listings instantly.
- Only use this shortcut when the user names a specific brand+model AND asks to see stock/inventory/availability. Otherwise follow normal conversation flow.

IMPORTANT — TOOL STEPS:
Every reply MUST start with a TOOLS block on the very first line. This tells the user what you did before answering. Format:
TOOLS:["step 1","step 2"]
- Use 1-3 short steps (max 5 words each), written as present participle ("Searching...", "Comparing...", "Checking...")
- Steps must reflect what you ACTUALLY considered to answer — not generic filler.
- Examples:
  - User asks about budget → TOOLS:["Filtering by price range"]
  - User asks about a family car → TOOLS:["Checking 7-seater models","Reviewing safety ratings"]
  - User says "I want a Tesla" → TOOLS:["Searching Tesla inventory","Checking availability in Norway"]
  - Before recommending → TOOLS:["Searching inventory","Comparing models","Reading owner reviews"]
  - User sends gibberish → TOOLS:["Parsing your message"]
- TOOLS block must appear BEFORE any text, on its own line. Then your normal reply follows.

CRITICAL — SUGGESTIONS ARE MANDATORY AND MUST DIRECTLY ANSWER YOUR LAST QUESTION:
Every single reply (except RECOMMENDATIONS and SHOW_INVENTORY) MUST end with a SUGGESTIONS block. Format:
SUGGESTIONS:["option 1","option 2","option 3","option 4"]
- Each option max 6 words, written as something a user would literally say.

MANDATORY SELF-CHECK before finalizing the SUGGESTIONS block (do this internally):
Step 1: Find the LAST sentence of your reply ending in "?". This is THE question.
Step 2: For each chip, ask: "If the user tapped this and sent it as their reply, would it be a literal, sensible answer to THE question identified in step 1?"
Step 3: If ANY chip fails — REWRITE the entire SUGGESTIONS block before finalizing.

❌ REAL EXAMPLES OF WHAT NEVER TO DO:
- Reply ends "Any personal preferences I should know? Things like preferred colors, ownership costs, trade-in plans, or comfort extras?"
  → BAD chips: ["Around 300 000 kr","Around 500 000 kr","Around 700 000 kr","Flexible on budget"] (these are budget answers — the question is about PREFERENCES, not budget)
  → RIGHT chips: ["Avoid bright colors","Trade in my current car","Worried about insurance","Want premium audio"]

  → BAD chips: ["Tesla Model Y","Around 500k"] (none answer seat count)
  → RIGHT chips: ["Just me","Family of 4","Need 6 or 7 seats","Not sure yet"]

THE QUESTION IS ALWAYS THE LAST "?" — IGNORE EARLIER TOPICS IN THE REPLY. If your reply acknowledges a previous answer AND then asks a new question, the chips MUST answer the NEW question, never the previous topic.

TONE — be a knowledgeable Norwegian car advisor, NEVER a bare survey:
- MANDATORY: Before EVERY question about a new area, give the user 2–3 sentences of CONCRETE context first — actual prices, ranges, tradeoffs, or Norway-specific facts. Never just ask "what's your budget?" — always frame it with real numbers, real tradeoffs, real local context. Then ask the question on a NEW line, in bold, so the user can scan.

- Examples of the right tone (FOLLOW THIS LENGTH AND DETAIL):

function detectMode(userText) {
  const t = userText.toLowerCase();
  const userMsgCount = messages.filter(m => m.role === 'user').length;
  const isFirst = userMsgCount === 0; // about to be appended

  if (isFirst) {
    if (/\b(just\s+learning|learning\s+for\s+now|just\s+exploring|just\s+browsing|just\s+looking|just\s+curious|research|tutor|teach\s+me|learn\s+(more|about)|how\s+(buying|car-buying|cars))\b/.test(t)) {
      conversationMode = 'learning';
    } else {
      conversationMode = 'shopping';
    }
  } else if (conversationMode === 'learning') {
    // Allow switching back to shopping when intent is clear
    if (/\b(find\s+(me|a|my|the)|help\s+me\s+find|let'?s\s+find|let'?s\s+start\s+looking|show\s+me\s+(cars|some\s+matches|matches)|now\s+find|help\s+me\s+(shop|buy|choose)|i\s+want\s+to\s+buy|i('m|am)\s+ready|ready\s+to\s+(buy|shop|find)|i\s+need\s+a\s+car)\b/.test(t)) {
      conversationMode = 'shopping';

// ── real inventory cache ──────────────────────────────────────────────────
const BRUKTBIL_API = '/api/cars';
let allInventory = [];
let inventoryLoaded = false;
let inventoryLoadPromise = null;

async function fetchAllInventory() {
  try {
    // First, get the total count
    const firstResp = await fetch(`${BRUKTBIL_API}?offset=0&limit=15`);
    if (!firstResp.ok) throw new Error('API unavailable');
    const firstData = await firstResp.json();
    const total = firstData.numCars || 0;
    allInventory = [...(firstData.cars || [])];

    if (total > 15) {
      const limit = 100;
      const remaining = Math.ceil((total - 15) / limit);
      const requests = Array.from({ length: remaining }, (_, i) =>
        fetch(`${BRUKTBIL_API}?offset=${15 + i * limit}&limit=${limit}`)
          .then(r => r.ok ? r.json() : { cars: [] })
          .then(d => d.cars || [])
          .catch(() => [])
      );
      const pages = await Promise.all(requests);
      allInventory = allInventory.concat(pages.flat());
    }

    // Match what's publicly visible on bruktbil.no:
    // - exclude sold cars
    // - exclude cars currently abroad
    // - exclude cars with a future "availableFromDate"
    const now = Date.now();
    allInventory = allInventory.filter(c => {
      if (c.isSold) return false;
      if (c.isVehicleAbroad) return false;
      if (c.availableFromDate) {
        const t = Date.parse(c.availableFromDate);
        if (!isNaN(t) && t > now) return false;
      }
      return true;
    });
    inventoryLoaded = true;
    buildLiveRecs();
  } catch (e) {
    // Silently fall back to AI-generated listings
    inventoryLoaded = true;
  }
}

function formatNOK(n) {
  return Number(n).toLocaleString('nb-NO') + ' kr';
}
function formatKm(n) {
  return Number(n).toLocaleString('nb-NO') + ' km';
}

// Models the AI has already recommended in this session (so we can ask it
// for genuinely DIFFERENT ones when the user requests more options)
let recommendedModels = [];

// Build a short hint listing available models so the AI never recommends
// something we don't have in stock.
function getAvailableModelsHint() {
  if (!inventoryLoaded || allInventory.length === 0) return null;
  const counts = new Map();
  allInventory.forEach(c => {
    if (!c.brand || !c.model) return;
    const key = `${c.brand} ${c.model}`;
    counts.set(key, (counts.get(key) || 0) + 1);
  });
  const top = [...counts.entries()]
    .sort((a, b) => b[1] - a[1])
    .slice(0, 70)
    .map(([k, n]) => `${k} (${n})`);
  let msg = `LIVE INVENTORY at Møller Bil (model name and current stock count):
${top.join(', ')}.

HARD RULE: Every model you put in a RECOMMENDATIONS block MUST be from this list. Never invent a model that isn't in this list.`;

  if (recommendedModels.length > 0) {
    msg += `

MODELS ALREADY RECOMMENDED IN THIS CONVERSATION (do NOT repeat these): ${recommendedModels.join(', ')}.

If the user is now asking for "different models", "other options", "show me more", "anything else?", or similar — you MUST pick 2-3 models from the LIVE INVENTORY list that are NOT in this already-recommended list. Even if they don't perfectly match the user's stated requirements, prefer in-stock alternatives over a perfect-fit match that isn't in inventory. If you have to relax one criterion (e.g. broader fuel type, slightly higher budget, different size), acknowledge it briefly in the intro sentence: "These don't all hit your exact budget but they're what we have in stock right now — take a look."`;
  }

  return msg;
}

function matchInventory(modelStr) {
  if (!allInventory.length) return [];
  const query = modelStr.toLowerCase().trim();
  // Try to split "Brand Model" — first word is brand
  const spaceIdx = query.indexOf(' ');
  const qBrand = spaceIdx > -1 ? query.slice(0, spaceIdx) : query;
  const qModel = spaceIdx > -1 ? query.slice(spaceIdx + 1) : '';

  let matches = allInventory.filter(car => {
    const b = (car.brand || '').toLowerCase();
    const m = (car.model || '').toLowerCase();
    const brandOk = b.includes(qBrand) || qBrand.includes(b);
    const modelOk = !qModel || m.includes(qModel) || qModel.includes(m);
    return brandOk && modelOk;
  });

  // Sort by PRICE ascending so the cheapest in-stock car is always shown.
  // This guarantees the rec card's "From X kr" matches the first inventory card.
  // Tie-break on mileage so identical prices favour newer-looking cars.
  matches.sort((a, b) => {
    const pa = a.price    || Infinity;
    const pb = b.price    || Infinity;
    if (pa !== pb) return pa - pb;
    return (a.mileage || 999999) - (b.mileage || 999999);
  });
  return matches.slice(0, 3);
}

function generateEdge(rawItems, idx) {
  if (rawItems.length < 2) return '';
  const car = rawItems[idx];
  const others = rawItems.filter((_, i) => i !== idx);

  const prices  = rawItems.map(c => c.price  || Infinity);
  const miles   = rawItems.map(c => c.mileage || Infinity);
  const years   = rawItems.map(c => c.modelYear || 0);

  if (car.price === Math.min(...prices)) {
    const nextLowest = Math.min(...others.map(o => o.price || Infinity));
    const diff = nextLowest - car.price;
    if (diff > 10000) return `Best value — ${formatNOK(diff)} less than the others`;
    return 'Most affordable of the three';
  }
  if (car.mileage === Math.min(...miles)) {
    return `Lowest mileage — only ${formatKm(car.mileage)}`;
  }
  if (car.modelYear === Math.max(...years)) {
    return 'Newest model year in this selection';
  }
  if (car.electricRange) {
    return `${car.electricRange} km electric range`;
  }
  if (car.warranty) {
    return 'Includes remaining manufacturer warranty';
  }
  return `Available at ${(car.departmentName || '').replace('Møller Bil ', '')}`;
}

function cleanLocation(dept) {
  if (!dept) return '';
  // Handle formats like:
  //   "Møller Bil Stavanger"             → "Stavanger"
  //   "Tønsberg. En avdeling i Møller Bil" → "Tønsberg"
  //   "Stavanger - Møller Bil"           → "Stavanger"
  let s = dept
    .replace(/Møller Bil/gi, '')
    .replace(/En avdeling i/gi, '')
    .replace(/[.\-–—,]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
  // Take the first word (the city)
  const firstWord = s.split(' ')[0];
  return firstWord || dept;
}

// Shorten / humanize fuel labels coming from the API ("Electricity" → "Electric"
// etc.) so they fit cleanly in the narrow stat cell.
function humanFuel(raw) {
  if (!raw) return '';
  const map = {
    'Electricity': 'Electric',
    'GasolinAndElectricityHybrid': 'Hybrid (petrol)',
    'DieselAndElectricityHybrid': 'Hybrid (diesel)',
    'Gasolin': 'Petrol',
    'Diesel': 'Diesel',
  };
  return map[raw] || raw;
}

// ── Live recommendations (sidebar) ────────────────────────────────────────
// Adapts to the user's current activeChips. Returns up to 3 "model groups"
// drawn from the real inventory, plus a one-line "reason" eyebrow.
function getLiveRecommendations() {
  if (!inventoryLoaded || allInventory.length === 0) {
    return { reason: '', cars: [] };
  }

  const fuels  = (typeof getConfirmedOptionsForGroup === 'function') ? getConfirmedOptionsForGroup('fuel')  : [];
  const seats  = (typeof getConfirmedOptionsForGroup === 'function') ? getConfirmedOptionsForGroup('seats') : [];
  const sizes  = (typeof getConfirmedOptionsForGroup === 'function') ? getConfirmedOptionsForGroup('size')  : [];
  const brands = (typeof getConfirmedOptionsForGroup === 'function') ? getConfirmedOptionsForGroup('brand') : [];

  // Map UI fuel names to API fuel values
  const fuelMap = {
    'Electric':  ['electricity', 'electric'],
    'Hybrid':    ['hybrid'],
    'Petrol':    ['gasolin', 'petrol'],
    'Diesel':    ['diesel'],
  };
  const sizeMap = {
    'SUV':      ['sportutilityvehicle', 'suv'],
    'Van':      ['van'],
    'Compact':  ['combicoupe', 'hatchback', 'compact'],
    'Family':   ['stationwagon', 'sedan', 'family'],
    'Mid-size': ['sedan', 'midsize'],
    'City':     ['hatchback', 'city', 'minicar'],
  };

  let pool = allInventory.slice();

  if (fuels.length) {
    pool = pool.filter(c => {
      const f = String(c.fuel || '').toLowerCase();
      return fuels.some(uf => (fuelMap[uf] || [uf.toLowerCase()]).some(k => f.includes(k)));
    });
  }
  if (seats.length) {
    pool = pool.filter(c => seats.some(s => {
      const n = parseInt(c.seats || 0, 10);
      if (s === '7+') return n >= 7;
      return String(n) === s;
    }));
  }
  if (sizes.length) {
    pool = pool.filter(c => {
      const b = String(c.carBody || '').toLowerCase();
      return sizes.some(s => (sizeMap[s] || [s.toLowerCase()]).some(k => b.includes(k)));
    });
  }
  if (brands.length) {
    pool = pool.filter(c => brands.some(b => String(c.brand || '').toLowerCase() === b.toLowerCase()));
  }

  // Budget — if the slider isn't at its full default range
  const sMin = document.getElementById('budgetMin');
  const sMax = document.getElementById('budgetMax');
  if (sMin && sMax) {
    const lo = parseInt(sMin.value, 10), hi = parseInt(sMax.value, 10);
    if (!(lo === 50000 && hi === 1500000)) {
      pool = pool.filter(c => typeof c.price === 'number' && c.price >= lo && c.price <= hi);
    }
  }

  // If filters wiped out everything, fall back to the full pool
  if (pool.length === 0) pool = allInventory.slice();

  // Group by brand+model, sort by stock count desc
  const groups = new Map();
  pool.forEach(c => {
    if (!c.brand || !c.model) return;
    const key = `${c.brand} ${c.model}`;
    if (!groups.has(key)) groups.set(key, { name: key, brand: c.brand, model: c.model, cars: [] });
    groups.get(key).cars.push(c);
  });

  const top = [...groups.values()]
    .sort((a, b) => b.cars.length - a.cars.length)
    .slice(0, 3)
    .map(g => {
      const prices = g.cars.map(c => c.price).filter(p => typeof p === 'number' && p > 0);
      const minPrice = prices.length ? Math.min(...prices) : null;
      const imgCar = g.cars.find(c => c.carImages && c.carImages.length) || g.cars[0];
      const hero = imgCar?.carImages?.[0]?.normalUrl || null;
      return { name: g.name, count: g.cars.length, minPrice, image: hero };
    });

  // Build a human-readable reason eyebrow
  const parts = [];
  if (fuels.length) parts.push(fuels[0].toLowerCase());
  if (seats.length) parts.push(seats[0] === '7+' ? '7-seater' : `${seats[0]}-seat`);
  if (sizes.length) parts.push(sizes[0].toLowerCase());
  if (brands.length) parts.push(brands[0]);

  let reason;
  if (parts.length === 0)      reason = 'Popular in the Oslo area';
  else if (parts.length === 1) reason = `Top ${parts[0]} picks near you`;
  else                          reason = `Top ${parts.slice(0,2).join(' ')} picks`;

  return { reason, cars: top };
}

function buildLiveRecs() {
  const wrap = document.getElementById('sideRecs');
  const body = document.getElementById('liveRecsBody');
  const reasonEl = document.getElementById('liveRecsReason');
  if (!wrap || !body || !reasonEl) return;

  // Loading state — inventory still being fetched
  if (!inventoryLoaded) {
    reasonEl.textContent = 'Finding picks in stock…';
    body.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const sk = document.createElement('div');
      sk.className = 'live-rec-skeleton';
      body.appendChild(sk);
    }
    return;
  }

  const { reason, cars } = getLiveRecommendations();

  // Empty state — inventory loaded but nothing matched (or API failed)
  if (!cars.length) {
    reasonEl.textContent = 'Recommended for you';
    body.innerHTML = `<div class="live-rec-empty">Recommendations will appear here once we have a feel for what you're after.</div>`;
    return;
  }

  reasonEl.textContent = reason;
  body.innerHTML = '';

  cars.forEach(car => {
    const btn = document.createElement('button');
    btn.className = 'live-rec-card';
    btn.type = 'button';
    btn.onclick = () => {
      btn.disabled = true;
      loadInventory(car.name).finally(() => { btn.disabled = false; });
    };
    const imgHtml = car.image
      ? `<img class="live-rec-img" src="${escapeHtml(car.image)}" alt="" loading="lazy">`
      : `<div class="live-rec-img"></div>`;
    const priceLabel = car.minPrice
      ? `From ${formatNOK(car.minPrice)} · ${car.count} in stock`
      : `${car.count} in stock`;
    btn.innerHTML = `
      ${imgHtml}
      <div class="live-rec-info">
        <div class="live-rec-name">${escapeHtml(car.name)}</div>
        <div class="live-rec-meta">${escapeHtml(priceLabel)}</div>
      </div>
      <span class="live-rec-arrow" aria-hidden="true">→</span>
    `;
    body.appendChild(btn);
  });

}

function apiCarToItem(car) {
  const image = (car.carImages && car.carImages.length)
    ? (car.carImages.find(i => i.sortOrder === 0) || car.carImages[0]).normalUrl
    : null;
  return {
    year:     String(car.modelYear || ''),
    trim:     car.variant || '',
    // Add "driven" so users know this is the odometer reading, not a range/distance
    mileage:  car.mileage  ? `${formatKm(car.mileage)} driven`  : '',
    color:    car.color    || '',
    price:    car.price    ? formatNOK(car.price)    : '',
    location: cleanLocation(car.departmentName),
    fuel:     humanFuel(car.fuel),
    // Keep "Range" label short (the term tooltip explains "on a full charge")
    range:    car.electricRange ? `${car.electricRange} km` : '',
    seats:    car.seats    || '',
    image,
    edge:     '',
    _raw:     car,
  };
}

function renderOnboardingStep() {
  document.querySelectorAll('.ob-overlay, .ob-card').forEach(el => el.remove());

  const step = ONBOARDING_STEPS[onboardingStep];
  const targetEl = document.querySelector(step.target);

  const overlay = document.createElement('div');
  overlay.className = 'ob-overlay';

  const dimAll = document.createElement('div');
  dimAll.style.cssText = `position:fixed; inset:0; background:rgba(10,10,10,0.55); z-index:300; pointer-events:all; transition: opacity .35s;`;

  if (targetEl) {
    const r = targetEl.getBoundingClientRect();
    dimAll.style.background = 'transparent';
    dimAll.style.pointerEvents = 'none';

    const rects = [
      { top:0, left:0, width:'100%', height: r.top+'px' },
      { top: r.bottom+'px', left:0, width:'100%', bottom:0 },
      { top: r.top+'px', left:0, width: r.left+'px', height: r.height+'px' },
      { top: r.top+'px', left: r.right+'px', right:0, height: r.height+'px' },
    ];
    rects.forEach(s => {
      const d = document.createElement('div');
      d.style.cssText = `position:fixed; background:rgba(10,10,10,0.60); z-index:300; pointer-events:all;`;
      Object.assign(d.style, s);
      overlay.appendChild(d);
    });

    // Invisible click-blocker over the highlighted target — disables it during
    // the tour so only the instruction card's buttons are interactive.
    const blocker = document.createElement('div');
    blocker.style.cssText = `position:fixed; top:${r.top}px; left:${r.left}px; width:${r.width}px; height:${r.height}px; z-index:302; pointer-events:all; cursor:default;`;
    overlay.appendChild(blocker);

    const highlight = document.createElement('div');
    highlight.style.cssText = `
      position:fixed; top:${r.top}px; left:${r.left}px; width:${r.width}px; height:${r.height}px;
      border:2px solid rgba(0,25,70,0.5); border-radius:8px; z-index:301; pointer-events:none;
      box-shadow: 0 0 0 4px rgba(0,25,70,0.08); transition: all .35s;
    `;
    overlay.appendChild(highlight);
  } else {
    overlay.appendChild(dimAll);
  }

  document.body.appendChild(overlay);

  const card = document.createElement('div');
  card.className = 'ob-card';

  const isLast = onboardingStep === ONBOARDING_STEPS.length - 1;
  const stepNum = onboardingStep + 1;
  const total   = ONBOARDING_STEPS.length;

  card.innerHTML = `
    <div class="ob-header">
      <span class="ob-tour-badge">Quick tour</span>
      <div class="ob-dots">
        ${Array.from({length:total}, (_,i) => `<div class="ob-dot${i===onboardingStep?' active':''}"></div>`).join('')}
      </div>
    </div>
    <div class="ob-title">${step.title}</div>
    <div class="ob-body">${step.body}</div>
    <div class="ob-actions">
      <button class="ob-skip" onclick="finishOnboarding()">Skip tour</button>
      <button class="ob-next" onclick="${isLast ? 'finishOnboarding()' : 'nextOnboardingStep()'}">${isLast ? 'Get started' : 'Next'}</button>
    </div>
  `;

  if (targetEl) {
    const r = targetEl.getBoundingClientRect();
    const cardW = 420;  // matches .ob-card CSS width
    const cardH = 280;  // approximate ob-card height
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const PAD = 16;

    // Compute available space on each side of the target
    const spaceRight  = vw - r.right;
    const spaceLeft   = r.left;
    const spaceBottom = vh - r.bottom;
    const spaceTop    = r.top;

    // Helper to commit a left+top position with viewport clamp
    const place = (left, top) => {
      left = Math.max(12, Math.min(left, vw - cardW - 12));
      top  = Math.max(12, Math.min(top,  vh - cardH - 12));
      card.style.left = left + 'px';
      card.style.top  = top  + 'px';
      card.style.right = '';
    };

    let placed = false;
    const tryPlace = (pos) => {
      if (placed) return;
      if (pos === 'right' && spaceRight >= cardW + PAD + 12) {
        place(r.right + PAD, r.top + r.height/2 - cardH/2);
        placed = true;
      } else if (pos === 'left' && spaceLeft >= cardW + PAD + 12) {
        place(r.left - cardW - PAD, r.top + r.height/2 - cardH/2);
        placed = true;
      } else if (pos === 'bottom' && spaceBottom >= cardH + PAD + 12) {
        place(r.left + r.width/2 - cardW/2, r.bottom + PAD);
        placed = true;
      } else if (pos === 'top' && spaceTop >= cardH + PAD + 12) {
        place(r.left + r.width/2 - cardW/2, r.top - cardH - PAD);
        placed = true;
      }
    };

    // Try the requested position first, then fall back through other sides
    const order = [step.pos, 'bottom', 'right', 'left', 'top'].filter(Boolean);
    order.forEach(tryPlace);

    // Last-resort fallback — float the card centered in the viewport
    if (!placed) {
      place((vw - cardW) / 2, (vh - cardH) / 2);
    }
  } else {
    card.style.top  = '50%';
    card.style.left = '50%';
    card.style.transform = 'translate(-50%,-50%)';
  }

  document.body.appendChild(card);
}

function nextOnboardingStep() {
  onboardingStep++;
  if (onboardingStep >= ONBOARDING_STEPS.length) { finishOnboarding(); return; }
  renderOnboardingStep();
}

function finishOnboarding() {

// ── topic ↔ filter group bridge ──────────────────────────────────────────
// Detect what topic an AI message is about, so the sidebar's jump buttons
// can scroll the chat back to the relevant question.
function detectMessageTopic(text) {
  const t = (text || '').toLowerCase();
  // Skip the welcome greeting itself — it casually mentions fuel/budget/etc.
  // as examples but isn't actually asking the user about them.
  if (/welcome|hi,?\s+welcome|two quick notes|what.s got you thinking|ask me anything/.test(t)) return null;

  if (/budget|price|cost|spend|how much|\bkr\b|kroner|afford/i.test(t))                                       return 'budget';
  if (/passenger|seat|family|kids|children|how many people|how many.*fit|7-seater|7 seater/i.test(t))         return 'seats';
  if (/electric|hybrid|petrol|diesel|fuel\b|\bev\b|charging|plug-in/i.test(t))                                return 'fuel';
  if (/\bsize\b|compact|\bsuv\b|\bvan\b|hatchback|sedan|station wagon|small car|big car/i.test(t))            return 'size';
  if (/\bbrand\b|brands you|particular brand|brand in mind|brand preference|manufacturer|trust.*brand|prefer.*(audi|bmw|mercedes|toyota|volvo|tesla|kia|hyundai|ford|volkswagen|peugeot|renault)/i.test(t)) return 'brand';
  if (/use it for|drive|commut|trip|city|mountain|leisure|road|daily|weekend/i.test(t))                       return 'usage';
  return null;
}

// Per-topic tooltip text shown by the "?" help icon next to each section title.
const TOPIC_TIPS = {
  usage:  "Jump to the chat message where the AI asked how you'll use the car.",
  seats:  "Jump to the chat message where the AI asked about passengers and seats.",
  fuel:   "Jump to the chat message where the AI asked about fuel type.",
  size:   "Jump to the chat message where the AI asked about vehicle size.",
  brand:  "Jump to the chat message where the AI asked about brand preferences.",
  budget: "Jump to the chat message where the AI asked about your budget.",
};

// HTML for the small "?" tooltip next to each filter title.
function helpIconHtml(topic) {
  const tip = (TOPIC_TIPS[topic] || 'Click the button to jump to the related chat message.')
    .replace(/"/g, '&quot;');
  return `<span class="filter-help" data-tip="${tip}">?</span>`;
}

// HTML for one jump button — always visible, disabled until a matching message exists.
function jumpButtonHtml(topic) {
  const has = !!findLatestMessageForTopic(topic);
  return `<button
            class="filter-jump${has ? ' has-message' : ''}"
            ${has ? '' : 'disabled'}
            onclick="jumpToTopic('${topic}')"
            title="${has ? 'Show the chat where this came up' : 'Not discussed yet'}">
            <span>${has ? 'Show in chat' : 'Not yet discussed'}</span>
          </button>`;
}

function findLatestMessageForTopic(topic) {
  // Primary: explicit anchor stored when this topic was actually confirmed
  const anchorId = topicAnchors[topic];
  if (anchorId) {
    const el = document.getElementById(anchorId);
    if (el) return el;
  }
  // Fallback: text-detected AI question (only used if user hasn't confirmed yet)
  const stream = document.getElementById('stream');
  if (!stream) return null;
  const msgs = stream.querySelectorAll(`.msg.ai[data-topic="${topic}"]`);
  return msgs.length ? msgs[msgs.length - 1] : null;
}

function jumpToTopic(topic) {
  const target = findLatestMessageForTopic(topic);
  if (!target) { showToast(`No message about this topic yet.`); return; }
  target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  // brief pulse highlight
  document.querySelectorAll('.msg-jumped').forEach(m => m.classList.remove('msg-jumped'));
  // re-trigger animation
  void target.offsetWidth;
  target.classList.add('msg-jumped');
  setTimeout(() => target.classList.remove('msg-jumped'), 1700);
}

// Refresh just the jump-button states (cheap, no full rebuild).
function refreshJumpButtons() {
  document.querySelectorAll('.filter-jump').forEach(btn => {
    const onclick = btn.getAttribute('onclick') || '';
    const m = onclick.match(/jumpToTopic\('([^']+)'\)/);
    if (!m) return;
    const has = !!findLatestMessageForTopic(m[1]);
    btn.classList.toggle('has-message', has);
    btn.disabled = !has;
    btn.title = has
      ? 'Show the chat where this came up'
      : 'Not discussed yet';
    const span = btn.querySelector('span');
    if (span) span.textContent = has ? 'Show in chat' : 'Not yet discussed';
  });
}

// ── summary helpers — what's been confirmed for each topic ───────────────
function getConfirmedOptionsForGroup(groupKey) {
  return Object.keys(activeChips)
    .filter(k => k.startsWith(groupKey + ':'))
    .map(k => k.split(':').slice(1).join(':'));
}

function getConfirmedSummary(groupKey) {
  const opts = getConfirmedOptionsForGroup(groupKey);
  if (opts.length === 0) return null;
  if (groupKey === 'seats') {
    return opts.length === 1 ? `${opts[0]} seats` : opts.join(' or ') + ' seats';
  }
  return opts.join(', ');
}

function getBudgetSummary() {
  const lo = window._lastBudget?.min ?? null;
  const hi = window._lastBudget?.max ?? null;
  if (lo === null || hi === null) return null;
  const MIN = 50000, MAX = 1500000;
  if (lo === MIN && hi === MAX) return null;
  if (lo === MIN) return 'Up to ' + fmtKr(hi);
  if (hi === MAX) return 'From ' + fmtKr(lo);
  return fmtKr(lo) + ' – ' + fmtKr(hi);
}

// HTML for one filter section's status header (title + status pill + jump)
function sectionHeadHtml(topic, title, isConfirmed) {
  return `
    <div class="filter-label-row">
      <div class="filter-label-left">
        <span class="filter-label">${title}</span>
      </div>
      ${jumpButtonHtml(topic)}
    </div>`;
}

// Toggle the .expanded state on a filter section to reveal/hide its chips
function toggleFilterEdit(btn) {
  const group = btn.closest('.filter-group');
  if (!group) return;
  const expanded = group.classList.toggle('expanded');
  btn.firstChild.nodeValue = expanded
    ? 'Hide options'
    : (group.dataset.state === 'confirmed' ? 'Change' : 'Set it now');
}

// Update one section's value-text + state without rebuilding (called on chip click)
function refreshGroupSummary(groupKey) {
  const group = document.querySelector(`.filter-group[data-key="${groupKey}"]`);
  if (!group) return;
  const summary = groupKey === 'budget' ? getBudgetSummary() : getConfirmedSummary(groupKey);
  const valueEl    = group.querySelector('.filter-value');
  const statusPill = group.querySelector('.filter-status-pill');
  const toggleBtn  = group.querySelector('.filter-change-toggle');
  const placeholder = group.dataset.placeholder || 'Not set';

  if (summary) {
    group.dataset.state = 'confirmed';
    if (valueEl) {
      valueEl.classList.remove('placeholder');
      valueEl.textContent = summary;
    }
    if (statusPill) statusPill.textContent = 'Confirmed';
    if (toggleBtn && !group.classList.contains('expanded')) {
      toggleBtn.firstChild.nodeValue = 'Change';
    }
  } else {
    group.dataset.state = 'pending';
    if (valueEl) {
      valueEl.classList.add('placeholder');
      valueEl.textContent = placeholder;
    }
    if (statusPill) statusPill.textContent = 'Pending';
    if (toggleBtn && !group.classList.contains('expanded')) {
      toggleBtn.firstChild.nodeValue = 'Set it now';
    }
  }
}
